function fwChain(months){
  const n=months.length,c=months.map(m=>({avg:+(100-m.price).toFixed(6),start:null,end:null}));
  for(let i=0;i<n;i++){if(!months[i].mtg){c[i].start=c[i].avg;c[i].end=c[i].avg;if(i>0&&months[i-1].mtg)c[i-1].end=c[i].avg;if(i<n-1&&months[i+1].mtg)c[i+1].start=c[i].avg;}}
  for(let r=0;r<n;r++){for(let i=n-1;i>=0;i--){const m=months[i];if(m.mtg&&c[i].end!==null&&c[i].start===null&&m.N>0)c[i].start=(c[i].avg-(m.M/(m.N+m.M))*c[i].end)/(m.N/(m.N+m.M));if(m.mtg&&c[i].start!==null&&i>0&&months[i-1].mtg&&c[i-1].end===null)c[i-1].end=c[i].start;}}
  for(let r=0;r<n;r++){for(let i=0;i<n;i++){const m=months[i];if(m.mtg&&c[i].start!==null&&c[i].end===null&&m.M>0)c[i].end=(c[i].avg-(m.N/(m.N+m.M))*c[i].start)/(m.M/(m.N+m.M));if(m.mtg&&c[i].end!==null&&i<n-1&&months[i+1].mtg&&c[i+1].start===null)c[i+1].start=c[i].end;}}
  return c;
}

function fwMeetings(months,chain){
  const res=[];
  months.forEach((m,i)=>{
    if(!m.mtg||chain[i].start===null||chain[i].end===null)return;
    const chg=chain[i].end-chain[i].start,moves=chg/0.25,abs=Math.abs(moves),char=Math.floor(abs),mant=abs-char;
    const isCut=chg<-0.0001,isHike=chg>0.0001,p0=1-mant,p1=mant;
    const b0=isCut?-char:isHike?char:0,b1=isCut?-(char+1):isHike?(char+1):0;
    const l0=b0===0?'hold':(b0>0?`+${b0*25}bp`:`${b0*25}bp`);
    const l1=b1===0?'hold':(b1>0?`+${b1*25}bp`:`${b1*25}bp`);
    res.push({lb:m.lb,label:m.ml||m.lb,start:chain[i].start,end:chain[i].end,chg,moves,p0,p1,b0,b1,l0,l1,isCut,isHike});
  });
  return res;
}

function fwDist(meetings){
  let d={'0':1.0};const states=[{'0':1.0}];
  meetings.forEach(m=>{
    const nd={};
    for(const[k,p]of Object.entries(d)){const ki=parseInt(k);nd[ki+m.b0]=(nd[ki+m.b0]||0)+p*m.p0;if(m.p1>0.0005)nd[ki+m.b1]=(nd[ki+m.b1]||0)+p*m.p1;}
    d=nd;states.push({...d});
  });
  return{states,final:d};
}

function cmeCutCountDist(final,fwD){
  const chain2=fwChain(fwD);
  const m2026=fwMeetings(fwD.filter(d=>d.lb.includes('2026')&&d.mtg),chain2.filter((_,i)=>fwD[i].lb.includes('2026')));
  const {final:f26}=fwDist(m2026);
  const out={0:0,1:0,2:0,3:0,4:0};
  Object.entries(f26).forEach(([k,p])=>{const ki=Math.max(0,Math.min(4,-parseInt(k)));out[ki]=(out[ki]||0)+p;});
  return out;
}

function getMeetingComps(meetings,kalshiD,polyD){
  const comps=[];
  meetings.forEach(m=>{
    const cmeCut=(m.b0<0?m.p0:0)+(m.b1<0&&m.p1>0.001?m.p1:0);
    const kd=kalshiD.meetings[m.lb];
    const pd=polyD.meetings[m.lb];
    const kCut=kd?(kd.cut25||0)+(kd.cut50||0):null;
    const pCut=pd?(pd.cut25||0)+(pd.cut50||0):null;
    comps.push({lb:m.lb,label:m.label,cmeCut,kCut,pCut,
      basisKC:kCut!==null?kCut-cmeCut:null,
      basisPK:pCut!==null&&kCut!==null?pCut-kCut:null});
  });
  return comps;
}

function getCmeHikeProb(meetings){
  return meetings.reduce((mx,m)=>{
    const ph=(m.b0>0?m.p0:0)+(m.b1>0&&m.p1>0.001?m.p1:0);
    return Math.max(mx,ph);
  },0);
}

function enumeratePaths(meetings,depth){
  const paths=[];
  const mSlice=meetings.slice(0,depth);
  function dfs(idx,seq,prob){
    if(idx===mSlice.length){paths.push({key:seq.join('\u2192'),prob});return;}
    const m=mSlice[idx];
    dfs(idx+1,[...seq,m.l0],prob*m.p0);
    if(m.p1>0.005)dfs(idx+1,[...seq,m.l1],prob*m.p1);
  }
  dfs(0,[],1);
  return paths.sort((a,b)=>b.prob-a.prob).slice(0,8);
}

function zqQuarterlyAvg(fwD,srD){
  return srD.map(s=>{
    if(!s.zqMonths.length)return null;
    const vals=s.zqMonths.map(lb2=>{const row=fwD.find(d=>d.lb===lb2);return row?100-row.price:null;}).filter(v=>v!==null);
    return vals.length?vals.reduce((a,b)=>a+b,0)/vals.length:null;
  });
}

function srInstFwd(srD){
  const rates=srD.map(s=>100-s.price);
  return rates.map((r,i)=>i===0?null:2*rates[i]-rates[i-1]);
}

function ycSyncShortEnd(fwD,ycD){
  const result=ycD.map(d=>({...d}));
  const chain=fwChain(fwD);
  let se=3.64;
  for(let i=0;i<fwD.length;i++){if(fwD[i].mtg&&chain[i].start!==null){se=chain[i].start;break;}}
  result[0].rate=parseFloat((se).toFixed(4));
  const avg6=fwD.slice(0,6).reduce((s,d)=>s+(100-d.price),0)/6;
  const avg12=fwD.reduce((s,d)=>s+(100-d.price),0)/fwD.length;
  result[1].rate=parseFloat(avg6.toFixed(4));
  result[2].rate=parseFloat(avg12.toFixed(4));
  return result;
}

function getCompareSeries(fwCompareScenario,fwD,fwLb){
  if(!fwCompareScenario||!SCENARIOS[fwCompareScenario])return null;
  const sc=SCENARIOS[fwCompareScenario];
  const cD=fwD.map((m,i)=>({...m,price:sc.prices[i]}));
  const cChain=fwChain(cD),cMeetings=fwMeetings(cD,cChain);
  const{states:cStates,final:cFinal}=fwDist(cMeetings);
  return{label:sc.shortLabel,totalBp:sc.totalBp,endRate:sc.endRate,era:sc.era,
    color:'var(--c-overlay)',colorA:'var(--c-overlay-a)',
    chain:cChain,meetings:cMeetings,states:cStates,final:cFinal};
}

function reducer(state, action){
  switch(action.type){
    case 'SET_TAB':
      return {...state, fwActive: action.tab};
    case 'SET_LB':
      return {...state, fwLb: action.lb};
    case 'SET_SCENARIO':{
      const sc=SCENARIOS[action.key];
      if(!sc) return state;
      return {...state, fwActiveScenario: action.key,
        fwD: state.fwD.map((r,i)=>({...r, price: sc.prices[i]}))};
    }
    case 'DEACTIVATE':
      return {...state, fwActiveScenario: '',
        fwD: state.fwD.map((r,i)=>({...r, price: FW_SEED_PRICES[i]}))};
    case 'SET_COMPARE':
      return {...state, fwCompareScenario: action.key};
    case 'CLEAR_COMPARE':
      return {...state, fwCompareScenario: ''};
    case 'UPDATE_ZQ_PRICE':
      return {...state, fwActiveScenario: '',
        fwD: state.fwD.map((r,i)=>i===action.i?{...r, price: action.value}:r)};
    case 'UPDATE_ZQ_MTG':
      return {...state, fwActiveScenario: '',
        fwD: state.fwD.map((r,i)=>i===action.i?{...r, mtg: action.value}:r)};
    case 'UPDATE_ZQ_N':
      return {...state, fwActiveScenario: '',
        fwD: state.fwD.map((r,i)=>i===action.i?{...r, N: action.value}:r)};
    case 'UPDATE_ZQ_M':
      return {...state, fwActiveScenario: '',
        fwD: state.fwD.map((r,i)=>i===action.i?{...r, M: action.value}:r)};
    case 'UPDATE_SR_PRICE':
      return {...state,
        srD: state.srD.map((r,i)=>i===action.i?{...r, price: action.value}:r)};
    case 'UPDATE_YC_RATE':
      return {...state,
        ycD: state.ycD.map((r,i)=>i===action.i?{...r, rate: action.value, src:'manual'}:r)};
    case 'APPLY_LIVE_ZQ':{
      const d=action.data;
      return {...state, fwActiveScenario: '',
        fwD: state.fwD.map(r=>{
          const nr={...r};
          if(d.prices&&d.prices[r.lb]!==undefined){const v=parseFloat(d.prices[r.lb]);if(v>90&&v<100)nr.price=v;}
          if(d.meetings&&d.meetings[r.lb]){const mt=d.meetings[r.lb];nr.mtg=!!mt.hasMeeting;if(mt.label)nr.ml=mt.label;if(mt.hasMeeting&&mt.N>0){nr.N=mt.N;nr.M=mt.M;}if(!mt.hasMeeting){nr.N=0;nr.M=0;}}
          return nr;
        })};
    }
    case 'APPLY_LIVE_KALSHI':
      return {...state, kalshiD: {...state.kalshiD, ...action.data, fetched:true}};
    case 'APPLY_LIVE_POLY':
      return {...state, polyD: {...state.polyD, ...action.data, fetched:true}};
    case 'APPLY_LIVE_SOFR':{
      const prices=action.prices;
      return {...state,
        srD: state.srD.map(r=>{
          if(prices[r.lb]!==undefined){const v=parseFloat(prices[r.lb]);if(v>90&&v<100)return{...r, price:v};}
          return r;
        })};
    }
    case 'APPLY_LIVE_YC':{
      const rates=action.rates;
      const keyMap={'3mo':0,'6mo':1,'1yr':2,'2yr':3,'5yr':4,'10yr':5,'30yr':6};
      const next=state.ycD.map(r=>({...r}));
      Object.entries(rates).forEach(([k,v])=>{
        const idx=keyMap[k];
        if(idx!==undefined&&v!==null&&v>0&&v<20){next[idx].rate=parseFloat(v.toFixed(4));next[idx].src='live';}
      });
      return {...state, ycD: next};
    }
    case 'LOAD_SETTINGS':{
      const s=action.settings;
      let next={...state};
      if(s.lb!==undefined&&s.lb>=0&&s.lb<=8) next.fwLb=parseFloat(s.lb);
      if(s.scenario&&SCENARIOS[s.scenario]){
        next.fwActiveScenario=s.scenario;
        next.fwD=next.fwD.map((r,i)=>({...r, price: SCENARIOS[s.scenario].prices[i]}));
      }
      if(s.compare&&SCENARIOS[s.compare]&&s.compare!==next.fwActiveScenario) next.fwCompareScenario=s.compare;
      return next;
    }
    default:
      return state;
  }
}

function useFinance(state) {
  return useMemo(() => {
    const syncedYcD = ycSyncShortEnd(state.fwD, state.ycD);
    const chain = fwChain(state.fwD);
    const meetings = fwMeetings(state.fwD, chain);
    const {states, final} = fwDist(meetings);
    const zqAvgs = zqQuarterlyAvg(state.fwD, state.srD);
    const instFwd = srInstFwd(state.srD);
    const compareSeries = getCompareSeries(state.fwCompareScenario, state.fwD, state.fwLb);
    let effrStart = 3.64;
    for(let i=0;i<state.fwD.length;i++){
      if(state.fwD[i].mtg && chain[i].start !== null){effrStart=chain[i].start; break;}
    }
    return {chain, meetings, states, final, zqAvgs, instFwd, compareSeries, effrStart, syncedYcD};
  }, [state.fwD, state.srD, state.ycD, state.fwCompareScenario, state.fwLb]);
}

  const key=apiKey.trim();
  const today=new Date().toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});
  const prompt=`Today is ${today}. Search for the latest U.S. Treasury constant-maturity (CMT) par rates from the Federal Reserve H.15 release or Treasury.gov. Find the most recent daily values for: 3-month, 6-month, 1-year, 2-year, 5-year, 10-year, and 30-year. Return ONLY raw JSON, no markdown, no fences:\n{"asOf":"YYYY-MM-DD","source":"Federal Reserve H.15","rates":{"3mo":3.64,"6mo":3.60,"1yr":3.55,"2yr":3.84,"5yr":4.04,"10yr":4.31,"30yr":4.61}}\nUse null for any maturity not available. Keep fallback values shown if search fails.`;
  const hdrs={'Content-Type':'application/json'};if(key)hdrs['x-api-key']=key;
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:hdrs,body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:400,tools:[{type:'web_search_20250305',name:'web_search'}],messages:[{role:'user',content:prompt}]})});
    if(!res.ok)throw new Error((await res.json().catch(()=>({}))).error?.message||('API '+res.status));
    const data=await res.json();
    const text=data.content.filter(b=>b.type==='text').map(b=>b.text).join('');
    const m=text.replace(/```json|```/g,'').trim().match(/\{[\s\S]*\}/);
    if(!m)throw new Error('No JSON found');
    const p=JSON.parse(m[0]);
    if(p.rates) dispatch({type:'APPLY_LIVE_YC', rates:p.rates});
    setRefreshStatus(s=>({...s, yc:(p.source||'H.15')+' \u00b7 '+(p.asOf||today)}));
  }catch(e){setRefreshStatus(s=>({...s, yc:'\u26a0 '+(e.message||'Failed \u2014 rates unchanged')}));}
  finally{setFetching(f=>({...f, yc:false}));}
}

// ============================================================================
// REACT APP
// ============================================================================

function App() {
  const [state, dispatch] = useReducer(reducer, INITIAL_STATE);
  const finance = useFinance(state);
  const [apiKey, setApiKey] = useState('');
  const [refreshStatus, setRefreshStatus] = useState({zq:'', kal:'', poly:'', sofr:'', yc:''});
  const [fetching, setFetching] = useState({zq:false, kal:false, poly:false, sofr:false, yc:false});

  useEffect(() => {
    try {
      const s = JSON.parse(localStorage.getItem('fwCfg') || '{}');
      if(s.lb || s.scenario || s.compare) dispatch({type:'LOAD_SETTINGS', settings:s});
    } catch(e) {}
  }, []);

  useEffect(() => {
    try { localStorage.setItem('fwCfg', JSON.stringify({lb:state.fwLb, scenario:state.fwActiveScenario, compare:state.fwCompareScenario})); }
    catch(e) {}
  }, [state.fwLb, state.fwActiveScenario, state.fwCompareScenario]);

  const TABS = [
    {id:'inputs',     label:'Futures inputs'},
    {id:'chain',      label:'EFFR chain'},
    {id:'tree',       label:'Probability tree'},
    {id:'kalshi',     label:'\u2696 Prediction markets'},
    {id:'sofr',       label:'\ud83d\udcc8 SOFR strip'},
    {id:'dashboard',  label:'\ud83d\uddc2 Dashboard'},
    {id:'yieldcurve', label:'\ud83d\udcd0 Yield Curve'},
  ];

  return (
    <div style={{padding:'1rem 0 .5rem'}}>
      <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',flexWrap:'wrap',gap:'8px',marginBottom:'6px'}}>
        <div>
          <h2 style={{fontSize:'18px',fontWeight:500,margin:'0 0 2px'}}>Fed Funds probability tree</h2>
          <div style={{fontSize:'12px',color:'var(--color-text-secondary)'}}>
            Target: <b style={{color:'var(--color-text-primary)'}}>{state.fwLb.toFixed(2)}&ndash;{(state.fwLb+0.25).toFixed(2)}%</b>
            &nbsp;&middot;&nbsp;EFFR: <b style={{color:'var(--color-text-primary)'}}>{finance.effrStart.toFixed(2)}%</b>
          </div>
        </div>
        <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:'4px'}}>
          <div style={{display:'flex',gap:'6px',alignItems:'center'}}>
            <input type="password" className="fw-in" placeholder="sk-ant-... (standalone only)"
              style={{width:'195px',fontSize:'11px'}} value={apiKey}
              onChange={e=>setApiKey(e.target.value)}/>
            <button className="refresh-btn" disabled={fetching.zq}
              onClick={()=>refreshData(state,dispatch,apiKey,setFetching,setRefreshStatus)}>
              <span className={fetching.zq?'spin':''}>&#x27f3;</span> Refresh ZQ
            </button>
          </div>
          <div style={{fontSize:'10px',color:'var(--color-text-tertiary)',textAlign:'right',maxWidth:'400px',minHeight:'14px'}}>{refreshStatus.zq}</div>
        </div>
      </div>

      <p style={{fontSize:'13px',color:'var(--color-text-secondary)',margin:'0 0 .5rem'}}>CME FedWatch methodology (30-day ZQ futures) with Kalshi + Polymarket prediction market overlay and SOFR strip. 12 months forward, 7 tabs.</p>
      <div className="api-note">
        <b>Running standalone?</b> Paste your Anthropic API key (<code>sk-ant-...</code>) above &mdash; get one at <code>console.anthropic.com</code>. Refreshes cost &lt;$0.01 each. Inside claude.ai the key is injected automatically.
      </div>

      <div style={{display:'flex',gap:'4px',background:'var(--color-background-secondary)',borderRadius:'var(--border-radius-md)',padding:'3px',margin:'1rem 0 1.25rem',width:'fit-content',flexWrap:'wrap'}}>
        {TABS.map(t=>(
          <div key={t.id} className={'fw-tab'+(state.fwActive===t.id?' act':'')}
            onClick={()=>dispatch({type:'SET_TAB',tab:t.id})}>
            {t.label}
          </div>
        ))}
      </div>

      <div style={{color:'var(--color-text-secondary)',fontSize:'13px'}}>
        Active tab: {state.fwActive} &mdash; content rendering in next steps
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
