    const bCol=basis!=='—'?(parseFloat(basis)>0?'var(--color-text-info)':'var(--color-text-danger)'):'var(--color-text-tertiary)';
    const fwdVal=instFwd[i]!==null?instFwd[i].toFixed(4):'—';
    html+='<tr>';
    html+='<td style="font-family:var(--font-mono);font-size:11px;color:var(--c-sofr)">'+s.ticker+'</td>';
    html+='<td style="white-space:nowrap">'+s.qLabel+'</td>';
    html+='<td><input class="fw-in" type="number" step="0.005" min="90" max="100" value="'+s.price+'" style="width:72px" onchange="window.__srDispatch('+i+',this.value)"></td>';
    html+='<td style="font-family:var(--font-mono);color:var(--c-sofr)">'+sofrRate+'%</td>';
    html+='<td style="font-family:var(--font-mono);color:var(--c-cme)">'+(zqAvg!==null?zqAvg.toFixed(4)+'%':'—')+'</td>';
    html+='<td style="font-family:var(--font-mono);font-weight:500;color:'+bCol+'">'+(basis!=='—'?(parseFloat(basis)>0?'+':'')+basis:basis)+'</td>';
    html+='<td style="font-family:var(--font-mono);color:var(--c-sofr-fwd)">'+(fwdVal!=='—'?fwdVal+'%':fwdVal)+'</td>';
    html+='</tr>';
  });
  html+='</tbody></table></div>';
  html+='<div class="k-note">Basis = (SR3 implied SOFR − ZQ quarterly avg EFFR) × 100, in basis points. Historically 5–15bp reflecting the repo/deposit spread between SOFR and EFFR. Instantaneous forward = 2×r<sub>t+1</sub> − r<sub>t</sub> — the marginal rate the market prices for each successive quarter, stripping out the averaging effect of the futures contract.</div>';
  html+='</div>';

  // -- Panel B: main chart --
  html+='<div class="k-panel k-full" style="margin-bottom:12px">';
  html+='<div class="k-hdr"><span class="k-title">Forward rate curves — SR3 SOFR strip vs ZQ EFFR chain vs Fed SEP</span>';
  html+='<span class="k-contract">SR3 vs ZQ vs Dec 2025 SEP</span></div>';
  html+=sofrMainChart(zqAvgs,instFwd,lb,srd,state.kalshiD);
  html+='<div class="k-note">Three forward rate curves on a common axis. The SR3 strip (green) typically trades a few basis points above the ZQ-derived EFFR path (blue) — this persistent basis reflects the credit/liquidity premium embedded in SOFR. The instantaneous forward curve (dashed green) extracts the marginal rate implied by each successive quarterly contract, removing the averaging effect; it will lead the SR3 rate lower at inflection points in the easing cycle. Purple circles: Fed December 2025 SEP median projections at year-end 2026 and 2027 horizons.</div>';
  html+='</div>';

  // -- Panels C1 + C2 --
  html+='<div class="k-grid">';

  // Basis bars
  html+='<div class="k-panel">';
  html+='<div class="k-hdr"><span class="k-title">SOFR–EFFR basis by quarter (bp)</span><span class="k-contract">SR3 − ZQ avg</span></div>';
  html+=basisBarsSvg(zqAvgs,srd);
  html+='<div class="k-note">Positive basis = SOFR trades above EFFR, as expected. A widening basis signals stress in overnight repo markets or increased demand for SOFR-linked instruments. A compression toward zero would suggest convergence of money market conditions.</div>';
  html+='</div>';

  // Key stats panel
  const currentBasis=zqAvgs[0]!==null?((100-srd[0].price-zqAvgs[0])*100).toFixed(1):'—';
  const sofrTerminal=(100-srd[srd.length-1].price).toFixed(2);
  const effrTerminal=fwd[fwd.length-1]?(100-fwd[fwd.length-1].price).toFixed(2):'—';
  const stripSlope=((100-srd[srd.length-1].price)-(100-srd[0].price)).toFixed(2);
  const fwdMin=instFwd.filter(v=>v!==null);
  const troughFwd=fwdMin.length?Math.min(...fwdMin).toFixed(2):'—';
  const troughQtr=fwdMin.length?srd[instFwd.indexOf(Math.min(...fwdMin))].qLabel:'—';

  html+='<div class="k-panel">';
  html+='<div class="k-hdr"><span class="k-title">Strip summary statistics</span></div>';
  html+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">';
  html+='<div class="fw-stat"><div class="fw-stat-l">Near-term basis</div><div class="fw-stat-v" style="color:var(--c-sofr);font-size:16px">'+(currentBasis!=='—'?'+':'')+currentBasis+' bp</div><div class="fw-stat-s">SR3M6 − ZQ Q2 avg</div></div>';
  html+='<div class="fw-stat"><div class="fw-stat-l">SOFR terminal (Dec 27)</div><div class="fw-stat-v" style="color:var(--c-sofr);font-size:16px">'+sofrTerminal+'%</div><div class="fw-stat-s">SR3Z7 implied</div></div>';
  html+='<div class="fw-stat"><div class="fw-stat-l">EFFR terminal (Mar 27)</div><div class="fw-stat-v" style="color:var(--c-cme);font-size:16px">'+effrTerminal+'%</div><div class="fw-stat-s">ZQ Mar 2027 implied</div></div>';
  html+='<div class="fw-stat"><div class="fw-stat-l">Strip slope</div><div class="fw-stat-v" style="color:'+(parseFloat(stripSlope)<0?'var(--color-text-info)':'var(--color-text-danger)')+';font-size:16px">'+stripSlope+'%</div><div class="fw-stat-s">Dec 27 minus Jun 26</div></div>';
  html+='<div class="fw-stat" style="grid-column:1/-1"><div class="fw-stat-l">Forward trough</div><div class="fw-stat-v" style="color:var(--c-sofr-fwd);font-size:16px">'+troughFwd+'%</div><div class="fw-stat-s">Inst. fwd minimum — '+troughQtr+'</div></div>';
  html+='</div>';
  html+='<div class="k-note">The instantaneous forward trough marks the quarter where the SR3 strip prices the most aggressive easing — where the marginal rate bottoms before potentially rising toward neutral. This is distinct from the terminal rate level implied by the strip\'s endpoint.</div>';
  html+='</div>';
  html+='</div>';

  return <SvgPanel html={html}/>;
}

function DashboardTab({state, finance}) {
  const {chain, meetings, states, final, zqAvgs, compareSeries} = finance;
  const lb = state.fwLb;
  const fwD = state.fwD;
  const kD = state.kalshiD;
  const pD = state.polyD;
  const srd = state.srD;
  const rideData = finance.rideData;

  // -- 1. Summary stat bar --
  let se='3.64';
  for(let i=0;i<fwD.length;i++){if(fwD[i].mtg&&chain[i].start!==null){se=chain[i].start.toFixed(2);break;}}
  const pC1=Object.entries(final).filter(([k])=>parseInt(k)<=-1).reduce((s,[,p])=>s+p,0);
  const expC=Object.entries(final).reduce((s,[k,p])=>s+(-parseInt(k))*p,0);
  const expR=(lb-expC*.25).toFixed(2);

  // -- 4. Regime summary box --

  // Phase 6: Balance Sheet & Financial Stability regime rows

function buildRuleComparisonTable(trRates, effrStart, fwLb) {
  const rules = [
    {key:'taylor93',      label:'Taylor 1993',        note:'Original — r*=2%, β=0.5, GDP gap'},
    {key:'yellen',        label:'Yellen Alt1',         note:'Unemployment gap, FOMC SEP r*, β=1.0'},
    {key:'balanced',      label:'Balanced approach',   note:'β=1.0 (Yellen 2012/2017 speeches)'},
    {key:'cgg',           label:'CGG Inertial',        note:'ρ=0.85 smoothing around Taylor 1993'},
    {key:'juddRudebusch', label:'Judd-Rudebusch ECM',  note:'Dynamic ECM — highest R² for ΔFFTR prediction'},
    {key:'finNeutral',    label:'Finance-neutral',     note:'JR + λ·NFCI (Borio 2012/2014)'},
  ];
  const threshold = 0.125;
  var h = '<table class="fwt"><thead><tr><th>Rule</th><th>Prescribed</th><th>Gap vs EFFR (bp)</th><th>Signal</th><th>Notes</th></tr></thead><tbody>';
  rules.forEach(function(r) {
    var rate = trRates[r.key];
    if(rate === undefined) return;
    var gap = (rate - effrStart) * 100;
    var signal = Math.abs(gap) < threshold*100 ? 0 : gap > 0 ? 1 : -1;
    var sigLabel = signal === 0 ? '= Neutral' : signal === 1 ? '↑ Hike' : '↓ Cut';
    var sigCol = signal === 0 ? 'var(--color-text-tertiary)' : signal === 1 ? 'var(--color-text-danger)' : 'var(--color-text-info)';
    var isJR = r.key === 'juddRudebusch';
    var isFN = r.key === 'finNeutral';
    var rateCol = isFN ? 'var(--c-fin-neutral)' : 'var(--c-taylor)';
    h += '<tr style="'+(isJR?'background:var(--color-background-info)':'')+'">';
    h += '<td style="font-weight:'+(isJR?600:400)+';white-space:nowrap;'+(isFN?'color:var(--c-fin-neutral)':'')+'">';
    h += r.label;
    if(isJR) h += ' <span style="font-size:9px;color:var(--c-taylor);background:rgba(225,29,72,.1);padding:1px 5px;border-radius:8px;margin-left:4px">signal source</span>';
    if(isFN) h += ' <span style="font-size:9px;color:var(--c-fin-neutral);background:rgba(13,148,136,.1);padding:1px 5px;border-radius:8px;margin-left:4px">Borio</span>';
    h += '</td>';
    h += '<td style="font-family:var(--font-mono);color:'+rateCol+'">'+rate.toFixed(2)+'%</td>';
    h += '<td style="font-family:var(--font-mono);color:'+(gap>0?'var(--color-text-danger)':'var(--color-text-info)')+'">'+(gap>0?'+':'')+gap.toFixed(0)+'</td>';
    h += '<td style="font-weight:600;color:'+sigCol+'">'+sigLabel+'</td>';
    h += '<td style="font-size:10px;color:var(--color-text-tertiary)">'+r.note+'</td>';
    h += '</tr>';
  });
  h += '</tbody></table>';
  return h;
}

function TaylorRuleTab({state, dispatch, finance}) {
  const {meetings, states, effrStart, trRates, jrImpliedPath} = finance;
  const lb = state.fwLb;
  const t = state.taylor;
  const tr = state.trD;
  const fnNfciAdj = (state.fsD?.lambdaFC ?? 0.5) * (state.fsD?.nfci ?? -0.12);

  const taylorPaths = useMemo(() =>
    taylorMeetingPath(t, meetings, effrStart, lb),
    [t, meetings, effrStart, lb]
  );

  // CME expected rates at each meeting
  const cmeRates = useMemo(() => {
    return meetings.map((m, i) => {
      const s = states[i + 1] || states[states.length - 1];
      const ek = Object.entries(s).reduce((sum, [k, p]) => sum + parseInt(k) * p, 0);
      return lb + ek * 0.25;
    });
  }, [meetings, states, lb]);

  // Finance-neutral implied path: JR path + lambda*NFCI at each meeting
  const fnImpliedPath = jrImpliedPath.map(r => r + fnNfciAdj);
  const fnNow = trRates.finNeutral;

  const classicNow = taylorPaths.classic[0];
  const balancedNow = taylorPaths.balanced[0];
  const inertialNow = taylorPaths.inertialC[0];
  const jrNow = trRates.juddRudebusch;
  const yellenNow = trRates.yellen;
  const gapNow = jrNow !== undefined ? jrNow - effrStart : 0;
  const rNeutral = t.rStar + t.piStar;

  const ruleVariant = tr.ruleVariant || 'taylor93';

  const paramField = (label, key, min, max, step, unit) => {
    return '<tr><td style="font-size:11px;white-space:nowrap;padding:4px 8px">'+label+'</td>'
      +'<td style="padding:4px 8px"><input type="number" class="fw-in" style="width:65px" '
      +'value="'+t[key]+'" min="'+min+'" max="'+max+'" step="'+step+'" '
      +'data-taylor-key="'+key+'"/></td>'
      +'<td style="font-size:10px;color:var(--color-text-tertiary);padding:4px 8px">'+unit+'</td></tr>';
  };

  const trField = (label, key, min, max, step, unit) => {
    return '<tr><td style="font-size:11px;white-space:nowrap;padding:4px 8px">'+label+'</td>'
      +'<td style="padding:4px 8px"><input type="number" class="fw-in" style="width:65px" '
      +'value="'+tr[key]+'" min="'+min+'" max="'+max+'" step="'+step+'" '
      +'data-tr-key="'+key+'"/></td>'
      +'<td style="font-size:10px;color:var(--color-text-tertiary);padding:4px 8px">'+unit+'</td></tr>';
  };

  let html = '';

  // --- Rule variant chips ---
  const variants = [
    {key:'taylor93', label:'Taylor 1993'},
    {key:'balanced', label:'Balanced'},
    {key:'cgg',      label:'CGG Inertial'},
    {key:'yellen',   label:'Yellen Alt1'},
    {key:'juddRudebusch', label:'Judd-Rudebusch'},
    {key:'finNeutral',    label:'Fin-Neutral'},
  ];
  html += '<div style="display:flex;gap:4px;background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:3px;margin-bottom:6px;width:fit-content;flex-wrap:wrap">';
  variants.forEach(v => {
    const isAct = ruleVariant === v.key;
    html += '<div class="fw-tab'+(isAct?' act':'')+'" data-rule-variant="'+v.key+'" style="cursor:pointer'+(v.key==='juddRudebusch'&&isAct?';border-color:var(--c-taylor)':'')+(v.key==='finNeutral'&&isAct?';border-color:var(--c-fin-neutral)':'')+'">';
    html += v.label;
    if(v.key==='juddRudebusch') html += ' <span style="font-size:8px;color:var(--c-taylor);margin-left:2px">★</span>';
    if(v.key==='finNeutral') html += ' <span style="font-size:8px;color:var(--c-fin-neutral);margin-left:2px">●</span>';
    html += '</div>';
  });
  html += '</div>';
  html += '<div style="font-size:10px;color:var(--color-text-tertiary);margin-bottom:1rem;line-height:1.5">Signal source: Judd-Rudebusch ECM (highest predictive R² for FFTR changes, Bieri-Chincarini 2005 Exhibit 7)</div>';

  // Summary cards
  html += '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:8px;margin-bottom:1rem">';
  html += '<div class="fw-stat"><div class="fw-stat-l">JR ECM</div><div class="fw-stat-v" style="color:var(--c-taylor)">'+(jrNow!==undefined?jrNow.toFixed(2):'--')+'%</div><div class="fw-stat-s">signal source</div></div>';
  html += '<div class="fw-stat"><div class="fw-stat-l">Classic Taylor</div><div class="fw-stat-v" style="color:var(--c-taylor);opacity:.7">'+(classicNow!==undefined?classicNow.toFixed(2):'--')+'%</div><div class="fw-stat-s">Taylor \'93</div></div>';
  html += '<div class="fw-stat"><div class="fw-stat-l">Yellen Alt1</div><div class="fw-stat-v" style="color:var(--c-taylor-mod)">'+(yellenNow!==undefined?yellenNow.toFixed(2):'--')+'%</div><div class="fw-stat-s">unemployment gap</div></div>';
  html += '<div class="fw-stat"><div class="fw-stat-l">Current EFFR</div><div class="fw-stat-v" style="color:var(--c-cme)">'+effrStart.toFixed(2)+'%</div><div class="fw-stat-s">from ZQ chain</div></div>';
  html += '<div class="fw-stat"><div class="fw-stat-l">JR gap</div><div class="fw-stat-v" style="color:'+(gapNow>0.05?'var(--color-text-danger)':gapNow<-0.05?'var(--color-text-info)':'var(--color-text-secondary)')+'">'+(gapNow>0?'+':'')+gapNow.toFixed(2)+'</div><div class="fw-stat-s">'+(gapNow>0.05?'policy too loose':gapNow<-0.05?'policy too tight':'near neutral')+'</div></div>';
  html += '<div class="fw-stat"><div class="fw-stat-l">r* neutral</div><div class="fw-stat-v">'+rNeutral.toFixed(2)+'%</div><div class="fw-stat-s">r*+π*</div></div>';
  html += '<div class="fw-stat"><div class="fw-stat-l" style="color:var(--c-fin-neutral)">Fin-neutral</div><div class="fw-stat-v" style="color:var(--c-fin-neutral)">'+(fnNow!==undefined?fnNow.toFixed(2):'--')+'%</div><div class="fw-stat-s">JR + λ·NFCI (Borio)</div></div>';
  html += '</div>';

  // Parameter tables side by side
  html += '<div class="k-grid" style="margin-bottom:14px">';

  // Macro inputs
  html += '<div class="k-panel"><div class="k-hdr"><span class="k-title">Macro inputs</span></div>';
  html += '<table class="fwt"><thead><tr><th>Parameter</th><th>Value</th><th></th></tr></thead><tbody>';
  html += paramField('Inflation target (π*)', 'piStar', 0, 10, 0.1, '%');
  html += paramField('Current PCE inflation', 'piNow', -2, 15, 0.1, '% yr/yr');
  html += paramField('End-horizon PCE forecast', 'piEnd', -2, 15, 0.1, '% yr/yr');
  html += paramField('Potential GDP growth (y*)', 'yStar', -2, 8, 0.1, '%');
  html += paramField('Current GDP growth', 'yNow', -5, 10, 0.1, '%');
  html += paramField('End-horizon GDP forecast', 'yEnd', -5, 10, 0.1, '%');
  html += paramField('Neutral real rate (r*)', 'rStar', -2, 5, 0.1, '%');
  html += '</tbody></table>';
  // Borio r* toggle
  html += '<div style="margin-top:8px;padding:6px 8px;border-radius:var(--border-radius-md);background:'+(tr.useFinCycleRstar?'rgba(13,148,136,.08)':'transparent')+';border:.5px solid '+(tr.useFinCycleRstar?'var(--c-fin-neutral)':'var(--color-border-tertiary)')+'">';
  html += '<label style="display:flex;align-items:center;gap:6px;font-size:11px;cursor:pointer;color:var(--color-text-secondary)">';
  html += '<input type="checkbox" data-borio-rstar '+(tr.useFinCycleRstar?'checked':'')+'/>';
  html += 'Use finance-cycle adjusted r* (Borio 2016, Pillar II)</label>';
  if(tr.useFinCycleRstar){
    const adjR=finance.rstarAdj||0.5;
    const lwR=tr.naturalRate||0.5;
    const corrBp=((adjR-lwR)*100).toFixed(0);
    html += '<div style="font-size:10px;color:var(--c-fin-neutral);margin-top:4px">Adjusted r*: <b>'+adjR.toFixed(3)+'%</b> (LW: '+lwR.toFixed(2)+'% + '+corrBp+'bp correction)</div>';
  }
  html += '</div>';
  // Gap measure toggle
  html += '<div style="margin-top:8px;display:flex;gap:4px;align-items:center">';
  html += '<span style="font-size:10px;color:var(--color-text-tertiary);margin-right:4px">Gap measure:</span>';
  html += '<div data-gap-measure="output" class="fw-tab'+(tr.gapMeasure==='output'||!tr.gapMeasure?' act':'')+'" style="cursor:pointer;font-size:10px;padding:3px 8px">GDP output gap</div>';
  html += '<div data-gap-measure="unemployment" class="fw-tab'+(tr.gapMeasure==='unemployment'?' act':'')+'" style="cursor:pointer;font-size:10px;padding:3px 8px">Unemployment gap (2×)</div>';
  html += '</div>';
  // Unemployment fields (shown when unemployment gap selected)
  if(tr.gapMeasure==='unemployment'){
    html += '<table class="fwt" style="margin-top:6px"><tbody>';
    html += trField('Unemployment rate (u)', 'unemploymentRate', 0, 15, 0.1, '%');
    html += trField('Natural rate (u*)', 'unemploymentNatural', 0, 10, 0.1, 'NAIRU');
    html += '</tbody></table>';
  }
  html += '<div class="k-note">PCE = personal consumption expenditures price index. Inflation and output are linearly interpolated across meetings.</div>';
  html += '</div>';

  // Rule coefficients + JR parameters
  html += '<div class="k-panel"><div class="k-hdr"><span class="k-title">Rule coefficients</span></div>';
  html += '<table class="fwt"><thead><tr><th>Parameter</th><th>Value</th><th></th></tr></thead><tbody>';
  html += paramField('Classic α (inflation)', 'alphaClassic', 0, 5, 0.1, 'Taylor \'93');
  html += paramField('Classic β (output gap)', 'betaClassic', 0, 5, 0.1, 'Taylor \'93');
  html += paramField('Balanced α (inflation)', 'alphaBalanced', 0, 5, 0.1, 'Yellen \'12');
  html += paramField('Balanced β (output gap)', 'betaBalanced', 0, 5, 0.1, 'Yellen \'12');
  html += paramField('Inertia ρ (smoothing)', 'inertia', 0, 0.99, 0.05, 'Clarida-Gali-Gertler');
  html += '</tbody></table>';
  // JR ECM parameters
  html += '<div style="margin-top:10px;padding-top:8px;border-top:.5px solid var(--color-border-tertiary)">';
  html += '<div style="font-size:10px;font-weight:500;color:var(--c-taylor);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px">Judd-Rudebusch ECM parameters</div>';
  html += '<table class="fwt"><tbody>';
  html += trField('λ₁ (inflation weight)', 'jrLambda1', 0.5, 3.0, 0.25, 'Eq. 23');
  html += trField('λ₂ (gap weight)', 'jrLambda2', 0.0, 2.0, 0.25, 'Eq. 23');
  html += trField('λ₃ (lagged gap)', 'jrLambda3', 0.0, 1.0, 0.10, 'Eq. 23');
  html += trField('γ (adjustment speed)', 'jrGamma', 0.50, 0.99, 0.05, 'Eq. 24');
  html += '</tbody></table>';
  html += '</div>';
  html += '<div class="k-note"><b>Classic:</b> r = r* + π* + α(π − π*) + β(y − y*). Taylor 1993: α=1.5, β=0.5.<br>';
  html += '<b>Balanced:</b> α=1.0, β=1.0 (Yellen 2012). <b>Inertial:</b> r<sub>t</sub> = ρ r<sub>t-1</sub> + (1−ρ) r<sub>Taylor</sub>.<br>';
  html += '<b>JR ECM:</b> i*<sub>t</sub> = r* + π* + λ₁(π−π*) + λ₂·gap<sub>t</sub> + λ₃·gap<sub>t-1</sub>; Δi<sub>t</sub> = γ(i*<sub>t</sub> − i<sub>t-1</sub>).</div>';
  html += '</div></div>';

  // Main chart — now includes JR path
  html += '<div class="k-panel" style="margin-bottom:14px">';
  html += '<div class="k-hdr"><span class="k-title">Prescribed rate path vs CME market-implied path</span></div>';
  html += taylorChartSvg(meetings, states, lb, effrStart, taylorPaths, t, jrImpliedPath, fnImpliedPath);
  html += '<div class="k-note">Heavy rose solid = Judd-Rudebusch ECM (signal source). Dashed rose = classic Taylor 1993. Light dashed = balanced approach (Yellen). Dotted = CGG inertial. Teal dashed = finance-neutral (Borio 2012). Blue = CME futures-implied expected EFFR. Gray dashed = neutral rate r*+π*.</div>';
  html += '</div>';

  // Gap chart
  html += '<div class="k-panel" style="margin-bottom:14px">';
  html += '<div class="k-hdr"><span class="k-title">Taylor−CME gap (prescriptive minus market)</span></div>';
  html += taylorGapSvg(meetings, cmeRates, taylorPaths.classic, taylorPaths.balanced);
  html += '<div class="k-note">Positive gap = Taylor says policy is too loose (rate should be higher). Negative = Taylor says policy is too tight. Solid = classic, dashed = balanced. Red/blue coloring at ±5bp threshold.</div>';
  html += '</div>';

  // Decomposition table — now includes JR column
  html += '<div class="k-panel" style="margin-bottom:14px">';
  html += '<div class="k-hdr"><span class="k-title">Meeting-by-meeting decomposition</span></div>';
  html += '<div style="overflow-x:auto"><table class="fwt"><thead><tr><th>Meeting</th><th>Interp. π</th><th>Interp. y</th><th>Classic</th><th>Balanced</th><th>JR ECM</th><th style="color:var(--c-fin-neutral)">Fin-neutral</th><th>CME</th><th>JR gap</th></tr></thead><tbody>';
  const n = meetings.length;
  for (let i = 0; i < n; i++) {
    const t2 = n > 1 ? i / (n - 1) : 0;
    const pi = t.piNow + t2 * (t.piEnd - t.piNow);
    const y = t.yNow + t2 * (t.yEnd - t.yNow);
    const jrRate = jrImpliedPath[i] !== undefined ? jrImpliedPath[i] : 0;
    const gap = jrRate - cmeRates[i];
    const gCol = gap > 0.05 ? 'var(--color-text-danger)' : gap < -0.05 ? 'var(--color-text-info)' : 'var(--color-text-secondary)';
    const shortLbl = meetings[i].label.split('–')[0] || meetings[i].lb;
    html += '<tr>';
    html += '<td style="white-space:nowrap;font-size:11px">' + shortLbl + '</td>';
    html += '<td style="font-family:var(--font-mono)">' + pi.toFixed(2) + '%</td>';
    html += '<td style="font-family:var(--font-mono)">' + y.toFixed(2) + '%</td>';
    html += '<td style="font-family:var(--font-mono);color:var(--c-taylor);opacity:.7">' + taylorPaths.classic[i].toFixed(2) + '%</td>';
    html += '<td style="font-family:var(--font-mono);color:var(--c-taylor-mod)">' + taylorPaths.balanced[i].toFixed(2) + '%</td>';
    html += '<td style="font-family:var(--font-mono);font-weight:600;color:var(--c-taylor)">' + jrRate.toFixed(2) + '%</td>';
    html += '<td style="font-family:var(--font-mono);color:var(--c-fin-neutral)">' + (fnImpliedPath[i]!==undefined?fnImpliedPath[i].toFixed(2):'--') + '%</td>';
    html += '<td style="font-family:var(--font-mono);color:var(--c-cme)">' + cmeRates[i].toFixed(2) + '%</td>';
    html += '<td style="font-family:var(--font-mono);color:' + gCol + '">' + (gap > 0 ? '+' : '') + gap.toFixed(2) + '</td>';
    html += '</tr>';
  }
  html += '</tbody></table></div>';
  html += '<div class="k-note">Inflation and output gap are linearly interpolated from current to end-of-horizon values across meeting dates. Gap = JR ECM minus CME implied.</div>';
  html += '</div>';

  // Rule comparison matrix
  html += '<div class="k-panel" style="margin-top:12px">';
  html += '<div class="k-hdr"><span class="k-title">Rule comparison matrix — all variants at current inputs</span>';
  html += '<span class="k-contract">Bieri-Chincarini (2005) Exhibit 7 · Atlanta Fed Taylor Rule Utility</span></div>';
  html += '<div style="overflow-x:auto">';
  html += buildRuleComparisonTable(trRates, effrStart, lb);
  html += '</div>';
  html += '<div class="k-note">Judd-Rudebusch ECM is the signal source for the riding calculator filter — it has the highest R² for predicting actual FFTR changes (Exhibit 7: R²=7.68% vs 6.79% for static Taylor, both significant at 95%). The lagged gap term λ₃ captures Fed momentum: when the output gap is persistent, the ECM prescribes continued adjustment in the same direction. Rule disagreement (different signals across variants) is itself informative — it indicates genuine policy uncertainty rather than mechanical rule-following.</div>';
  html += '</div>';

  // Wire onchange events for parameter inputs + variant chips + gap measure
  useEffect(() => {
    const taylorHandler = (e) => {
      const key = e.target.dataset.taylorKey;
      if (!key) return;
      const val = parseFloat(e.target.value);
      if (!isNaN(val)) dispatch({type: 'UPDATE_TAYLOR', key, value: val});
    };
    const trHandler = (e) => {
      const key = e.target.dataset.trKey;
      if (!key) return;
      const val = parseFloat(e.target.value);
      if (!isNaN(val)) dispatch({type: 'UPDATE_TR', key, value: val});
    };
    const variantHandler = (e) => {
      const v = e.currentTarget.dataset.ruleVariant;
      if (v) dispatch({type: 'UPDATE_TR', key: 'ruleVariant', value: v});
    };
    const gapHandler = (e) => {
      const v = e.currentTarget.dataset.gapMeasure;
      if (v) dispatch({type: 'UPDATE_TR', key: 'gapMeasure', value: v});
    };
    const borioHandler = (e) => {
      dispatch({type:'UPDATE_TR', key:'useFinCycleRstar', value:e.target.checked});
    };
    document.querySelectorAll('[data-taylor-key]').forEach(el => el.addEventListener('change', taylorHandler));
    document.querySelectorAll('[data-tr-key]').forEach(el => el.addEventListener('change', trHandler));
    document.querySelectorAll('[data-rule-variant]').forEach(el => el.addEventListener('click', variantHandler));
    document.querySelectorAll('[data-gap-measure]').forEach(el => el.addEventListener('click', gapHandler));
    document.querySelectorAll('[data-borio-rstar]').forEach(el => el.addEventListener('change', borioHandler));
    return () => {
      document.querySelectorAll('[data-taylor-key]').forEach(el => el.removeEventListener('change', taylorHandler));
      document.querySelectorAll('[data-tr-key]').forEach(el => el.removeEventListener('change', trHandler));
      document.querySelectorAll('[data-rule-variant]').forEach(el => el.removeEventListener('click', variantHandler));
      document.querySelectorAll('[data-gap-measure]').forEach(el => el.removeEventListener('click', gapHandler));
      document.querySelectorAll('[data-borio-rstar]').forEach(el => el.removeEventListener('change', borioHandler));
    };
  });

  return <SvgPanel html={html}/>;
}

function YieldCurveTab({state, dispatch, finance, fetching, setFetching, refreshStatus, setRefreshStatus, apiKey}) {
  const {nsFitParams, nsCurvePoints, nsForwardPoints, nsFactors, scenarioCurves, syncedYcD, qtShocks, qtShockedParams} = finance;
  const [selectedMeeting, setSelectedMeeting] = React.useState(null);
  const [showAll, setShowAll] = React.useState(false);
  const [model, setModel] = React.useState('ns');

  // Bridge for onchange in HTML string inputs
  window.__ycDispatch = (i, v) => dispatch({type:'UPDATE_YC_RATE', i, value:parseFloat(v)||state.ycD[i].rate});

  // -- Fetch bar --
  const fetchStatus = refreshStatus?.yc || 'Seed data — 3mo/6mo/1yr from ZQ chain · 2yr–30yr enter manually or fetch';
  const isFetching = fetching?.yc || false;

  // -- Curve SVG --
  function buildCurveChart() {
    const W=720, H=170, mt=24, mb=30, ml=40, mr=16;
    const allRates = [...syncedYcD.map(d=>d.rate), ...nsCurvePoints.map(d=>d.rate)];
    const minR = Math.min(...allRates) - 0.15;
    const maxR = Math.max(...allRates) + 0.15;
    const xs = m => ml + (Math.log(m+0.1)/Math.log(30.1)) * (W-ml-mr);
    const ys = v => mt + H * (1-(v-minR)/(maxR-minR));
    let svg = '<svg viewBox="0 0 '+W+' '+(H+mt+mb)+'" style="width:100%;display:block;overflow:visible">';

    // Y grid
    const step=0.25;
    for(let y=Math.ceil(minR/step)*step; y<=maxR; y+=step){
      svg+='<line x1="'+ml+'" y1="'+ys(y).toFixed(1)+'" x2="'+(W-mr)+'" y2="'+ys(y).toFixed(1)+'" stroke="var(--color-border-tertiary)" stroke-width=".5"/>';
      svg+='<text x="'+(ml-4).toFixed(1)+'" y="'+ys(y).toFixed(1)+'" text-anchor="end" dominant-baseline="middle" font-size="8" fill="var(--color-text-tertiary)" font-family="var(--font-mono)">'+y.toFixed(2)+'</text>';
    }

    // X axis labels (log scale maturity)
    [{m:0.25,l:'3mo'},{m:0.5,l:'6mo'},{m:1,l:'1yr'},{m:2,l:'2yr'},{m:5,l:'5yr'},{m:10,l:'10yr'},{m:30,l:'30yr'}].forEach(function(d){
      svg+='<line x1="'+xs(d.m).toFixed(1)+'" y1="'+mt+'" x2="'+xs(d.m).toFixed(1)+'" y2="'+(mt+H).toFixed(1)+'" stroke="var(--color-border-tertiary)" stroke-width=".3" stroke-dasharray="2,3"/>';
      svg+='<text x="'+xs(d.m).toFixed(1)+'" y="'+(mt+H+14).toFixed(1)+'" text-anchor="middle" font-size="8" fill="var(--color-text-tertiary)" font-family="var(--font-sans)">'+d.l+'</text>';
    });

    // Scenario shocked curves (if any)
    var curvesToShow = showAll ? scenarioCurves : (selectedMeeting ? scenarioCurves.filter(function(c){return c.meetingLb===selectedMeeting;}) : []);
    curvesToShow.forEach(function(sc, idx) {
      var opacity = showAll ? (0.12 + idx*(0.7/Math.max(scenarioCurves.length-1,1))).toFixed(2) : '0.7';
      var pts = Array.from({length:80},function(_,i){var m=0.08+(i/79)*29.92;return xs(m).toFixed(1)+','+ys(nsYield(m,sc.params)).toFixed(1);}).join(' ');
      svg+='<polyline points="'+pts+'" fill="none" stroke="var(--c-overlay)" stroke-width="1.5" opacity="'+opacity+'" stroke-dasharray="4,2"/>';
    });

    // QT shock curve (sky-blue dashed)
    if(qtShockedParams){
      var qtPts = Array.from({length:80},function(_,i){var m=0.08+(i/79)*29.92;return xs(m).toFixed(1)+','+ys(nsYield(m,qtShockedParams)).toFixed(1);}).join(' ');
      svg+='<polyline points="'+qtPts+'" fill="none" stroke="var(--c-bs)" stroke-width="1.8" stroke-dasharray="8,4" opacity=".7"/>';
    }

    // NS instantaneous forward (dashed amber)
    var fwdPts = nsForwardPoints.map(function(d){return xs(d.mat).toFixed(1)+','+ys(d.rate).toFixed(1);}).join(' ');
    svg+='<polyline points="'+fwdPts+'" fill="none" stroke="var(--c-overlay)" stroke-width="1.2" stroke-dasharray="3,3" opacity=".5"/>';

    // NS spot curve (amber solid)
    var nsPts = nsCurvePoints.map(function(d){return xs(d.mat).toFixed(1)+','+ys(d.rate).toFixed(1);}).join(' ');
    svg+='<polyline points="'+nsPts+'" fill="none" stroke="var(--c-overlay)" stroke-width="2" opacity=".9"/>';

    // Raw data points -- connect with gray line first
    for(var i=0;i<syncedYcD.length-1;i++){
      var a=syncedYcD[i], b=syncedYcD[i+1];
      svg+='<line x1="'+xs(a.mat).toFixed(1)+'" y1="'+ys(a.rate).toFixed(1)+'" x2="'+xs(b.mat).toFixed(1)+'" y2="'+ys(b.rate).toFixed(1)+'" stroke="var(--color-border-secondary)" stroke-width="1" opacity=".5"/>';
    }
    syncedYcD.forEach(function(d){
      var col = d.src==='zq' ? 'var(--c-cme)' : 'var(--c-sofr)';
      svg+='<circle cx="'+xs(d.mat).toFixed(1)+'" cy="'+ys(d.rate).toFixed(1)+'" r="6" fill="'+col+'" opacity=".9"/>';
      svg+='<rect class="mse-hover" x="'+(xs(d.mat)-10).toFixed(1)+'" y="'+(ys(d.rate)-10).toFixed(1)+'" width="20" height="20" fill="transparent" data-label="'+d.label+' · '+(d.ticker||'')+'" data-val="'+d.rate.toFixed(3)+'%" data-sub="Source: '+(d.src==='zq'?'ZQ chain':'H.15 manual')+'"/>';
      svg+='<text x="'+xs(d.mat).toFixed(1)+'" y="'+(ys(d.rate)-10).toFixed(1)+'" text-anchor="middle" font-size="8" fill="'+col+'" font-family="var(--font-mono)">'+d.rate.toFixed(2)+'</text>';
    });

    // Legend
    svg+='<text x="'+ml+'" y="14" font-size="8.5" fill="var(--c-cme)" font-family="var(--font-sans)" font-weight="500">● ZQ-derived</text>';
    svg+='<text x="'+(ml+80)+'" y="14" font-size="8.5" fill="var(--c-sofr)" font-family="var(--font-sans)" font-weight="500">● CMT</text>';
    svg+='<text x="'+(ml+120)+'" y="14" font-size="8.5" fill="var(--c-overlay)" font-family="var(--font-sans)" font-weight="500">— NS fit</text>';
    svg+='<text x="'+(ml+168)+'" y="14" font-size="8" fill="var(--c-overlay)" font-family="var(--font-sans)" opacity=".6">--- fwd · --- scenario</text>';
    svg+='<text x="'+(ml+330)+'" y="14" font-size="8" fill="var(--c-bs)" font-family="var(--font-sans)">--- QT shock (12M)</text>';
    svg+='</svg>';
    return svg;
  }

  // -- Shock impact table --
  function buildShockTable() {
    var mats = [{m:2,l:'2yr'},{m:5,l:'5yr'},{m:10,l:'10yr'},{m:30,l:'30yr'}];
    var loadings = {2:0.50, 5:0.30, 10:0.10, 30:0.05};
    var h = '<table class="fwt"><thead><tr><th>Meeting</th><th>EFFR Δ (bp)</th>';
    mats.forEach(function(d){h+='<th>'+d.l+' Δ (bp)</th>';});
    h+='<th>10−2yr Δ (bp)</th><th>Riding signal</th></tr></thead><tbody>';
    scenarioCurves.forEach(function(sc) {
      var slopeChg = (sc.cumDeltaBp * (loadings[2] - loadings[10])).toFixed(1);
      var signal = parseFloat(slopeChg) < -5 ? '\ud83d\udfe2 Ride' : parseFloat(slopeChg) > 5 ? '\ud83d\udd34 Hold' : '\ud83d\udfe1 Marginal';
      var dc = sc.cumDeltaBp < -5 ? 'var(--color-text-info)' : sc.cumDeltaBp > 5 ? 'var(--color-text-danger)' : 'var(--color-text-tertiary)';
      h+='<tr><td style="white-space:nowrap;font-weight:500">'+sc.label+'</td>';
      h+='<td style="font-family:var(--font-mono);color:'+dc+'">'+(sc.cumDeltaBp > 0 ? '+':'')+sc.cumDeltaBp.toFixed(0)+'</td>';
      mats.forEach(function(mt){
        var d=(sc.cumDeltaBp*loadings[mt.m]).toFixed(1);
        var col=parseFloat(d)<0?'var(--color-text-info)':parseFloat(d)>0?'var(--color-text-danger)':'var(--color-text-tertiary)';
        h+='<td style="font-family:var(--font-mono);color:'+col+'">'+(parseFloat(d)>0?'+':'')+d+'</td>';
      });
      h+='<td style="font-family:var(--font-mono);color:'+(parseFloat(slopeChg)>0?'var(--color-text-danger)':'var(--color-text-info)')+'">'+(parseFloat(slopeChg)>0?'+':'')+slopeChg+'</td>';
      h+='<td>'+signal+'</td></tr>';
    });
    // QT shock row
    if(qtShocks){
      var qtTotal=Object.values(qtShocks).reduce(function(s,v){return s+v;},0)/Object.keys(qtShocks).length;
      h+='<tr style="border-top:1.5px solid var(--color-border-secondary)">';
      h+='<td style="white-space:nowrap;font-weight:500;color:var(--c-bs)">QT (12M)</td>';
      h+='<td style="font-family:var(--font-mono);color:var(--color-text-tertiary)">—</td>';
      mats.forEach(function(mt){
        var d=(qtShocks[mt.m]||0).toFixed(1);
        h+='<td style="font-family:var(--font-mono);color:var(--c-bs)">+'+d+'</td>';
      });
      var qtSlope=((qtShocks[2]||0)-(qtShocks[10]||0)).toFixed(1);
      h+='<td style="font-family:var(--font-mono);color:'+(parseFloat(qtSlope)>0?'var(--color-text-danger)':'var(--color-text-info)')+'">'+qtSlope+'</td>';
      h+='<td style="color:var(--c-bs)">KVJ+D’Amico</td></tr>';
    }
    h+='</tbody></table>';
    return h;
  }

  // -- CMT input table --
  function buildCmtTable() {
    var short = syncedYcD[0].rate;
    var h = '<table class="fwt"><thead><tr><th>Tenor</th><th>Rate (%)</th><th>Source</th><th>Spread vs 3mo (bp)</th></tr></thead><tbody>';
    syncedYcD.forEach(function(row, i) {
      var spread = ((row.rate - short) * 100).toFixed(1);
      var spreadCol = parseFloat(spread) > 0 ? 'var(--color-text-success)' : parseFloat(spread) < 0 ? 'var(--color-text-danger)' : 'var(--color-text-tertiary)';
      var srcBadge = row.src==='live'
        ? '<span class="k-pill k-up">live</span>'
        : row.src==='zq'
          ? '<span class="k-pill" style="background:var(--c-cme-a);color:var(--c-cme)">ZQ</span>'
          : '<span class="k-pill k-neu">manual</span>';
      h+='<tr><td style="font-weight:500;font-family:var(--font-mono)">'+row.label+'</td>';
      h+='<td><input class="fw-in" type="number" step="0.01" min="0" max="20" value="'+row.rate.toFixed(2)+'" '+(row.editable?'':'disabled style="opacity:.6"')+' style="width:68px" onchange="window.__ycDispatch('+i+', this.value)"/>';
      h+='<span style="font-size:10px;color:var(--color-text-tertiary);margin-left:4px">%</span></td>';
      h+='<td>'+srcBadge+'</td>';
      h+='<td style="font-family:var(--font-mono);color:'+spreadCol+'">'+(parseFloat(spread)>0?'+':'')+spread+' bp</td></tr>';
    });
    h+='</tbody></table>';
    return h;
  }

  var slope10_2 = ((syncedYcD[5].rate - syncedYcD[3].rate)*100).toFixed(1);
  var slope2_3mo = ((syncedYcD[3].rate - syncedYcD[0].rate)*100).toFixed(1);
  var curveShape = parseFloat(slope10_2) > 50 ? 'Normal / steep' : parseFloat(slope10_2) > 10 ? 'Normal / flat' : parseFloat(slope10_2) > -10 ? 'Near flat / mixed' : 'Inverted';

  return (
    <div>
      {/* Fetch bar */}
      <div className="k-fetch-bar">
        <button className="refresh-btn" disabled={isFetching}
          onClick={()=>fetchYieldCurve(state, dispatch, apiKey, setFetching, setRefreshStatus)}>
          {isFetching ? '⟳ ...' : '⟳ Fetch CMT rates'}
        </button>
        <span className="k-seed-note">{fetchStatus}</span>
        <span style={{marginLeft:'auto',fontSize:'10px',color:'var(--color-text-tertiary)',display:'flex',gap:'10px'}}>
          <span><span className="k-dot" style={{background:'var(--c-cme)'}}></span> ZQ-derived</span>
          <span><span className="k-dot" style={{background:'var(--c-sofr)'}}></span> CMT</span>
          <span><span className="k-dot" style={{background:'var(--c-overlay)'}}></span> NS fit</span>
        </span>
      </div>

      {/* CMT input table */}
      <div className="k-panel" style={{marginBottom:'12px'}}>
        <div className="k-hdr">
          <span className="k-title">Treasury CMT par rates — input grid</span>
          <span className="k-contract">Federal Reserve H.15 · daily</span>
        </div>
        <div style={{overflowX:'auto'}} dangerouslySetInnerHTML={{__html: buildCmtTable()}}/>
        <div style={{display:'flex',gap:'8px',flexWrap:'wrap',marginTop:'8px'}}>
          {[
            {l:'10yr−2yr slope', v:slope10_2+'bp', col:parseFloat(slope10_2)>0?'var(--color-text-success)':'var(--color-text-danger)'},
            {l:'2yr−3mo slope',  v:slope2_3mo+'bp', col:parseFloat(slope2_3mo)>0?'var(--color-text-success)':'var(--color-text-danger)'},
            {l:'Curve shape', v:curveShape, col:'var(--color-text-primary)'},
            {l:'NS RMSE', v:nsFactors.rmse.toFixed(1)+'bp', col:'var(--c-overlay)'},
          ].map(function(d){return(
            <div key={d.l} className="fw-stat" style={{padding:'6px 10px'}}>
              <div className="fw-stat-l">{d.l}</div>
              <div className="fw-stat-v" style={{fontSize:'15px',color:d.col}}>{d.v}</div>
            </div>
          );})}
        </div>
      </div>

      {/* NS factor cards */}
      <div className="k-panel" style={{marginBottom:'12px'}}>
        <div className="k-hdr">
          <span className="k-title">Nelson-Siegel factors</span>
          <span style={{display:'flex',gap:'6px',alignItems:'center'}}>
            <span style={{fontSize:'10px',color:'var(--color-text-tertiary)'}}>Model:</span>
            {['ns','nss'].map(function(m){return(
              <button key={m} onClick={()=>setModel(m)}
                style={{padding:'2px 8px',fontSize:'10px',cursor:'pointer',borderRadius:'10px',border:'.5px solid '+(model===m?'var(--c-overlay)':'var(--color-border-secondary)'),background:model===m?'var(--c-overlay-a)':'transparent',color:model===m?'var(--c-overlay)':'var(--color-text-secondary)'}}>
                {m.toUpperCase()}
              </button>
            );})}
            {model==='nss'&&<span style={{fontSize:'10px',color:'var(--color-text-tertiary)'}}>(Svensson — Phase 3 extension)</span>}
          </span>
        </div>
        {(()=>{
          const rStar=state.trD?.naturalRate||0.5;
          const piStar=state.trD?.inflationTarget||2.0;
          const safetyPct=(finance.safetyPremBp||0)/100;
          const lpEffect=finance.dss?finance.dss.riskPremiumEffect:0;
          const b0=nsFactors.level;
          const residual=b0-rStar-piStar-safetyPct-lpEffect;
          const bsFetched=state.bsD?.fetched;
          const seedBadge=!bsFetched?' ⚠ seed':'';
          return (<>
            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(130px,1fr))',gap:'8px'}}>
              <div className="fw-stat">
                <div className="fw-stat-l">Level β₀</div>
                <div className="fw-stat-v" style={{fontSize:'16px',color:'var(--c-overlay)'}}>{b0.toFixed(3)}%</div>
                <div className="fw-stat-s">Long-run rate</div>
              </div>
              {[
                {l:'Slope β₁', v:(nsFactors.slope>=0?'+':'')+nsFactors.slope.toFixed(3)+'%', sub:'Short−long spread', col:'var(--c-cme)'},
                {l:'Curvature β₂', v:(nsFactors.curvature>=0?'+':'')+nsFactors.curvature.toFixed(3)+'%', sub:'Hump magnitude', col:'var(--c-sofr)'},
                {l:'Decay τ', v:nsFactors.decay.toFixed(3)+' yr', sub:'Hump location', col:'var(--color-text-secondary)'},
                {l:'Term premium', v:(finance.termPremium>=0?'+':'')+finance.termPremium.toFixed(2)+'%', sub:'β₀ − EFFR', col:'var(--c-dots)'},
              ].map(function(d){return(
                <div key={d.l} className="fw-stat">
                  <div className="fw-stat-l">{d.l}</div>
                  <div className="fw-stat-v" style={{fontSize:'16px',color:d.col}}>{d.v}</div>
                  <div className="fw-stat-s">{d.sub}</div>
                </div>
              );})}
            </div>
            <div style={{marginTop:'10px',padding:'10px 12px',background:'var(--color-background-secondary)',borderRadius:'var(--border-radius-md)',border:'.5px solid var(--color-border-tertiary)'}}>
              <div style={{fontSize:'11px',fontWeight:500,color:'var(--c-overlay)',marginBottom:'6px'}}>β₀ decomposition: {b0.toFixed(3)}%</div>
              <div style={{display:'grid',gridTemplateColumns:'auto 1fr',gap:'2px 12px',fontSize:'10px',fontFamily:'var(--font-mono)'}}>
                <span style={{color:'var(--color-text-tertiary)'}}>r* + π*</span>
                <span style={{color:'var(--color-text-primary)'}}>{(rStar+piStar).toFixed(2)}%</span>
                <span style={{color:'var(--c-bs)'}}>ψ safety{seedBadge}</span>
                <span style={{color:'var(--c-bs)'}}>{safetyPct>=0?'+':''}{(safetyPct*100).toFixed(1)} bp <span style={{color:'var(--color-text-tertiary)'}}>[KVJ 2012]</span></span>
                <span style={{color:'var(--c-lp)'}}>ψ leverage{seedBadge}</span>
                <span style={{color:'var(--c-lp)'}}>{lpEffect>=0?'+':''}{(lpEffect*100).toFixed(1)} bp <span style={{color:'var(--color-text-tertiary)'}}>[DSS 2018]</span></span>
                <span style={{color:'var(--color-text-tertiary)'}}>Residual</span>
                <span style={{color:'var(--color-text-secondary)'}}>{residual>=0?'+':''}{(residual*100).toFixed(1)} bp</span>
              </div>
              <div style={{fontSize:'9px',color:'var(--color-text-tertiary)',marginTop:'6px',lineHeight:1.5}}>β₀ = r* + πᵉ + ψ_safety + ψ_leverage + residual. KVJ (2012): Treasury supply safety premium. DSS (2018): leverage/liquidity premium.</div>
            </div>
          </>);
        })()}
      </div>

      {/* Curve chart */}
      <div className="k-panel k-full" style={{marginBottom:'12px'}}>
        <div className="k-hdr">
          <span className="k-title">Yield curve — CMT data + Nelson-Siegel fit + scenario paths</span>
          <div style={{display:'flex',gap:'6px',alignItems:'center',flexWrap:'wrap'}}>
            <button onClick={()=>setShowAll(!showAll)}
              style={{padding:'2px 8px',fontSize:'10px',cursor:'pointer',borderRadius:'10px',border:'.5px solid '+(showAll?'var(--c-overlay)':'var(--color-border-secondary)'),background:showAll?'var(--c-overlay-a)':'transparent',color:showAll?'var(--c-overlay)':'var(--color-text-secondary)'}}>
              {showAll ? 'Showing all meetings' : 'Show all meetings'}
            </button>
            {!showAll && scenarioCurves.map(function(sc){return(
              <button key={sc.meetingLb} onClick={()=>setSelectedMeeting(selectedMeeting===sc.meetingLb?null:sc.meetingLb)}
                style={{padding:'2px 7px',fontSize:'10px',cursor:'pointer',borderRadius:'10px',border:'.5px solid '+(selectedMeeting===sc.meetingLb?'var(--c-overlay)':'var(--color-border-secondary)'),background:selectedMeeting===sc.meetingLb?'var(--c-overlay-a)':'transparent',color:selectedMeeting===sc.meetingLb?'var(--c-overlay)':'var(--color-text-secondary)'}}>
                {sc.label.split('–')[0].replace(/ 20\d\d/,'')}
                {sc.cumDeltaBp!==0&&<span style={{fontSize:'9px',marginLeft:'3px',opacity:.7}}>{sc.cumDeltaBp>0?'+':''}{sc.cumDeltaBp.toFixed(0)}bp</span>}
              </button>
            );})}
          </div>
        </div>
        <SvgPanel html={buildCurveChart()}/>
        <div className="k-note">Amber solid = NS spot rate fit · amber dashed = instantaneous forward rate · amber scenario lines = curve under active scenario at each FOMC meeting · sky-blue dashed = QT shock (12M runoff via KVJ 2011 + D{'’'}Amico-King 2013, links Tab 07 to Tab 10 balance sheet). X-axis is log-scaled for readability. NS RMSE: {nsFactors.rmse.toFixed(1)}bp.</div>
      </div>

      {/* Shock impact table */}
      <div className="k-panel k-full">
        <div className="k-hdr">
          <span className="k-title">Yield curve impact by FOMC meeting — Bieri-Chincarini empirical coefficients</span>
          <span className="k-contract">Exhibit 5: −25bp slope per 100bp FFTR hike</span>
        </div>
        <div style={{overflowX:'auto'}} dangerouslySetInnerHTML={{__html: buildShockTable()}}/>
        <div className="k-note">Maturity loadings: 2yr +0.50, 5yr +0.30, 10yr +0.10, 30yr +0.05 per 100bp FFR change. Slope Δ = 2yr loading minus 10yr loading × cumulative delta. Green = curve steepening (riding more favorable), red = flattening/inverting. Riding signal feeds the Phase 4 calculator.</div>
      </div>
    </div>
  );
}

function RidingTab({state, dispatch, finance}) {
  const {rideData, nsFitParams, syncedYcD} = finance;
  const MATS = ['6mo','1yr','2yr','5yr','7yr','10yr','30yr'];
  const HORIZONS = ['1mo','3mo','6mo','12mo','18mo'];
  const FILTERS = [
    {key:'positiveSlope',    label:'Positive slope'},
    {key:'positiveCushion',  label:'Positive cushion'},
    {key:'cushion75',        label:'75th pctile cushion'},
    {key:'taylorRule',       label:'Taylor rule signal'},
    {key:'cmeExpectations',  label:'CME signal'},
    {key:'ssPut',            label:'SS put signal'},
  ];

  const [showExpl, setShowExpl] = useState(false);
  const [exMI, setExMI] = useState(2);
  const [exHI, setExHI] = useState(1);

  const EXMATS_V = [0.5, 1, 2, 5, 7, 10, 30];
  const EXHORS_V = [1/12, 3/12, 0.5, 1, 1.5];

  const sel = state.rideSelected;
  const selectedCell = rideData[sel.matIdx] && rideData[sel.matIdx][sel.hIdx] ? rideData[sel.matIdx][sel.hIdx] : null;

  const signalBg = {ride:'#dcfce7', hold:'#fee2e2', marginal:'#fef9c3'};
  const signalColor = {ride:'var(--color-text-success)', hold:'var(--color-text-danger)', marginal:'var(--color-text-warning)'};

  return (
    <div>
      {/* Filter chips */}
      <div style={{display:'flex',alignItems:'center',gap:'6px',flexWrap:'wrap',padding:'10px 12px',background:'var(--color-background-secondary)',borderRadius:'var(--border-radius-md)',border:'.5px solid var(--color-border-tertiary)',marginBottom:'.75rem'}}>
        <span style={{fontSize:'10px',fontWeight:500,color:'var(--color-text-tertiary)',textTransform:'uppercase',letterSpacing:'.06em',marginRight:'4px'}}>Active filters:</span>
        {FILTERS.map(function(f){
          var on = state.rideFilters[f.key];
          return (
            <button key={f.key} onClick={()=>dispatch({type:'TOGGLE_RIDE_FILTER',key:f.key})}
              style={{padding:'3px 10px',fontSize:'11px',cursor:'pointer',borderRadius:'20px',border:'.5px solid '+(on?'var(--color-border-info)':'var(--color-border-secondary)'),background:on?'var(--color-background-info)':'transparent',color:on?'var(--color-text-info)':'var(--color-text-tertiary)',fontWeight:on?600:400}}>
              {f.label} {on?'✓':''}
            </button>
          );
        })}
      </div>

      {/* How-it-works toggle */}
      <div style={{display:'flex',alignItems:'center',gap:'8px',marginBottom:'.75rem'}}>
        <button className="refresh-btn" style={{fontSize:'11px',padding:'4px 12px'}}
          onClick={()=>setShowExpl(function(v){return !v;})}>
          How it works {showExpl ? '\u25b4' : '\u25be'}
        </button>
        {showExpl && <span style={{fontSize:'11px',color:'var(--color-text-tertiary)'}}>
          Curve seeded from live NS fit &nbsp;&middot;&nbsp; adjust instrument &amp; horizon independently of matrix
        </span>}
      </div>

      {/* Explainer panel */}
      {showExpl && (function(){
        var m = EXMATS_V[exMI], h = EXHORS_V[exHI];
        var ym  = nsYield(m,   nsFitParams);
        var ymh = nsYield(m-h, nsFitParams);
        var yh  = nsYield(h,   nsFitParams);
        var cush = m > h ? rideCushion(ym, yh, ymh, m, h) : 0;
        var hpr  = m > h ? rideHPR(ym, ymh, m, h) : 0;
        var hBH  = m > h ? rideHPR(yh, yh, h, h) : 0;
        var xhpr = m > h ? (hpr - hBH) / h : 0;
        var om   = m > h ? h / m : 0;
        var rc = cush > 15 ? 'var(--color-text-success)' : cush > 0 ? 'var(--color-text-warning)' : 'var(--color-text-danger)';
        var svgStr = m > h ? buildRideExplainerSVG(ym, ymh, yh, m, h, cush, nsFitParams) : '';
        var remM = m - h;
        var remLbl = remM < 1 ? Math.round(remM*12)+'mo' : remM.toFixed(1)+'yr';
        return (
          <div className="k-panel" style={{marginBottom:'12px'}}>
            <div className="k-hdr">
              <span className="k-title">How riding the yield curve works</span>
              <span style={{fontSize:'10px',color:'var(--color-text-tertiary)'}}>Bieri-Chincarini (2005) Eqs. 8&ndash;16</span>
            </div>
            {/* Sliders */}
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'8px',marginBottom:'10px'}}>
              <div style={{background:'var(--color-background-secondary)',borderRadius:'var(--border-radius-md)',padding:'8px 12px'}}>
                <div style={{fontSize:'10px',color:'var(--color-text-tertiary)',marginBottom:'4px',textTransform:'uppercase',letterSpacing:'.04em'}}>
                  Instrument &nbsp;<b style={{color:'var(--color-text-primary)',fontSize:'12px'}}>{MATS[exMI]}</b>
                </div>
                <input type="range" min={0} max={6} step={1} value={exMI}
                  style={{width:'100%'}} onChange={function(e){setExMI(parseInt(e.target.value));}}/>
              </div>
              <div style={{background:'var(--color-background-secondary)',borderRadius:'var(--border-radius-md)',padding:'8px 12px'}}>
                <div style={{fontSize:'10px',color:'var(--color-text-tertiary)',marginBottom:'4px',textTransform:'uppercase',letterSpacing:'.04em'}}>
                  Horizon &nbsp;<b style={{color:'var(--color-text-primary)',fontSize:'12px'}}>{HORIZONS[exHI]}</b>
                </div>
                <input type="range" min={0} max={4} step={1} value={exHI}
                  style={{width:'100%'}} onChange={function(e){setExHI(parseInt(e.target.value));}}/>
              </div>
            </div>
            {/* Stat cards */}
            <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:'8px',marginBottom:'10px'}}>
              {[
                {l:'Ann. XHPR', v:(xhpr>=0?'+':'')+(xhpr*100).toFixed(2)+'pp', s:'excess vs buy-hold', c:xhpr>0?'var(--color-text-success)':'var(--color-text-danger)'},
                {l:'Cushion',   v:(cush>=0?'+':'')+Math.round(cush)+'bp',       s:'bp to break-even',  c:rc},
                {l:'HPR (ann.)',v:(hpr/Math.max(h,0.01)*100).toFixed(2)+'%',    s:'raw holding return', c:'var(--color-text-primary)'},
                {l:'\u03c9 barbell', v:Math.round(om*100)+'%',                  s:'in riding instrument',c:'var(--color-text-primary)'},
              ].map(function(card){return (
                <div key={card.l} className="fw-stat">
                  <div className="fw-stat-l">{card.l}</div>
                  <div className="fw-stat-v" style={{fontSize:'16px',color:card.c}}>{card.v}</div>
                  <div className="fw-stat-s">{card.s}</div>
                </div>
              );})}
            </div>
            {/* SVG diagram */}
            {m > h
              ? <div style={{marginBottom:'8px'}} dangerouslySetInnerHTML={{__html: svgStr}}/>
              : <div style={{padding:'12px',textAlign:'center',fontSize:'12px',color:'var(--color-text-tertiary)'}}>
                  Instrument maturity must exceed horizon. Adjust sliders above.
                </div>
            }
            {/* Cushion gauge */}
            {m > h && <div style={{marginBottom:'8px'}}>
              <div style={{height:'12px',borderRadius:'3px',overflow:'hidden',border:'.5px solid var(--color-border-tertiary)',background:'var(--color-background-secondary)',position:'relative'}}>
                <div style={{position:'absolute',left:'50%',top:0,bottom:0,width:'1px',background:'var(--color-border-secondary)'}}/>
                {cush > 0 && <div style={{position:'absolute',left:'50%',top:0,height:'100%',width:Math.min(50,cush/2)+'%',background:cush>15?'#16a34a':'#f59e0b',opacity:.7}}/>}
                {cush < 0 && <div style={{position:'absolute',right:'50%',top:0,height:'100%',width:Math.min(50,-cush/2)+'%',background:'#dc2626',opacity:.7}}/>}
                <div style={{position:'absolute',left:'57.5%',top:0,bottom:0,width:'2px',background:'#f59e0b',opacity:.5}}/>
              </div>
              <div style={{display:'flex',justifyContent:'space-between',fontSize:'9px',color:'var(--color-text-tertiary)',marginTop:'2px'}}>
                <span>{'\u2212'}100bp</span><span>0</span><span>75th pctile (~15bp)</span><span>+100bp</span>
              </div>
            </div>}
            {/* Narrative */}
            {m > h && <div style={{fontSize:'11px',color:'var(--color-text-secondary)',padding:'7px 10px',background:'var(--color-background-secondary)',borderRadius:'var(--border-radius-md)',lineHeight:1.6}}>
              Buying <b>{MATS[exMI]}</b> at y={ym.toFixed(2)}%, holding <b>{HORIZONS[exHI]}</b>: the bond becomes
              a <b>{remLbl}</b> instrument priced at {ymh.toFixed(2)}%.
              The {Math.round(ym-ymh)}bp roll-down yield gain is the <em>riding premium</em>.
              Rates must rise more than <b>{Math.abs(Math.round(cush))}bp</b> above today&apos;s {remLbl} yield to eliminate it.
              &nbsp;Duration-neutral barbell: {'\u03c9'}={HORIZONS[exHI]}/{MATS[exMI]}={Math.round(om*100)}% in the riding instrument + {Math.round((1-om)*100)}% overnight.
            </div>}
            <div className="k-note" style={{marginTop:'8px'}}>
              Source: Bieri &amp; Chincarini (2005) &ldquo;Riding the Yield Curve: A Variety of Strategies,&rdquo; <em>Journal of Fixed Income</em>. Eqs. 8&ndash;16 (HPR, cushion) and 29&ndash;30 (barbell).
            </div>
          </div>
        );
      })()}

      {/* Matrix */}
      <div className="k-panel" style={{marginBottom:'12px'}}>
        <div className="k-hdr"><span className="k-title">HPR matrix — instrument × horizon (click cell for detail)</span></div>
        <div style={{overflowX:'auto'}}>
          <table className="fwt">
            <thead>
              <tr>
                <th>Instrument</th>
                {HORIZONS.map(function(h){return <th key={h}>{h}</th>;})}
              </tr>
            </thead>
            <tbody>
              {MATS.map(function(mat,mi){return(
                <tr key={mat}>
                  <td style={{fontWeight:500,fontFamily:'var(--font-mono)'}}>{mat}</td>
                  {HORIZONS.map(function(hor,hi){
                    var cell = rideData[mi] && rideData[mi][hi] ? rideData[mi][hi] : null;
                    if(!cell || cell.signal===undefined) return <td key={hor} style={{opacity:.3,fontSize:'11px',textAlign:'center'}}>—</td>;
                    var isSel = sel.matIdx===mi && sel.hIdx===hi;
                    return (
                      <td key={hor}
                        onClick={()=>dispatch({type:'SET_RIDE_SELECTED',matIdx:mi,hIdx:hi})}
                        style={{background:signalBg[cell.signal],cursor:'pointer',border:isSel?'2px solid var(--c-cme)':'2px solid transparent',padding:'5px 8px',minWidth:'72px'}}>
                        <div style={{fontWeight:600,fontSize:'12px',color:signalColor[cell.signal],fontFamily:'var(--font-mono)'}}>
                          {cell.annXhpr>=0?'+':''}{(cell.annXhpr*100).toFixed(2)}pp
                        </div>
                        <div style={{fontSize:'10px',color:'var(--color-text-tertiary)',marginTop:'2px'}}>
                          {cell.cushion>=0?'+':''}{cell.cushion.toFixed(0)}bp
                        </div>
                      </td>
                    );
                  })}
                </tr>
              );})}
            </tbody>
          </table>
        </div>
        <div className="k-note" style={{marginTop:'8px'}}>XHPR = annualized excess HPR vs buy-and-hold. Cushion = break-even yield change (bp). Color: \ud83d\udfe2 ride / \ud83d\udd34 hold / \ud83d\udfe1 marginal based on active filters. Source: Bieri-Chincarini (2005) Eqs. 8–16.</div>
      </div>

      {/* Cushion detail for selected cell */}
      {selectedCell && selectedCell.m > selectedCell.h && (
        <div className="k-grid" style={{marginBottom:'12px'}}>
          <div className="k-panel">
            <div className="k-hdr">
              <span className="k-title">Cushion detail — {MATS[sel.matIdx]} instrument, {HORIZONS[sel.hIdx]} horizon</span>
            </div>
            {/* Cushion gauge bar */}
            <div style={{marginBottom:'12px'}}>
              <div style={{fontSize:'22px',fontWeight:500,color:selectedCell.cushion>15?'var(--color-text-success)':selectedCell.cushion>0?'var(--color-text-warning)':'var(--color-text-danger)'}}>
                {selectedCell.cushion>=0?'+':''}{selectedCell.cushion.toFixed(0)} bp
              </div>
              <div style={{fontSize:'11px',color:'var(--color-text-secondary)',marginBottom:'8px'}}>
                Rates must rise {Math.abs(selectedCell.cushion).toFixed(0)}bp to eliminate excess return
              </div>
              <div style={{height:'16px',borderRadius:'4px',overflow:'hidden',border:'.5px solid var(--color-border-tertiary)',background:'var(--color-background-secondary)',position:'relative'}}>
                <div style={{position:'absolute',left:'50%',top:0,bottom:0,width:'1px',background:'var(--color-border-secondary)'}}/>
                {selectedCell.cushion > 0 && (
                  <div style={{position:'absolute',left:'50%',top:0,height:'100%',width:Math.min(50, selectedCell.cushion/2)+'%',background:'var(--color-text-success)',opacity:.7}}/>
                )}
                {selectedCell.cushion < 0 && (
                  <div style={{position:'absolute',right:'50%',top:0,height:'100%',width:Math.min(50, -selectedCell.cushion/2)+'%',background:'var(--color-text-danger)',opacity:.7}}/>
                )}
                {/* 75th pctile marker at ~15bp */}
                <div style={{position:'absolute',left:(50+15/2)+'%',top:0,bottom:0,width:'2px',background:'var(--color-text-warning)',opacity:.6}}/>
              </div>
              <div style={{display:'flex',justifyContent:'space-between',fontSize:'9px',color:'var(--color-text-tertiary)',marginTop:'2px'}}>
                <span>{'−'}100bp</span><span>0</span><span>75th pctile (~15bp)</span><span>+100bp</span>
              </div>
            </div>
            {/* Comparison table */}
            <table className="fwt" style={{marginTop:'8px'}}>
              <thead><tr><th>Metric</th><th>Raw ride</th><th>Duration-neutral</th></tr></thead>
              <tbody>
                <tr><td>HPR (ann.)</td>
                  <td style={{fontFamily:'var(--font-mono)'}}>{(selectedCell.hpr/selectedCell.h*100).toFixed(2)}%</td>
                  <td style={{fontFamily:'var(--font-mono)'}}>{(selectedCell.dnXR/selectedCell.h*100).toFixed(2)}%</td>
                </tr>
                <tr><td>XHPR (ann.)</td>
                  <td style={{fontFamily:'var(--font-mono)',color:'var(--color-text-info)'}}>{selectedCell.annXhpr>=0?'+':''}{(selectedCell.annXhpr*100).toFixed(2)}pp</td>
                  <td style={{fontFamily:'var(--font-mono)',color:'var(--color-text-info)'}}>{selectedCell.dnXR>=0?'+':''}{(selectedCell.dnXR/selectedCell.h*100).toFixed(2)}pp</td>
                </tr>
                <tr><td>Cushion</td>
                  <td style={{fontFamily:'var(--font-mono)'}} colSpan={2}>{selectedCell.cushion>=0?'+':''}{selectedCell.cushion.toFixed(0)} bp</td>
                </tr>
                <tr><td>Signal</td>
                  <td colSpan={2} style={{color:signalColor[selectedCell.signal],fontWeight:600,textTransform:'uppercase'}}>{selectedCell.signal}</td>
                </tr>
              </tbody>
            </table>
            {/* Taylor signal note */}
            <div style={{marginTop:'10px',padding:'6px 10px',background:'var(--color-background-secondary)',borderRadius:'var(--border-radius-md)',fontSize:'11px'}}>
              {finance.taylorSignalVal === -1 && <span style={{color:'var(--color-text-info)'}}>{'\ud83d\udccf'} Taylor rule prescribes cut → riding favorable ✓</span>}
              {finance.taylorSignalVal === +1 && <span style={{color:'var(--color-text-danger)'}}>{'\ud83d\udccf'} Taylor rule prescribes hike → riding less favorable ✗</span>}
              {finance.taylorSignalVal === 0  && <span style={{color:'var(--color-text-secondary)'}}>{'\ud83d\udccf'} Taylor rule neutral</span>}
            </div>
          </div>

          {/* Duration-neutral barbell panel */}
          <div className="k-panel">
            <div className="k-hdr"><span className="k-title">Duration-neutral barbell — ω weight</span></div>
            {selectedCell && (
              <div>
                <div style={{fontSize:'12px',color:'var(--color-text-secondary)',marginBottom:'10px'}}>
                  Targeting duration of <b>{HORIZONS[sel.hIdx]}</b> buy-and-hold = <b>{selectedCell.h.toFixed(3)} yr</b>
                </div>
                {/* Barbell visual */}
                <div style={{display:'flex',gap:'6px',alignItems:'center',marginBottom:'12px'}}>
                  <div style={{flex:selectedCell.omega,background:'var(--c-cme)',opacity:.8,height:'24px',borderRadius:'4px',display:'flex',alignItems:'center',justifyContent:'center',minWidth:'40px'}}>
                    <span style={{fontSize:'10px',color:'#fff',fontWeight:600}}>{(selectedCell.omega*100).toFixed(0)}%</span>
                  </div>
                  <div style={{flex:1-selectedCell.omega,background:'var(--color-background-secondary)',border:'.5px solid var(--color-border-secondary)',height:'24px',borderRadius:'4px',display:'flex',alignItems:'center',justifyContent:'center',minWidth:'40px'}}>
                    <span style={{fontSize:'10px',color:'var(--color-text-secondary)',fontWeight:600}}>{((1-selectedCell.omega)*100).toFixed(0)}%</span>
                  </div>
                </div>
                <div style={{fontSize:'11px',color:'var(--color-text-tertiary)',marginBottom:'10px'}}>
                  <b style={{color:'var(--c-cme)'}}>{(selectedCell.omega*100).toFixed(0)}%</b> in {MATS[sel.matIdx]} instrument &nbsp;+&nbsp;
                  <b>{((1-selectedCell.omega)*100).toFixed(0)}%</b> overnight
                  <br/>{'ω'} = (D_H {'−'} D_O) / (D_R {'−'} D_O) = ({selectedCell.h.toFixed(2)} {'−'} 0) / ({selectedCell.m.toFixed(1)} {'−'} 0)
                </div>
                {/* Return decomposition */}
                <table className="fwt">
                  <thead><tr><th>Component</th><th>Return (ann.)</th></tr></thead>
                  <tbody>
                    <tr><td>{'ω'} {'×'} riding HPR</td>
                      <td style={{fontFamily:'var(--font-mono)',color:'var(--color-text-info)'}}>
                        +{(selectedCell.omega * selectedCell.hpr/selectedCell.h * 100).toFixed(2)}pp
                      </td>
                    </tr>
                    <tr><td>(1{'−'}{'ω'}) {'×'} overnight</td>
                      <td style={{fontFamily:'var(--font-mono)'}}>{((1-selectedCell.omega)*(syncedYcD[0].rate)/100/selectedCell.h*selectedCell.h*100).toFixed(2)}pp</td>
                    </tr>
                    <tr><td>{'−'} Buy-and-hold</td>
                      <td style={{fontFamily:'var(--font-mono)',color:'var(--color-text-danger)'}}>
                        {'−'}{(Math.abs(rideHPR(nsYield(selectedCell.h,nsFitParams),nsYield(selectedCell.h,nsFitParams),selectedCell.h,selectedCell.h))/selectedCell.h*100).toFixed(2)}pp
                      </td>
                    </tr>
                    <tr style={{borderTop:'.5px solid var(--color-border-secondary)'}}>
                      <td style={{fontWeight:600}}>Duration-neutral XR</td>
                      <td style={{fontFamily:'var(--font-mono)',fontWeight:600,color:selectedCell.dnXR>=0?'var(--color-text-success)':'var(--color-text-danger)'}}>
                        {selectedCell.dnXR>=0?'+':''}{(selectedCell.dnXR/selectedCell.h*100).toFixed(2)}pp
                      </td>
                    </tr>
                  </tbody>
                </table>
              </div>
            )}
            <div className="k-note" style={{marginTop:'8px'}}>Duration-neutral riding removes the outright rate bet while preserving the curve-slope trade. {'ω'} = fraction in riding instrument. Based on Bieri-Chincarini (2005) Eqs. 29{'–'}30.</div>
          </div>

        </div>
      )}
    </div>
  );
}

// ============================================================================
// TAB 10 --- Balance Sheet & QT Monitor
// ============================================================================

function BalanceSheetTab({state, dispatch, finance}) {
  const {bsD} = state;
  const {qtChannels, steinSVR:svr, combinedStance, effrStart} = finance;

  function setBsd(key, val){ dispatch({type:'SET_BSD', key, value:parseFloat(val)||0}); }

  // --- Panel 1: Composition bar chart ---
  const W1=680, H1=220;
  const PD={t:20,r:20,b:40,l:60};
  const cw=W1-PD.l-PD.r, ch=H1-PD.t-PD.b;
  const current=bsD.totalAssets||8500, neutral=bsD.neutralFloor||6200;
  const maxVal=current*1.1;
  const yS=v=>PD.t+ch*(1-v/maxVal);
  const barW=cw*0.22;
  const treasury=bsD.treasuries||4400, mbs=bsD.mbs||2300, other=Math.max(0,current-treasury-mbs);
  const tR=treasury/current, mR=mbs/current;
  const nT=neutral*tR, nM=neutral*mR, nO=Math.max(0,neutral-nT-nM);
  const runway=bsD.monthlyRunoff>0?Math.round((current-neutral)/bsD.monthlyRunoff):999;
  const shadowBp=qtChannels?qtChannels.total.toFixed(1):'—';

  function stackBar(x, vals, colors, labels, tag){
    let svg='';
    let cumul=0;
    vals.forEach((v,i)=>{
      const h=(v/maxVal)*ch;
      const y=yS(cumul+v);
      svg+='<rect x="'+x+'" y="'+y.toFixed(1)+'" width="'+barW+'" height="'+Math.max(0,h).toFixed(1)+'" fill="'+colors[i]+'" opacity=".85" rx="1.5"/>';
      svg+='<rect class="mse-hover" x="'+x+'" y="'+y.toFixed(1)+'" width="'+barW+'" height="'+Math.max(4,h).toFixed(1)+'" fill="transparent" data-label="'+labels[i]+' · '+tag+'" data-val="$'+(v/1000).toFixed(1)+'T" data-sub="'+(v/current*100).toFixed(1)+'% of total assets"/>';
      cumul+=v;
    });
    return svg;
  }

  const x1=PD.l+cw*0.18, x2=PD.l+cw*0.58;
  const cols=['var(--c-bs)','var(--c-bs-mbs)','var(--color-border-secondary)'];
  let svg1='<svg viewBox="0 0 '+W1+' '+H1+'" style="width:100%;display:block;overflow:visible">';
  [0,2000,4000,6000,8000].forEach(v=>{
    const y=yS(v);
    svg1+='<line x1="'+PD.l+'" y1="'+y.toFixed(1)+'" x2="'+(PD.l+cw)+'" y2="'+y.toFixed(1)+'" stroke="var(--color-border-tertiary)" stroke-width=".5"/>';
    if(v>0) svg1+='<text x="'+(PD.l-6)+'" y="'+(y+3).toFixed(1)+'" text-anchor="end" font-size="9" fill="var(--color-text-tertiary)" font-family="var(--font-mono)">$'+(v/1000)+'T</text>';
  });
  const segLabels=['Treasuries','MBS','Other'];
  svg1+=stackBar(x1,[treasury,mbs,other],cols,segLabels,'Current');
  svg1+=stackBar(x2,[nT,nM,nO],cols,segLabels,'Neutral Floor');
  // neutral floor dashed line
  const nY=yS(neutral);
  svg1+='<line x1="'+PD.l+'" y1="'+nY.toFixed(1)+'" x2="'+(PD.l+cw)+'" y2="'+nY.toFixed(1)+'" stroke="var(--c-neutral-floor)" stroke-width="1.5" stroke-dasharray="6,4"/>';
  svg1+='<text x="'+(PD.l+cw-4)+'" y="'+(nY-5).toFixed(1)+'" text-anchor="end" font-size="9" fill="var(--c-neutral-floor)" font-family="var(--font-mono)">Floor ~$'+(neutral/1000).toFixed(1)+'T</text>';
  // labels
  svg1+='<text x="'+(x1+barW/2).toFixed(1)+'" y="'+(H1-8)+'" text-anchor="middle" font-size="10" fill="var(--color-text-primary)">Current</text>';
  svg1+='<text x="'+(x2+barW/2).toFixed(1)+'" y="'+(H1-8)+'" text-anchor="middle" font-size="10" fill="var(--color-text-primary)">Neutral Floor</text>';
  // runway annotation
  svg1+='<text x="'+(W1/2)+'" y="'+(H1-22)+'" text-anchor="middle" font-size="9" fill="var(--color-text-tertiary)">QT runway at $'+bsD.monthlyRunoff+'bn/mo: ~'+runway+' months to floor</text>';
  svg1+='</svg>';

  // --- Panel 2: Runoff pace vs cap ---
  const capT=25, capMBS=35;
  const actualTotal=bsD.monthlyRunoff||60;
  const actT=actualTotal*0.55, actM=actualTotal*0.45;
  const undershoot=capMBS-actM;
  const cumUndershoot=Math.round(undershoot*20);
  const W2=420, H2=150, xMax=40;
  const xSc=v=>(v/xMax)*300;
  let svg2='<svg viewBox="0 0 '+W2+' '+H2+'" style="width:100%;display:block;overflow:visible">';
  // Treasury row
  svg2+='<text x="88" y="32" text-anchor="end" font-size="10" fill="var(--color-text-primary)">Treasury</text>';
  svg2+='<rect x="95" y="18" width="'+xSc(capT).toFixed(1)+'" height="26" fill="var(--c-neutral-floor)" opacity=".25" rx="2"/>';
  svg2+='<rect x="95" y="18" width="'+xSc(actT).toFixed(1)+'" height="26" fill="var(--c-bs)" opacity=".85" rx="2"/>';
  svg2+='<text x="'+(99+xSc(actT)).toFixed(1)+'" y="36" font-size="9" fill="var(--c-bs)" font-family="var(--font-mono)">$'+actT.toFixed(0)+'bn</text>';
  svg2+='<text x="'+(99+xSc(capT)).toFixed(1)+'" y="36" font-size="9" fill="var(--c-neutral-floor)" font-family="var(--font-mono)">cap $'+capT+'bn</text>';
  // MBS row
  svg2+='<text x="88" y="82" text-anchor="end" font-size="10" fill="var(--color-text-primary)">MBS</text>';
  svg2+='<rect x="95" y="68" width="'+xSc(capMBS).toFixed(1)+'" height="26" fill="var(--c-neutral-floor)" opacity=".25" rx="2"/>';
  svg2+='<rect x="95" y="68" width="'+xSc(actM).toFixed(1)+'" height="26" fill="var(--c-bs-mbs)" opacity=".85" rx="2"/>';
  svg2+='<text x="'+(99+xSc(actM)).toFixed(1)+'" y="86" font-size="9" fill="var(--c-bs-mbs)" font-family="var(--font-mono)">$'+actM.toFixed(0)+'bn</text>';
  svg2+='<text x="'+(99+xSc(capMBS)).toFixed(1)+'" y="86" font-size="9" fill="var(--c-neutral-floor)" font-family="var(--font-mono)">cap $'+capMBS+'bn</text>';
  // undershoot note
  svg2+='<text x="10" y="120" font-size="9" fill="var(--color-text-tertiary)">MBS undershoot (est. cumulative since QT start): ~$'+cumUndershoot+'bn</text>';
  svg2+='<text x="10" y="138" font-size="9" fill="var(--color-text-tertiary)">Actual QT pace slower than cap due to low mortgage prepayments.</text>';
  svg2+='</svg>';

  // --- Panel 3: Corridor mechanics ---
  const iorb=bsD.iorb||4.40, effr=bsD.effr||4.33, tbill3=bsD.tbill3m||4.25;
  const dss=finance.dss;
  const lp=dss?dss.liquidityPremium:(tbill3-iorb);
  const svrBp=svr!=null?svr:((effr-iorb)*100);
  const svrColor=Math.abs(svrBp)<5?'var(--c-stress-lo)':Math.abs(svrBp)<15?'var(--c-leaning)':'var(--c-stress-hi)';
  const lpColor=lp>0?'var(--c-stress-lo)':lp>-0.20?'var(--c-leaning)':'var(--c-stress-hi)';
  const svrNote=Math.abs(svrBp)<5?' Ample reserves (SVR ≈ 0).':Math.abs(svrBp)<15?' Transition zone. Monitor reserves.':' ⚠ Scarce reserves. Sep 2019 episode began at ~15bp.';
  const lpNote=lp>0?' Positive: ample liquidity. Low leverage cost (DSS 2018).':lp>-0.20?' Slightly negative: tightening liquidity conditions.':' Negative: expensive leverage. Risk premia widening expected (DSS 2018).';

  // --- Panel 4: Two-instrument policy space ---
  const W4=680, H4=300;
  const P4={t:30,r:80,b:50,l:70};
  const cw4=W4-P4.l-P4.r, ch4=H4-P4.t-P4.b;
  const xMin=5, xMax4=40, yMin4=-6, yMax4=8;
  const xSc4=v=>P4.l+((v-xMin)/(xMax4-xMin))*cw4;
  const ySc4=v=>P4.t+ch4-((v-yMin4)/(yMax4-yMin4))*ch4;
  const inflation=state.trD?.inflationRate||2.8;
  const curX=(bsD.totalAssets||8500)/(bsD.gdpNominal||28500)*100;
  const curY=(bsD.effr||4.33)-inflation;
  const neutralX=(bsD.neutralFloor||6200)/(bsD.gdpNominal||28500)*100;
  const episodes=[
    {x:6,y:2.5,lb:'Pre-GFC (2007)'},{x:15,y:-2.5,lb:'QE1 (2009)'},
    {x:20,y:-3.0,lb:'QE2 (2010)'},{x:26,y:-2.8,lb:'QE3 peak (2014)'},
    {x:24,y:-1.0,lb:'QT start (2018)'},{x:19,y:-0.5,lb:'Sep-19 repo'},
    {x:37,y:-7.5,lb:'COVID (2020)'},{x:35,y:-4.0,lb:'Liftoff (Mar 22)'},
    {x:32,y:1.0,lb:'QT + hike (2023)'},
  ];

  let svg4='<svg viewBox="0 0 '+W4+' '+H4+'" style="width:100%;display:block;overflow:visible">';
  // grid
  [10,20,30].forEach(x=>{
    svg4+='<line x1="'+xSc4(x)+'" y1="'+P4.t+'" x2="'+xSc4(x)+'" y2="'+(P4.t+ch4)+'" stroke="var(--color-border-tertiary)" stroke-width=".5"/>';
    svg4+='<text x="'+xSc4(x)+'" y="'+(P4.t+ch4+14)+'" text-anchor="middle" font-size="9" fill="var(--color-text-tertiary)">'+x+'%</text>';
  });
  [-4,-2,0,2,4,6].forEach(y=>{
    svg4+='<line x1="'+P4.l+'" y1="'+ySc4(y)+'" x2="'+(P4.l+cw4)+'" y2="'+ySc4(y)+'" stroke="var(--color-border-tertiary)" stroke-width=".5"/>';
    svg4+='<text x="'+(P4.l-8)+'" y="'+(ySc4(y)+4)+'" text-anchor="end" font-size="9" fill="var(--color-text-tertiary)" font-family="var(--font-mono)">'+y+'%</text>';
  });
  // zero real EFFR line
  svg4+='<line x1="'+P4.l+'" y1="'+ySc4(0)+'" x2="'+(P4.l+cw4)+'" y2="'+ySc4(0)+'" stroke="var(--c-neutral-floor)" stroke-width="1" stroke-dasharray="4,3"/>';
  // neutral floor vertical
  svg4+='<line x1="'+xSc4(neutralX)+'" y1="'+P4.t+'" x2="'+xSc4(neutralX)+'" y2="'+(P4.t+ch4)+'" stroke="var(--c-neutral-floor)" stroke-width="1.2" stroke-dasharray="6,4"/>';
  svg4+='<text x="'+(xSc4(neutralX)+3)+'" y="'+(P4.t+14)+'" font-size="9" fill="var(--c-neutral-floor)">Floor</text>';
  // episodes
  episodes.forEach(ep=>{
    const ex=xSc4(ep.x), ey=ySc4(ep.y);
    svg4+='<circle cx="'+ex+'" cy="'+ey+'" r="3.5" fill="none" stroke="var(--color-text-tertiary)" stroke-width="1"/>';
    svg4+='<text x="'+(ex+6)+'" y="'+(ey+3)+'" font-size="7.5" fill="var(--color-text-tertiary)">'+ep.lb+'</text>';
    // Hover target centered on episode dot
    svg4+='<rect class="mse-hover" x="'+(ex-10).toFixed(1)+'" y="'+(ey-10).toFixed(1)+'" width="20" height="20" fill="transparent"'
      +' data-label="'+ep.lb+'"'
      +' data-val="BS: '+ep.x+'% GDP · Real EFFR: '+(ep.y>0?'+':'')+ep.y+'%"'
      +' data-sub="Hover for episode context"/>';
  });
  // current position
  svg4+='<circle cx="'+xSc4(curX)+'" cy="'+ySc4(curY)+'" r="7" fill="var(--c-combined)" opacity=".9"/>';
  svg4+='<text x="'+(xSc4(curX)+10)+'" y="'+(ySc4(curY)+4)+'" font-size="10" font-weight="bold" fill="var(--c-combined)">Now</text>';
  svg4+='<rect class="mse-hover" x="'+(xSc4(curX)-12).toFixed(1)+'" y="'+(ySc4(curY)-12).toFixed(1)+'" width="24" height="24" fill="transparent"'
    +' data-label="Current position (2026)"'
    +' data-val="BS: '+curX.toFixed(1)+'% GDP · Real EFFR: '+(curY>0?'+':'')+curY.toFixed(2)+'%"'
    +' data-sub="Ongoing QT + easing cycle · Combined stance: '+combinedStance.toFixed(2)+'%"/>';
  // axis labels
  svg4+='<text x="'+(P4.l+cw4/2)+'" y="'+(H4-8)+'" text-anchor="middle" font-size="10" fill="var(--color-text-primary)">Fed Total Assets (% of GDP)</text>';
  svg4+='<text x="14" y="'+(P4.t+ch4/2)+'" text-anchor="middle" font-size="10" fill="var(--color-text-primary)" transform="rotate(-90 14 '+(P4.t+ch4/2)+')">Real EFFR (%)</text>';
  svg4+='</svg>';

  return (
    <div>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:'8px',marginBottom:'10px'}}>
        <div>
          <h3 style={{fontSize:'15px',fontWeight:600,margin:0}}>Balance Sheet &amp; QT Monitor</h3>
          <div style={{fontSize:'10px',color:'var(--color-text-tertiary)',marginTop:'2px'}}>
            <span className="data-badge">{bsD.fetched?'live':'seed'}</span>
            {' '}{bsD.source}{bsD.asOf?' · '+bsD.asOf:''}
          </div>
        </div>
        <button className="refresh-btn" onClick={()=>fetchBalanceSheet(dispatch)}>&#x27f3; Fetch H.4.1</button>
      </div>

      <div className="k-grid">
        <div className="k-panel k-full" style={{marginBottom:'12px'}}>
          <div className="k-hdr">
            <span className="k-title">① Balance Sheet Composition</span>
            <span style={{fontSize:'10px',color:'var(--color-text-tertiary)'}}>
              KVJ (2011) shadow rate: <b style={{color:parseFloat(shadowBp)>0?'var(--c-stress-hi)':'var(--c-stress-lo)'}}>{shadowBp} bp</b>
            </span>
          </div>
          <div dangerouslySetInnerHTML={{__html:svg1}}/>
          <div style={{display:'flex',gap:'14px',flexWrap:'wrap',fontSize:'10px',margin:'8px 0',color:'var(--color-text-secondary)'}}>
            <span style={{color:'var(--c-bs)'}}>Duration: {qtChannels?qtChannels.components.duration.toFixed(1):'—'} bp</span>
            <span>Safety: {qtChannels?qtChannels.components.safety.toFixed(1):'—'} bp</span>
