*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);background:var(--color-background-primary);color:var(--color-text-primary);padding:1.5rem;max-width:900px;margin:0 auto;transition:background .25s,color .25s}
.fw-tab{display:inline-block;padding:5px 14px;font-size:13px;cursor:pointer;border-radius:var(--border-radius-md);color:var(--color-text-secondary)}
.fw-tab.act{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);color:var(--color-text-primary);font-weight:500}
.fw-tab.tc-market{color:var(--c-cme)}
.fw-tab.tc-analytics{color:var(--c-overlay)}
.fw-tab.tc-macro{color:var(--c-fin-neutral)}
.fw-tab.act.tc-market{color:var(--c-cme);border-color:var(--c-cme)}
.fw-tab.act.tc-analytics{color:var(--c-overlay);border-color:var(--c-overlay)}
.fw-tab.act.tc-macro{color:var(--c-fin-neutral);border-color:var(--c-fin-neutral)}
.tab-group-divider{display:inline-block;width:1px;height:1.2em;background:var(--color-border-secondary);margin:0 6px;vertical-align:middle;opacity:0.5}
.fwt{width:100%;border-collapse:collapse}
.fwt th{text-align:left;padding:5px 8px;font-size:10px;font-weight:500;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:.05em;border-bottom:.5px solid var(--color-border-tertiary);white-space:nowrap}
.fwt td{padding:5px 8px;border-bottom:.5px solid var(--color-border-tertiary);font-size:12px;vertical-align:middle}
.fw-in{font-family:var(--font-mono);font-size:12px;padding:2px 5px;border:.5px solid var(--color-border-secondary);border-radius:4px;background:transparent;color:var(--color-text-primary)}
.fw-stat{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:8px 12px}
.fw-stat-l{font-size:10px;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:.04em;margin-bottom:3px}
.fw-stat-v{font-size:20px;font-weight:500}
.fw-stat-s{font-size:11px;color:var(--color-text-secondary);margin-top:1px}
.refresh-btn{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;font-size:12px;font-weight:500;background:var(--color-background-secondary);border:.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);cursor:pointer;color:var(--color-text-primary);transition:opacity .2s}
.refresh-btn:hover{opacity:.75}.refresh-btn:disabled{opacity:.4;cursor:not-allowed}
.spin{display:inline-block;animation:spin .8s linear infinite}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.data-badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;padding:2px 8px;border-radius:20px;background:var(--color-background-secondary);color:var(--color-text-tertiary)}
.data-badge.live{background:var(--color-background-success);color:var(--color-text-success)}
.dot{width:6px;height:6px;border-radius:50%;background:currentColor;display:inline-block}
.api-note{font-size:11px;color:var(--color-text-tertiary);background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:8px 12px;margin-top:6px;line-height:1.5}
.api-note code{font-family:var(--font-mono);font-size:10px;background:var(--color-background-primary);padding:1px 4px;border-radius:3px;border:.5px solid var(--color-border-tertiary)}
/* Kalshi panels */
.k-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(340px,1fr));gap:12px;margin-bottom:12px}
.k-full{grid-column:1/-1}
.k-panel{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:14px 16px;overflow:hidden}
.k-hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px;gap:6px;flex-wrap:wrap}
.k-title{font-size:12px;font-weight:500;color:var(--color-text-primary)}
.k-contract{font-size:9px;font-family:var(--font-mono);color:var(--color-text-tertiary);background:var(--color-background-primary);padding:1px 5px;border-radius:3px;border:.5px solid var(--color-border-tertiary)}
.k-note{font-size:10px;color:var(--color-text-tertiary);margin-top:6px;line-height:1.5;padding-top:6px;border-top:.5px solid var(--color-border-tertiary)}
.k-legend{display:flex;gap:12px;font-size:10px;color:var(--color-text-secondary);margin-bottom:8px;align-items:center;flex-wrap:wrap}
.k-dot{width:10px;height:10px;border-radius:2px;display:inline-block;margin-right:3px;vertical-align:middle}
.k-pill{font-size:9px;padding:1px 6px;border-radius:10px;font-weight:500;white-space:nowrap}
.k-up{background:var(--color-background-info);color:var(--color-text-info)}
.k-dn{background:var(--color-background-danger);color:var(--color-text-danger)}
.k-neu{background:var(--color-background-secondary);color:var(--color-text-tertiary)}
.k-fetch-bar{display:flex;align-items:center;gap:8px;padding:10px 0;border-bottom:.5px solid var(--color-border-tertiary);margin-bottom:14px;flex-wrap:wrap}
.k-seed-note{font-size:11px;color:var(--color-text-tertiary);background:var(--color-background-secondary);border-radius:4px;padding:4px 10px;border:.5px solid var(--color-border-tertiary)}

:root{--c-overlay:#f59e0b;--c-overlay-a:rgba(245,158,11,.13);}

  #api-key-input{max-width:240px !important}
  .fw-stat-v{font-size:17px !important}
}
nav#mse-nav{
  position:sticky;top:0;z-index:50;
  display:flex;align-items:center;gap:0;
  padding:12px 20px;
  background:var(--nav-blur);
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  border-bottom:1px solid var(--border);

.nav-logo{

  font-style:italic;color:var(--text);text-decoration:none;
  letter-spacing:.02em;transition:color .2s;
}
.nav-logo:hover{color:var(--cme-text)}
.nav-sep{color:var(--faint);font-size:12px;margin:0 10px}
.nav-tool{
  font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:500;
  color:var(--cme-text);letter-spacing:.1em;text-transform:uppercase;
}
.nav-links{display:flex;gap:14px;align-items:center;margin-left:auto}
.nav-link{
  font-size:12px;color:var(--muted);text-decoration:none;
  font-family:'JetBrains Mono',monospace;letter-spacing:.04em;
  padding:4px 0;border-bottom:2px solid transparent;
  transition:color .2s,border-color .2s;
}
.nav-link:hover{color:var(--text)}
.nav-link.active{color:var(--cme);border-bottom-color:var(--cme)}
.nav-badge{
  font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:500;
  background:rgba(59,130,246,0.12);color:var(--cme);
  padding:3px 8px;border-radius:3px;border:1px solid rgba(59,130,246,0.25);
}
.nav-theme{
  background:none;border:1px solid var(--border);color:var(--muted);
  font-size:13px;padding:4px 8px;border-radius:4px;cursor:pointer;
  transition:border-color .2s,color .2s;line-height:1;margin-left:8px;
}
.nav-theme:hover{border-color:var(--muted);color:var(--text)}
.mse-footer{
  position:fixed;bottom:0;left:0;right:0;z-index:40;
  background:var(--nav-blur);
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  border-top:1px solid var(--border);
  font-family:'JetBrains Mono',monospace;
}
.sf-main{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 24px;flex-wrap:wrap;gap:8px;
}
.sf-disclaimer{
  font-size:10px;color:var(--faint);text-align:center;
  padding:3px 24px 6px;border-top:1px solid var(--border);opacity:.7;
}
.sf-brand{font-family:'Spectral',serif;font-style:italic;color:var(--text);font-size:14px}
.sf-sep{color:var(--border);font-size:12px;margin:0 6px}
.sf-left{display:flex;align-items:center;font-size:11px;color:var(--faint)}
.sf-right{display:flex;align-items:center;gap:12px}
.sf-link{font-size:11px;color:var(--faint);text-decoration:none;transition:color .15s}
.sf-link:hover{color:var(--cme-text)}
.sf-icon{font-size:16px;color:var(--faint);text-decoration:none;transition:color .2s;line-height:1}
.sf-icon:hover{color:var(--text)}
.sf-icon.sf-yt:hover{color:#ff0000}
.sf-icon.sf-li:hover{color:#0077b5}
.sf-icon.sf-x:hover{color:var(--text)}
.sf-divider{width:1px;height:16px;background:var(--border);display:inline-block}
/* padding so footer doesn't overlap content */
body{padding-bottom:72px}
.mse-hover{cursor:pointer}
.mse-hover:hover ~ .mse-tip-g{visibility:visible}
circle:has(+ .mse-hover:hover){stroke:var(--c-cme);stroke-width:2;filter:brightness(1.1)}

function fwChain(months){
  const n=months.length,c=months.map(m=>({avg:+(100-m.price).toFixed(6),start:null,end:null}));
  for(let i=0;i<n;i++){if(!months[i].mtg){c[i].start=c[i].avg;c[i].end=c[i].avg;if(i>0&&months[i-1].mtg)c[i-1].end=c[i].avg;if(i<n-1&&months[i+1].mtg)c[i+1].start=c[i].avg;}}
  for(let r=0;r<n;r++){for(let i=n-1;i>=0;i--){const m=months[i];if(m.mtg&&c[i].end!==null&&c[i].start===null&&m.N>0)c[i].start=(c[i].avg-(m.M/(m.N+m.M))*c[i].end)/(m.N/(m.N+m.M));if(m.mtg&&c[i].start!==null&&i>0&&months[i-1].mtg&&c[i-1].end===null)c[i-1].end=c[i].start;}}
  for(let r=0;r<n;r++){for(let i=0;i<n;i++){const m=months[i];if(m.mtg&&c[i].start!==null&&c[i].end===null&&m.M>0)c[i].end=(c[i].avg-(m.N/(m.N+m.M))*c[i].start)/(m.M/(m.N+m.M));if(m.mtg&&c[i].end!==null&&i<n-1&&months[i+1].mtg&&c[i+1].start===null)c[i+1].start=c[i].end;}}
  return c;
}

function fwMeetings(months,chain){
  const res=[];
  months.forEach((m,i)=>{
    if(!m.mtg||chain[i].start===null||chain[i].end===null)return;
    const chg=chain[i].end-chain[i].start,moves=chg/0.25,abs=Math.abs(moves),char=Math.floor(abs),mant=abs-char;
    const isCut=chg<-0.0001,isHike=chg>0.0001,p0=1-mant,p1=mant;
    const b0=isCut?-char:isHike?char:0,b1=isCut?-(char+1):isHike?(char+1):0;
    const l0=b0===0?'hold':(b0>0?`+${b0*25}bp`:`${b0*25}bp`);
    const l1=b1===0?'hold':(b1>0?`+${b1*25}bp`:`${b1*25}bp`);
    res.push({lb:m.lb,label:m.ml||m.lb,start:chain[i].start,end:chain[i].end,chg,moves,p0,p1,b0,b1,l0,l1,isCut,isHike});
  });
  return res;
}

function fwDist(meetings){
  let d={'0':1.0};const states=[{'0':1.0}];
  meetings.forEach(m=>{
    const nd={};
    for(const[k,p]of Object.entries(d)){const ki=parseInt(k);nd[ki+m.b0]=(nd[ki+m.b0]||0)+p*m.p0;if(m.p1>0.0005)nd[ki+m.b1]=(nd[ki+m.b1]||0)+p*m.p1;}
    d=nd;states.push({...d});
  });
  return{states,final:d};
}

function enumeratePaths(meetings,depth){
  const paths=[];
  const mSlice=meetings.slice(0,depth);
  function dfs(idx,seq,prob){
    if(idx===mSlice.length){paths.push({key:seq.join('→'),prob});return;}
    const m=mSlice[idx];
    dfs(idx+1,[...seq,m.l0],prob*m.p0);
    if(m.p1>0.005)dfs(idx+1,[...seq,m.l1],prob*m.p1);
  }
  dfs(0,[],1);
  return paths.sort((a,b)=>b.prob-a.prob).slice(0,8);
}

// ============================================================================
// TAYLOR RULE PURE FUNCTIONS
// ============================================================================

function taylorRate(pi, piStar, y, yStar, rStar, alpha, beta) {
  // r = rStar + piStar + alpha*(pi - piStar) + beta*(y - yStar)
  // Equivalently: r = rStar + pi + (alpha-1)*(pi - piStar) + beta*(y - yStar)
  return rStar + piStar + alpha * (pi - piStar) + beta * (y - yStar);
}

function taylorInertial(prescribed, prevRate, rho) {
  // Clarida-Gali-Gertler: r_t = rho * r_{t-1} + (1 - rho) * r_taylor
  return rho * prevRate + (1 - rho) * prescribed;
}

function taylorMeetingPath(taylor, meetings, effrStart, lb) {
  const {piStar, piNow, piEnd, yStar, yNow, yEnd, rStar,
         alphaClassic, betaClassic, alphaBalanced, betaBalanced, inertia} = taylor;
  const n = meetings.length;
  const classic = [], balanced = [], inertialC = [], inertialB = [];
  let prevC = effrStart, prevB = effrStart;
  for (let i = 0; i < n; i++) {
    const t = n > 1 ? i / (n - 1) : 0;
    const pi = piNow + t * (piEnd - piNow);
    const y = yNow + t * (yEnd - yNow);
    const rc = taylorRate(pi, piStar, y, yStar, rStar, alphaClassic, betaClassic);
    const rb = taylorRate(pi, piStar, y, yStar, rStar, alphaBalanced, betaBalanced);
    classic.push(rc);
    balanced.push(rb);
    const ic = taylorInertial(rc, prevC, inertia);
    const ib = taylorInertial(rb, prevB, inertia);
    inertialC.push(ic);
    inertialB.push(ib);
    prevC = ic;
    prevB = ib;
  }
  return {classic, balanced, inertialC, inertialB};
}

function taylorRateJR(trD, prevFFR, prevGap) {
  // Judd-Rudebusch ECM --- Equations 23-25 from Bieri-Chincarini (2005).
  // Target rate from ECM specification (Eq. 23):
  //   i*_t = r* + pi* + lambda1*(pi_t - pi*) + lambda2*gap_t + lambda3*gap_{t-1}
  // where gap = outputGap (% potential GDP) or -2*(u - u*) depending on gapMeasure
  const pi       = trD.inflationRate      ?? 2.8;
  const piStar   = trD.inflationTarget    ?? 2.0;
  const rStar    = trD.naturalRate        ?? 0.5;
  const gap      = trD.gapMeasure === 'unemployment'
    ? -2 * ((trD.unemploymentRate ?? 4.1) - (trD.unemploymentNatural ?? 4.1))
    : (trD.outputGap ?? -0.5);
  const lambda1  = trD.jrLambda1 ?? 1.5;
  const lambda2  = trD.jrLambda2 ?? 0.5;
  const lambda3  = trD.jrLambda3 ?? 0.3;
  const gamma    = trD.jrGamma   ?? 0.85;

  const iStar = rStar + piStar + lambda1 * (pi - piStar) + lambda2 * gap + lambda3 * prevGap;

  // Partial adjustment toward i*_t (Eq. 24):
  //   delta_i_t = gamma*(i*_t - i_{t-1})
  //   i_t = i_{t-1} + gamma*(i*_t - i_{t-1})
  const prescribed = prevFFR + gamma * (iStar - prevFFR);
  return Math.max(0, prescribed);
}

function taylorRateYellen(trD) {
  // Yellen Alt1 --- Atlanta Fed alternative using unemployment gap and FOMC SEP r*.
  // Same form as Taylor 1993 but:
  //   gap = -2*(u - u*)  (Okun's Law approximation of output gap)
  //   r*  = FOMC SEP median longer-run real FFR (trD.naturalRate)
  //   inflation weight fixed at 1.5, gap weight fixed at 1.0 (balanced approach)
  const pi     = trD.inflationRate       ?? 2.8;
  const piStar = trD.inflationTarget     ?? 2.0;
  const rStar  = trD.naturalRate         ?? 0.5;
  const u      = trD.unemploymentRate    ?? 4.1;
  const uStar  = trD.unemploymentNatural ?? 4.1;
  const gap    = -2 * (u - uStar);
  return rStar + piStar + 1.5 * (pi - piStar) + 1.0 * gap;
}

// ============================================================================
// NELSON-SIEGEL YIELD CURVE PURE FUNCTIONS
// ============================================================================

// nsYield(mat, params) -> rate (%)
// Nelson-Siegel spot rate for maturity mat (in years):
//   y(m) = b0 + b1*[(1-exp(-m/tau))/(m/tau)] + b2*[(1-exp(-m/tau))/(m/tau) - exp(-m/tau)]
// params = {beta0, beta1, beta2, tau}
// Returns rate in percent (e.g. 4.31, not 0.0431)
function nsYield(mat, params) {
  const {beta0, beta1, beta2, tau} = params;
  if(mat <= 0) return beta0 + beta1;
  const x = mat / tau;
  const f1 = (1 - Math.exp(-x)) / x;
  const f2 = f1 - Math.exp(-x);
  return beta0 + beta1 * f1 + beta2 * f2;
}

// nsForward(mat, params) -> rate (%)
// Instantaneous forward rate:
//   f(m) = b0 + b1*exp(-m/tau) + b2*(m/tau)*exp(-m/tau)
function nsForward(mat, params) {
  const {beta0, beta1, beta2, tau} = params;
  if(mat <= 0) return beta0 + beta1;
  const x = mat / tau;
  return beta0 + beta1 * Math.exp(-x) + beta2 * x * Math.exp(-x);
}

// nsFit(points) -> {beta0, beta1, beta2, tau, rmse}
// Nelder-Mead minimization over 4 parameters.
// points = [{mat, rate}] -- the ycD array (7 maturity points)
// Constraints enforced by penalty: beta0 > 0, beta0+beta1 > 0, tau > 0.1
// Returns best params + RMSE in basis points
function nsFit(points) {
  const ssr = (p) => {
    const [b0, b1, b2, tau] = p;
    if(tau <= 0.05 || b0 <= 0) return 1e9;
    return points.reduce((s, pt) => {
      const fit = nsYield(pt.mat, {beta0:b0, beta1:b1, beta2:b2, tau});
      return s + (fit - pt.rate) ** 2;
    }, 0);
  };
  // Nelder-Mead
  let simplex = [
    [4, -0.5, 0.5, 2],
    [5, -1.5, 1.0, 1.5],
    [3.5, -0.3, 1.5, 3],
    [4.5, -1.0, 0.5, 1],
    [4, -0.8, 2.0, 2.5],
  ].map(p => ({p, v: ssr(p)}));
  const N = 4;
  for(let iter = 0; iter < 2000; iter++) {
    simplex.sort((a, b) => a.v - b.v);
    if(simplex[0].v < 1e-10) break;
    const centroid = Array(N).fill(0).map((_, i) =>
      simplex.slice(0, N).reduce((s, pt) => s + pt.p[i], 0) / N);
    const worst = simplex[N];
    const reflected = centroid.map((c, i) => 2*c - worst.p[i]);
    const vr = ssr(reflected);
    if(vr < simplex[0].v) {
      const expanded = centroid.map((c, i) => 3*c - 2*worst.p[i]);
      simplex[N] = ssr(expanded) < vr ? {p:expanded, v:ssr(expanded)} : {p:reflected, v:vr};
    } else if(vr < simplex[N-1].v) {
      simplex[N] = {p:reflected, v:vr};
    } else {
      const contracted = centroid.map((c, i) => 0.5*(c + worst.p[i]));
      if(ssr(contracted) < worst.v) {
        simplex[N] = {p:contracted, v:ssr(contracted)};
      } else {
        const best = simplex[0].p;
        simplex = simplex.map(s => {
          const np = s.p.map((x, i) => 0.5*(x + best[i]));
          return {p:np, v:ssr(np)};
        });
      }
    }
  }
  simplex.sort((a, b) => a.v - b.v);
  const [b0, b1, b2, tau] = simplex[0].p;
  const rmse = Math.sqrt(simplex[0].v / points.length) * 100; // in bp
  return {beta0:b0, beta1:b1, beta2:b2, tau, rmse};
}

// nsShockCurve(ycD, cumulativeDeltaFFR) -> ycD-shaped array with shocked rates
// Applies Bieri-Chincarini empirical factor model to project yield curve
// impact of cumulative funds rate change (in bp):
//   dy_3mo  ~ +1.00 * dFFR/100  (short end moves 1:1)
//   dy_6mo  ~ +0.85 * dFFR/100
//   dy_1yr  ~ +0.70 * dFFR/100
//   dy_2yr  ~ +0.50 * dFFR/100
//   dy_5yr  ~ +0.30 * dFFR/100
//   dy_10yr ~ +0.10 * dFFR/100  (Exhibit 5: 100bp hike -> ~25bp flattening 10-2yr)
//   dy_30yr ~ +0.05 * dFFR/100
// cumulativeDeltaFFR is in basis points (negative = cuts)
function nsShockCurve(ycD, cumulativeDeltaFFR) {
  const loadings = [1.00, 0.85, 0.70, 0.50, 0.30, 0.10, 0.05];
  const deltaFrac = cumulativeDeltaFFR / 100;
  return ycD.map((pt, i) => ({
    ...pt,
    rate: pt.rate + loadings[i] * deltaFrac
  }));
}

// ============================================================================
// RIDING-THE-YIELD-CURVE PURE FUNCTIONS
// ============================================================================

// mmHPR(ym, ymh, m, h, z=360) -> HPR decimal
// Eq. 8 Bieri-Chincarini: money-market holding period return
// H = [1 + y_{m-h}*(m-h)/z] / [1 + y_m*m/z] - 1
// rates in percent -> divide by 100 inside
function mmHPR(ym, ymh, m, h, z) {
  if(z === undefined) z = 360;
  return (1 + (ymh/100)*((m-h)/z)) / (1 + (ym/100)*(m/z)) - 1;
}

// bondHPR(ym, ymh, m, h) -> HPR decimal
// Eq. 12: zero-coupon bond ride HPR
// H = [(1 + y_m/100)^m / (1 + y_{m-h}/100)^{m-h}] - 1
function bondHPR(ym, ymh, m, h) {
  return Math.pow(1 + ym/100, m) / Math.pow(1 + ymh/100, (m-h)) - 1;
}

// rideHPR(ym, ymh, m, h) -> HPR decimal (dispatcher)
// Uses mmHPR for m <= 1yr, bondHPR for m > 1yr
function rideHPR(ym, ymh, m, h) {
  return m <= 1 ? mmHPR(ym, ymh, m, h) : bondHPR(ym, ymh, m, h);
}

// mmCushion(ym, yh, m, h, z=360) -> break-even yield change (bp)
// Eq. 15: y* = z*[(1 + ym*m/z)/(1 + yh*h/z) - 1]/(m-h)
// cushion = y* - current y_{m-h}  (positive = room for rates to rise)
function mmCushion(ym, yh, m, h, z) {
  if(z === undefined) z = 360;
  var ystar = z * ((1 + (ym/100)*(m/z)) / (1 + (yh/100)*(h/z)) - 1) / (m-h);
  return (ystar - ym/100) * 100 * 100; // convert to bp
}

// bondCushion(ym, yh, ymh, m, h) -> break-even yield change (bp)
// Eq. 16: y* s.t. (1+ym)^m / (1+y*)^{m-h} = (1+yh)^h
//   y* = [(1+ym)^m/(1+yh)^h]^{1/(m-h)} - 1
// cushion = (y* - ymh) * 100  in bp
function bondCushion(ym, yh, ymh, m, h) {
  if(m <= h) return 0;
  var ratio = Math.pow(1+ym/100, m) / Math.pow(1+yh/100, h);
  var ystar = (Math.pow(ratio, 1/(m-h)) - 1) * 100;
  return (ystar - ymh) * 100; // bp
}

// rideCushion(ym, yh, ymh, m, h) -> cushion in bp (dispatcher)
function rideCushion(ym, yh, ymh, m, h) {
  return m <= 1 ? mmCushion(ym, yh, m, h) : bondCushion(ym, yh, ymh, m, h);
}

// durationNeutralWeight(dH, dR, dO=0) -> omega
// Eq. 29: omega = (D_H - D_O) / (D_R - D_O)
// dH = holding horizon (years), dR = riding instrument duration (years)
function durationNeutralWeight(dH, dR, dO) {
  if(dO === undefined) dO = 0;
  if(dR <= dO) return 1;
  return (dH - dO) / (dR - dO);
}

// durationNeutralXR(hRide, hOvernight, hBuyHold, omega) -> excess return decimal
// Eq. 30: XR = omega*H_ride + (1-omega)*H_overnight - H_buyhold
function durationNeutralXR(hRide, hOvernight, hBuyHold, omega) {
  return omega * hRide + (1-omega) * hOvernight - hBuyHold;
}

// rideMatrix(syncedYcD, nsFitParams, scenarioCurves, fwD, fwLb, taylorSignalVal, rideFilters)
//   -> Array[7][5] of cell objects
// Instrument rows (7): 0.5, 1, 2, 5, 7, 10, 30yr
// Horizon cols (5):    1/12, 3/12, 6/12, 1, 1.5yr
function rideMatrix(syncedYcD, nsFitParams, scenarioCurves, fwD, fwLb, taylorSignalVal, rideFilters, ssPutSignalVal) {
  var MATS = [0.5, 1, 2, 5, 7, 10, 30];
  var HORIZONS = [1/12, 3/12, 6/12, 1, 1.5];
  var overnightRate = syncedYcD[0].rate; // 3mo as overnight proxy

  // CME futures signal: is market pricing cuts? (implied < actual)
  var cmeFuturesSignal = fwD.some(function(d){return (100-d.price) < fwLb;}) ? -1 : 1;

  // Current 10-2yr slope for slope filter
  var slope10_2 = syncedYcD[5].rate - syncedYcD[3].rate;

  return MATS.map(function(m) { return HORIZONS.map(function(h) {
    if(m <= h) return {hpr:0, xhpr:0, cushion:0, omega:0, dnXR:0, signal:'hold', annXhpr:0};

    var ym  = nsYield(m,   nsFitParams);
    var yh  = nsYield(h,   nsFitParams);
    var ymh_fwd = nsYield(m-h, nsFitParams); // no scenario: use NS forward projection

    // Scenario projection: find closest meeting at or before horizon h
    var ymh = ymh_fwd;
    if(scenarioCurves.length > 0) {
      var closestSc = scenarioCurves.reduce(function(best, sc) {
        var mIdx = fwD.findIndex(function(d){return d.lb === sc.meetingLb;});
        var mTime = mIdx >= 0 ? mIdx/12 : 999;
        var bestTime = best ? fwD.findIndex(function(d){return d.lb===best.meetingLb;})/12 : 999;
        return Math.abs(mTime-h) < Math.abs(bestTime-h) ? sc : best;
      }, null);
      if(closestSc) ymh = nsYield(m-h, closestSc.params);
    }

    var hpr    = rideHPR(ym, ymh, m, h);
    var hBH    = rideHPR(yh, yh, h, h); // buy-and-hold at horizon
    var xhpr   = hpr - hBH;
    var annXhpr = xhpr * (1/h); // annualized
    var cushion = rideCushion(ym, yh, ymh, m, h);
    var omega   = durationNeutralWeight(h, m);
    var hOvernight = (overnightRate/100) * h;
    var dnXR    = durationNeutralXR(hpr, hOvernight, hBH, omega);

    // Filter rules
    var f = rideFilters;
    var passes = [
      !f.positiveSlope    || slope10_2 > 0,
      !f.positiveCushion  || cushion > 0,
      !f.cushion75        || cushion > 15, // rough 75th pctile proxy (15bp)
      !f.taylorRule       || taylorSignalVal !== 1,
      !f.cmeExpectations  || cmeFuturesSignal === -1,
      !f.ssPut            || (ssPutSignalVal||0) === 1,
    ];
    var failCount = passes.filter(function(p){return !p;}).length;
    var signal = failCount === 0 ? 'ride' : failCount <= 1 ? 'marginal' : 'hold';

    return {ym:ym, yh:yh, ymh:ymh, hpr:hpr, xhpr:xhpr, annXhpr:annXhpr, cushion:cushion, omega:omega, dnXR:dnXR, signal:signal, h:h, m:m};
  });});
}

// buildRideExplainerSVG(ym, ymh, yh, m, h, cush, nsFitParams) -> SVG string
// Pure function -- no DOM deps. Returns full <svg>...</svg> markup string.
// Used by RidingTab explainer panel (seeded from live nsFitParams).
// ym   = yield at instrument maturity m (%)
// ymh  = projected yield at (m-h) after riding (%)
// yh   = yield at horizon h (%) -- buy-and-hold benchmark
// cush = cushion in bp (from rideCushion)
// nsFitParams = {beta0,beta1,beta2,tau} from useFinance
function buildRideExplainerSVG(ym, ymh, yh, m, h, cush, nsFitParams) {
  var W = 580, H = 210;
  var pl = 42, pr = 16, pt = 18, pb = 32;
  var pw = W - pl - pr, ph = H - pt - pb;

  // Build curve points
  var maxT = Math.max(m * 1.5, m + 0.5, 2.5);
  var pts = [];
  for(var i = 0; i <= 120; i++) {
    var t = (i / 120) * maxT;
    pts.push([t, nsYield(t, nsFitParams)]);
  }
  var allY = pts.map(function(p){return p[1];}).concat([ym, ymh, yh]);
  var yMin = Math.min.apply(null, allY) - 0.15;
  var yMax = Math.max.apply(null, allY) + 0.15;

  function xs(t){ return pl + (t / maxT) * pw; }
  function ys(y){ return pt + (1 - (y - yMin) / (yMax - yMin)) * ph; }

  // Axis grid
  var yRange = yMax - yMin;
  var gstep = yRange > 2 ? 0.5 : yRange > 0.8 ? 0.25 : 0.1;
  var yGridLines = [];
  for(var yg = Math.ceil(yMin / gstep) * gstep; yg <= yMax + 0.001; yg = Math.round((yg + gstep) * 10000) / 10000) {
    yGridLines.push(yg);
  }
  var xTicks = [0, 0.25, 0.5, 1, 2, 3, 5, 7, 10].filter(function(t){ return t <= maxT; });
  function tLbl(t){ return t < 1 ? (Math.round(t * 12)) + 'mo' : t + 'yr'; }

  // Key coordinates
  var x1 = xs(m),     y1 = ys(ym);   // buy point
  var x2 = xs(m - h), y2 = ys(ymh);  // sell point
  var xh = xs(h),     yhl = ys(yh);  // horizon line x

  // Arc control point -- above midpoint
  var arcCX = (x1 + x2) / 2;
  var arcCY = Math.min(y1, y2) - 22;

  // Cushion color
  var rc = cush > 15 ? '#16a34a' : cush > 0 ? '#f59e0b' : '#dc2626';
  var sig = cush > 15 ? 'RIDE' : cush > 0 ? 'MARGINAL' : 'HOLD';

  // Curve path
  var pathD = pts.map(function(p, idx){
    return (idx === 0 ? 'M' : 'L') + xs(p[0]).toFixed(1) + ',' + ys(p[1]).toFixed(1);
  }).join('');

  // Roll-down gap segment
  var rollGap = (m > h && y2 < yhl) ? (
    '<line x1="' + x2.toFixed(1) + '" y1="' + y2.toFixed(1) +
    '" x2="' + x2.toFixed(1) + '" y2="' + yhl.toFixed(1) +
    '" stroke="' + rc + '" stroke-width="1.5" stroke-dasharray="2,2" opacity=".55" marker-end="url(#rxarr)"/>' +
    '<text x="' + (x2 + 5).toFixed(1) + '" y="' + ((y2 + yhl) / 2).toFixed(1) +
    '" dominant-baseline="central" style="font-size:9px;fill:' + rc + ';font-family:var(--font-mono)">+' +
    (ym - ymh).toFixed(2) + '%</text>'
  ) : '';

  // Slope badge
  var slope = ym - yh;
  var shapeLbl = slope > 0.1 ? 'Normal curve' : slope < -0.1 ? 'Inverted curve' : 'Flat curve';
  var shapeC  = slope > 0.1 ? '#16a34a' : slope < -0.1 ? '#dc2626' : '#f59e0b';

  var gridSvg = yGridLines.map(function(yv){
    return '<line x1="' + pl + '" y1="' + ys(yv).toFixed(1) + '" x2="' + (W - pr) + '" y2="' + ys(yv).toFixed(1) +
      '" stroke="var(--color-border-tertiary)" stroke-width=".4"/>' +
      '<text x="' + (pl - 4) + '" y="' + ys(yv).toFixed(1) + '" text-anchor="end" dominant-baseline="central"' +
      ' style="font-size:9px;fill:var(--color-text-tertiary);font-family:var(--font-mono)">' +
      yv.toFixed(2) + '</text>';
  }).join('');

  var tickSvg = xTicks.map(function(t){
    return '<text x="' + xs(t).toFixed(1) + '" y="' + (H - pb + 14) + '" text-anchor="middle"' +
      ' style="font-size:9px;fill:var(--color-text-tertiary);font-family:var(--font-mono)">' +
      tLbl(t) + '</text>';
  }).join('');

  return '<svg width="100%" viewBox="0 0 ' + W + ' ' + H + '" style="display:block">' +
    '<defs><marker id="rxarr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">' +
    '<path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>' +
    '</marker></defs>' +
    gridSvg + tickSvg +
    '<line x1="' + pl + '" y1="' + pt + '" x2="' + pl + '" y2="' + (H - pb) + '" stroke="var(--color-border-secondary)" stroke-width=".5"/>' +
    '<line x1="' + pl + '" y1="' + (H - pb) + '" x2="' + (W - pr) + '" y2="' + (H - pb) + '" stroke="var(--color-border-secondary)" stroke-width=".5"/>' +
    '<text x="' + (pl + 3) + '" y="' + (pt + 11) + '" style="font-size:9px;fill:var(--color-text-tertiary)">yield (%)</text>' +
    // Horizon dashed benchmark line
    '<line x1="' + pl + '" y1="' + yhl.toFixed(1) + '" x2="' + xh.toFixed(1) + '" y2="' + yhl.toFixed(1) +
    '" stroke="var(--color-text-tertiary)" stroke-width=".8" stroke-dasharray="4,3" opacity=".5"/>' +
    '<text x="' + (xh + 4).toFixed(1) + '" y="' + (yhl - 5).toFixed(1) +
    '" style="font-size:9px;fill:var(--color-text-tertiary);font-family:var(--font-mono)">y(' + tLbl(h) + ')=' + yh.toFixed(2) + '%</text>' +
    // NS curve
    '<path d="' + pathD + '" fill="none" stroke="var(--c-cme)" stroke-width="2.5"/>' +
    // Arc arrow -- riding trajectory
    '<path d="M' + x1.toFixed(1) + ',' + y1.toFixed(1) +
    ' Q' + arcCX.toFixed(1) + ',' + arcCY.toFixed(1) +
    ' ' + x2.toFixed(1) + ',' + y2.toFixed(1) +
    '" fill="none" stroke="' + rc + '" stroke-width="2" marker-end="url(#rxarr)"/>' +
    // Roll-down gap
    rollGap +
    // Buy dot + label
    '<circle cx="' + x1.toFixed(1) + '" cy="' + y1.toFixed(1) + '" r="5" fill="var(--c-cme)"/>' +
    '<text x="' + (x1 + 7).toFixed(1) + '" y="' + (y1 - 9).toFixed(1) +
    '" style="font-size:10px;fill:var(--c-cme);font-family:var(--font-mono);font-weight:600">buy ' + ym.toFixed(2) + '%</text>' +
    // Sell dot + label
    '<circle cx="' + x2.toFixed(1) + '" cy="' + y2.toFixed(1) + '" r="5" fill="' + rc + '"/>' +
    '<text x="' + (x2 + 7).toFixed(1) + '" y="' + (y2 + 16).toFixed(1) +
    '" style="font-size:10px;fill:' + rc + ';font-family:var(--font-mono);font-weight:600">sell ' + ymh.toFixed(2) + '%</text>' +
    // Slope badge
    '<rect x="' + (pl + 3) + '" y="' + (H - pb - 22) + '" width="84" height="15" rx="3" fill="' + shapeC + '" opacity=".12"/>' +
    '<text x="' + (pl + 45) + '" y="' + (H - pb - 14) + '" text-anchor="middle" dominant-baseline="central"' +
    ' style="font-size:9px;fill:' + shapeC + ';font-weight:600">' + shapeLbl + '</text>' +
    // Signal badge (top right)
    '<rect x="' + (W - pr - 70) + '" y="' + pt + '" width="66" height="16" rx="3" fill="' + rc + '" opacity=".12"/>' +
    '<text x="' + (W - pr - 37) + '" y="' + (pt + 8) + '" text-anchor="middle" dominant-baseline="central"' +
    ' style="font-size:9px;fill:' + rc + ';font-weight:600">' + sig + ' \u00b7 ' + (cush >= 0 ? '+' : '') + Math.round(cush) + 'bp</text>' +
    '</svg>';
}

function reducer(state, action){
  switch(action.type){
    case 'SET_TAB':
      return {...state, fwActive: action.tab};
    case 'SET_LB':
      return {...state, fwLb: action.lb};
    case 'SET_SCENARIO':{
      const sc=SCENARIOS[action.key];
      if(!sc) return state;
      return {...state, fwActiveScenario: action.key,
        fwD: state.fwD.map((r,i)=>({...r, price: sc.prices[i]}))};
    }
    case 'DEACTIVATE':
      return {...state, fwActiveScenario: '',
        fwD: state.fwD.map((r,i)=>({...r, price: FW_SEED_PRICES[i]}))};
    case 'SET_COMPARE':
      return {...state, fwCompareScenario: action.key};
    case 'CLEAR_COMPARE':
      return {...state, fwCompareScenario: ''};
    case 'UPDATE_ZQ_PRICE':
      return {...state, fwActiveScenario: '',
        fwD: state.fwD.map((r,i)=>i===action.i?{...r, price: action.value}:r)};
    case 'UPDATE_ZQ_MTG':
      return {...state, fwActiveScenario: '',
        fwD: state.fwD.map((r,i)=>i===action.i?{...r, mtg: action.value}:r)};
    case 'UPDATE_ZQ_N':
      return {...state, fwActiveScenario: '',
        fwD: state.fwD.map((r,i)=>i===action.i?{...r, N: action.value}:r)};
    case 'UPDATE_ZQ_M':
      return {...state, fwActiveScenario: '',
        fwD: state.fwD.map((r,i)=>i===action.i?{...r, M: action.value}:r)};
    case 'UPDATE_SR_PRICE':
      return {...state,
        srD: state.srD.map((r,i)=>i===action.i?{...r, price: action.value}:r)};
    case 'UPDATE_YC_RATE':
      return {...state,
        ycD: state.ycD.map((r,i)=>i===action.i?{...r, rate: action.value, src:'manual'}:r)};
    case 'APPLY_LIVE_ZQ':{
      const d=action.data;
      return {...state, fwActiveScenario: '',
        fwD: state.fwD.map(r=>{
          const nr={...r};
          if(d.prices&&d.prices[r.lb]!==undefined){const v=parseFloat(d.prices[r.lb]);if(v>90&&v<100)nr.price=v;}
          if(d.meetings&&d.meetings[r.lb]){const mt=d.meetings[r.lb];nr.mtg=!!mt.hasMeeting;if(mt.label)nr.ml=mt.label;if(mt.hasMeeting&&mt.N>0){nr.N=mt.N;nr.M=mt.M;}if(!mt.hasMeeting){nr.N=0;nr.M=0;}}
          return nr;
        })};
    }
    case 'APPLY_LIVE_KALSHI':
      return {...state, kalshiD: {...state.kalshiD, ...action.data, fetched:true}};
    case 'APPLY_LIVE_POLY':
      return {...state, polyD: {...state.polyD, ...action.data, fetched:true}};
    case 'APPLY_LIVE_SOFR':{
      const prices=action.prices;
      return {...state,
        srD: state.srD.map(r=>{
          if(prices[r.lb]!==undefined){const v=parseFloat(prices[r.lb]);if(v>90&&v<100)return{...r, price:v};}
          return r;
        })};
    }
    case 'APPLY_LIVE_YC':{
      const rates=action.rates;
      const keyMap={'3mo':0,'6mo':1,'1yr':2,'2yr':3,'5yr':4,'10yr':5,'30yr':6};
      const next=state.ycD.map(r=>({...r}));
      Object.entries(rates).forEach(([k,v])=>{
        const idx=keyMap[k];
        if(idx!==undefined&&v!==null&&v>0&&v<20){next[idx].rate=parseFloat(v.toFixed(4));next[idx].src='live';}
      });
      return {...state, ycD: next};
    }
    case 'LOAD_SETTINGS':{
      const s=action.settings;
      let next={...state};
      if(s.lb!==undefined&&s.lb>=0&&s.lb<=8) next.fwLb=parseFloat(s.lb);
      if(s.scenario&&SCENARIOS[s.scenario]){
        next.fwActiveScenario=s.scenario;
        next.fwD=next.fwD.map((r,i)=>({...r, price: SCENARIOS[s.scenario].prices[i]}));
      }
      if(s.compare&&SCENARIOS[s.compare]&&s.compare!==next.fwActiveScenario) next.fwCompareScenario=s.compare;
      return next;
    }
    case 'UPDATE_TAYLOR':
      return {...state, taylor: {...state.taylor, [action.key]: action.value}};
    case 'UPDATE_TR':
      return {...state, trD: {...state.trD, [action.key]: action.value}};
    case 'APPLY_LIVE_TAYLOR':
      return {...state, trD: {...state.trD, ...action.data, fetched:true, asOf:action.data.asOf, source:action.data.source}};
    case 'TOGGLE_RIDE_FILTER':
      return {...state, rideFilters:{...state.rideFilters, [action.key]:!state.rideFilters[action.key]}};
    case 'SET_RIDE_SELECTED':
      return {...state, rideSelected:{matIdx:action.matIdx, hIdx:action.hIdx}};
    case 'APPLY_BALANCE_SHEET':
      return {...state, bsD:{...state.bsD, ...action.data, fetched:true, asOf:action.data.asOf, source:action.data.source}};
    case 'APPLY_FIN_STAB':
      return {...state, fsD:{...state.fsD, ...action.data, fetched:true, asOf:action.data.asOf, source:action.data.source}};
    case 'SET_BSD':
      return {...state, bsD:{...state.bsD, [action.key]:action.value}};
    case 'SET_FSD':
      return {...state, fsD:{...state.fsD, [action.key]:action.value}};
    default:
      return state;
  }
}

// ============================================================================
// MATH LAYER --- Phase 6: Balance Sheet & Financial Stability
// ============================================================================

// qtShadowAdjChannels(bsD) -> { total, components: { duration, safety, signaling, mbs } }
// 4-channel shadow rate decomposition: Krishnamurthy & Vissing-Jorgensen (2011, BPEA).
// KVJ show QE works through distinct channels; QT reverses the sign.
// Calibration: KVJ event-study magnitudes scaled from stock ($600bn QE1) to
// steady-state flow using Gagnon et al. (2011) flow/stock ratio ~1/20.
// Positive output = tightening effect (BS above neutral = accommodative = negative tighten).
function qtShadowAdjChannels(bsD){
  const neutralT   = (bsD.neutralFloor || 6200) * 0.52;
  const neutralMBS = (bsD.neutralFloor || 6200) * 0.27;
  const excessT    = (bsD.treasuries   || 4400) - neutralT;
  const excessMBS  = (bsD.mbs          || 2300) - neutralMBS;
  // Duration risk channel (Vayanos-Vila preferred habitat, Greenwood-Vayanos 2010)
  // KVJ: $600bn QE => ~33bp on 10yr; k_dur = 33/600/20 = 0.00275 bp per $bn
  const duration  = -(excessT + excessMBS) * 0.00275 * 12;
  // Safety channel (KVJ 2010, 2012 JPE) -- Treasuries only
  // k_safe = 0.0015 bp per $bn per month
  const safety    = -excessT * 0.0015 * 12;
  // Signaling channel (Eggertsson-Woodford 2003) -- T-only
  // k_sig = 0.0010 bp per $bn per month
  const signaling = -excessT * 0.0010 * 12;
  // MBS prepayment/default risk channel -- MBS only
  // KVJ: QE1 MBS => ~50bp; k_mbs = 0.0035 bp per $bn per month
  const mbs       = -excessMBS * 0.0035 * 12;
  const total = duration + safety + signaling + mbs;
  return {total, components:{duration, safety, signaling, mbs}};
}

// steinSVR(bsD) -> bp
// Shadow Value of Reserves -- Stein (2012, QJE 127:1, Section IV).
// SVR = EFFR - IORB (observable from FRED DFF - DFEDTARL).
// SVR < 5bp: ample reserves; 5-15bp: transition; >15bp: scarce (Sep 2019 hit ~40bp).
function steinSVR(bsD){
  return ((bsD.effr || 4.33) - (bsD.iorb || 4.40)) * 100;
}

// dssRiskChannel(bsD) -> { liquidityPremium, impliedLeverage, riskPremiumEffect }
// Drechsler, Savov & Schnabl (2018, JoF 73:1) -- nominal rate controls liquidity premium.
// Empirical proxy (Nagel 2016, QJE): LP = 3M T-bill - IORB.
// DSS mechanism: LP -> leverage -> risk premia; phi ~ 2 (bank leverage multiplier).
function dssRiskChannel(bsD){
  const lp  = (bsD.tbill3m || 4.25) - (bsD.iorb || 4.40);
  const phi = 2.0;
  return {
    liquidityPremium:  lp,
    impliedLeverage:   Math.max(0, 10 + lp * 5),
    riskPremiumEffect: lp * phi
  };
}

// qtYieldShock(monthlyRunoff, months) -> { mat: bp_change }
// QT impact on yield curve by maturity: KVJ (2011) + D'Amico-King (2013).
// bp change per $bn*month of runoff, calibrated from flow/stock estimates.
function qtYieldShock(monthlyRunoff, months){
  const t=monthlyRunoff*months;
  return {0.25:t*0.02, 0.5:t*0.025, 1:t*0.03, 2:t*0.03, 5:t*0.08, 7:t*0.09, 10:t*0.10, 20:t*0.07, 30:t*0.04};
}

// nsSafetyPremium(bsD) -> bp
// KVJ (2012, JPE 120:2): Treasury supply affects safety premium paid for near-zero-default assets.
// Each 1% of GDP change in T supply (private hands) => ~7bp change in safety premium.
function nsSafetyPremium(bsD){
  const fedTshare = (bsD.treasuries || 4400) / (bsD.gdpNominal || 28500) * 100;
  const baseShare = 15.4;
  const kSafety   = 7.0;
  return (fedTshare - baseShare) * kSafety;
}

// finNeutralOutputGap(trD, fsD) -> % of potential GDP
// Borio, Disyatat & Juselius (2013, BIS WP404; 2017, Oxford Econ Papers 69:3).
// y_gap_fn = y_gap_hp - alpha_c * (credit/GDP gap); alpha_c ~ 0.5.
function finNeutralOutputGap(trD, fsD){
  const hpGap   = trD.outputGap    ?? -0.5;
  const creditG = fsD.creditGDPGap ?? 0.0;
  return hpGap - 0.5 * creditG;
}

// finCycleAdjustedRstar(trD, fsD) -> %
// Borio (2016, Cato Journal 36:2, Pillar II): LW r* biased down by financial-boom
// productivity drag. Corrects upward by accumulated drag over cycle horizon.
function finCycleAdjustedRstar(trD, fsD){
  const lwRstar = trD.naturalRate      ?? 0.5;
  const drag    = fsD.productivityDrag ?? -0.25;
  const horizon = fsD.cycleHorizonYrs  ?? 5;
  return lwRstar - (drag * horizon) / 100;
}

// finNeutralRate(trD, fsD, prevFFR, prevGap) -> %
// Borio (2012, 2014, 2016): JR ECM augmented with NFCI financial conditions term.
// FFR*_fn = JR_prescribed + lambda_fc * NFCI
function finNeutralRate(trD, fsD, prevFFR, prevGap){
  const jrBase = taylorRateJR(trD, prevFFR, prevGap);
  return jrBase + (fsD.lambdaFC ?? 0.5) * (fsD.nfci ?? -0.12);
}

// leaningPremium(trD, fsD, marketImplied, prevFFR, prevGap) -> bp
// Gap between finance-neutral prescription and market-implied terminal rate.
// Positive = market prices BELOW finance-neutral (leaning with the wind = risky).
function leaningPremium(trD, fsD, marketImplied, prevFFR, prevGap){
  return (finNeutralRate(trD, fsD, prevFFR, prevGap) - marketImplied) * 100;
}

// gradualismGap(terminalZQ, sepLongRunDot) -> bp
// Stein & Sunderam (2018, JoF 73:3): SEP long-run dot minus ZQ-implied terminal.
// Positive = market prices less tightening than Fed's long-run target.
function gradualismGap(terminalZQ, sepLongRunDot){
  return ((sepLongRunDot ?? 2.875) - terminalZQ) * 100;
}

// ssTermPremiumPutSignal(nsParams, effrStart, termPremP75) -> +1 | 0 | -1
// Stein & Sunderam (2018): elevated term premium => Fed put activation => likely cuts.
// +1 = bullish (term prem > p75), -1 = compressed (< p25), 0 = normal.
function ssTermPremiumPutSignal(nsParams, effrStart, termPremP75){
  if(!nsParams || !nsParams.beta0) return 0;
  const termPremBp = (nsParams.beta0 - effrStart) * 100;
  const p75 = termPremP75 ?? 60;
  const p25 = p75 * 0.25;
  if(termPremBp > p75)  return +1;
  if(termPremBp < p25)  return -1;
  return 0;
}

// DERIVED COMPUTATION HOOK
// ============================================================================

function useFinance(state) {
  return useMemo(() => {
    const syncedYcD = ycSyncShortEnd(state.fwD, state.ycD);
    const chain = fwChain(state.fwD);
    const meetings = fwMeetings(state.fwD, chain);
    const {states, final} = fwDist(meetings);
    const zqAvgs = zqQuarterlyAvg(state.fwD, state.srD);
    const instFwd = srInstFwd(state.srD);
    const compareSeries = getCompareSeries(state.fwCompareScenario, state.fwD, state.fwLb);
    let effrStart = 3.64;
    for(let i=0;i<state.fwD.length;i++){
      if(state.fwD[i].mtg && chain[i].start !== null){effrStart=chain[i].start; break;}
    }
    // Taylor rule prescriptions (all 4 variants)
    const t = state.trD ?? {};
    // Borio r* toggle: conditionally swap LW r* for finance-cycle adjusted r*
    const earlyRstarAdj = finCycleAdjustedRstar(t, state.fsD);
    const effectiveT = t.useFinCycleRstar ? {...t, naturalRate: earlyRstarAdj} : t;
    const prevGap = effectiveT.outputGap ?? -0.5;
    const gap = effectiveT.gapMeasure === 'unemployment'
      ? -2 * ((effectiveT.unemploymentRate ?? 4.1) - (effectiveT.unemploymentNatural ?? 4.1))
      : (effectiveT.outputGap ?? -0.5);
    const trRates = {
      taylor93:      (effectiveT.naturalRate??0.5) + (effectiveT.inflationTarget??2.0) + 1.5*((effectiveT.inflationRate??2.8)-(effectiveT.inflationTarget??2.0)) + 0.5*gap,
      balanced:      (effectiveT.naturalRate??0.5) + (effectiveT.inflationTarget??2.0) + 1.5*((effectiveT.inflationRate??2.8)-(effectiveT.inflationTarget??2.0)) + 1.0*gap,
      yellen:        taylorRateYellen(effectiveT),
      juddRudebusch: taylorRateJR(effectiveT, state.fwLb, prevGap),
    };
    // CGG inertial (backward-compatible with existing chart)
    trRates.cgg = state.fwLb + (1 - (effectiveT.rhoSmoothing ?? 0.85)) * (trRates.taylor93 - state.fwLb);
    trRates.finNeutral = trRates.juddRudebusch + (state.fsD?.lambdaFC ?? 0.5) * (state.fsD?.nfci ?? -0.12);

    // Taylor signal: JR is the primary signal (Bieri-Chincarini Exhibit 7)
    const jrPrescribed = trRates.juddRudebusch;
    const taylorSignalVal = Math.abs(jrPrescribed - effrStart) < 0.125 ? 0
      : jrPrescribed < effrStart ? -1 : 1;
    const taylorJRRate = jrPrescribed;

    // JR implied path: apply taylorRateJR meeting-by-meeting, carrying forward prevFFR
    const jrImpliedPath = (() => {
      let prev = state.fwLb;
      const pg = effectiveT.outputGap ?? -0.5;
      return meetings.map(row => {
        const rate = taylorRateJR(effectiveT, prev, pg);
        prev = rate;
        return rate;
      });
    })();

    // NS curve fit from current ycD
    const nsFitParams = nsFit(syncedYcD.map(d => ({mat: d.mat, rate: d.rate})));

    // Smooth fitted curve (200 points from 0.08yr to 30yr)
    const nsCurvePoints = Array.from({length:200}, (_, i) => {
      const mat = 0.08 + (i / 199) * 29.92;
      return {mat, rate: nsYield(mat, nsFitParams)};
    });

    // Forward curve (same 200 points)
    const nsForwardPoints = Array.from({length:200}, (_, i) => {
      const mat = 0.08 + (i / 199) * 29.92;
      return {mat, rate: nsForward(mat, nsFitParams)};
    });

    // NS factor interpretation
    const nsFactors = {
      level:     nsFitParams.beta0,
      slope:     nsFitParams.beta1,
      curvature: nsFitParams.beta2,
      decay:     nsFitParams.tau,
      rmse:      nsFitParams.rmse,
    };

    // Term premium proxy (beta0 = long-run level minus current short rate)
    const termPremium = nsFitParams.beta0 - effrStart;

    // Scenario-shocked curves -- one per FOMC meeting
    // Cumulative delta at each meeting = sum of all cuts/hikes from start to that meeting
    let cumDelta = 0;
    const scenarioCurves = meetings.map((m, idx) => {
      const ci = state.fwD.findIndex(d => d.lb === m.lb);
      const deltaBp = (ci >= 0 && chain[ci] && chain[ci].start !== null && chain[ci].end !== null)
        ? (chain[ci].end - chain[ci].start) * 100
        : 0;
      cumDelta += deltaBp;
      const shockedYcD = nsShockCurve(syncedYcD, cumDelta);
      const shockedParams = nsFit(shockedYcD.map(d => ({mat:d.mat, rate:d.rate})));
      return {
        meetingLb: m.lb,
        label: m.label || m.lb,
        cumDeltaBp: cumDelta,
        ycD: shockedYcD,
        params: shockedParams,
      };
    });

    // QT shock curve: 12M of balance sheet runoff applied to yield curve
    const qtShocks = qtYieldShock(state.bsD.monthlyRunoff||60, 12);
    const qtShockedYcD = syncedYcD.map(pt=>{
      const closest = [0.25,0.5,1,2,5,7,10,20,30].reduce((b,m)=>Math.abs(m-pt.mat)<Math.abs(b-pt.mat)?m:b);
      return {...pt, rate: pt.rate + (qtShocks[closest]||0)/100};
    });
    const qtShockedParams = nsFit(qtShockedYcD.map(d=>({mat:d.mat, rate:d.rate})));

    // Phase 6: Balance Sheet analytics
    const qtChannels     = qtShadowAdjChannels(state.bsD);
    const svr            = steinSVR(state.bsD);
    const dss            = dssRiskChannel(state.bsD);
    const combinedStance = effrStart + qtChannels.total / 100;

    // Phase 6: Financial Stability analytics
    const terminalRate   = meetings.length > 0 ? (chain[state.fwD.findIndex(d=>d.lb===meetings[meetings.length-1].lb)]?.end ?? effrStart) : effrStart;
    const safetyPremBp   = nsSafetyPremium(state.bsD);
    const fnGap          = finNeutralOutputGap(state.trD, state.fsD);
    const rstarAdj       = finCycleAdjustedRstar(state.trD, state.fsD);
    const fnRate         = finNeutralRate(state.trD, state.fsD, effrStart, fnGap);
    const leanPrem       = leaningPremium(state.trD, state.fsD, terminalRate, effrStart, fnGap);
    const gradGap        = gradualismGap(terminalRate, state.trD.sepLongRunDot);
    const ssPutSignal    = ssTermPremiumPutSignal(nsFitParams, effrStart, (state.fsD.nfciP75 ?? 0.50) * 120);

    // Riding-the-yield-curve matrix (after ssPutSignal for filter #6)
    const rideData = rideMatrix(syncedYcD, nsFitParams, scenarioCurves, state.fwD, state.fwLb, taylorSignalVal, state.rideFilters, ssPutSignal);

    return {chain, meetings, states, final, zqAvgs, instFwd, compareSeries, effrStart, syncedYcD, trRates, taylorSignalVal, taylorJRRate, jrImpliedPath, nsFitParams, nsCurvePoints, nsForwardPoints, nsFactors, termPremium, scenarioCurves, rideData, qtChannels, steinSVR:svr, dss, combinedStance, terminalRate, safetyPremBp, finNeutralGap:fnGap, rstarAdj, finNeutralRate:fnRate, leaningPremium:leanPrem, gradualismGap:gradGap, ssPutSignal, qtShocks, qtShockedParams};
  }, [state.fwD, state.srD, state.ycD, state.fwCompareScenario, state.fwLb, state.trD, state.rideFilters, state.bsD, state.fsD]);
}

// fetchBalanceSheet() -- Batch-fetches 8 FRED series from Fed H.4.1 weekly release
// FRED CSV pattern: https://fred.stlouisfed.org/graph/fredgraph.csv?id=SERIES
// Series: WALCL, WTREGEN, WMBSEC, RRPONTSYD, WRESBAL, DFEDTARL, DFF, DTB3
async function fetchBalanceSheet(dispatch){
  const SERIES=[
    ['WALCL',     'totalAssets', 1],
    ['WTREGEN',   'treasuries',  1],
    ['WMBSEC',    'mbs',         1],
    ['RRPONTSYD', 'rrpUsage',    1000],
    ['WRESBAL',   'reserves',    1],
    ['DFEDTARL',  'iorb',        1],
    ['DFF',       'effr',        1],
    ['DTB3',      'tbill3m',     1],
  ];
  const BASE='https://fred.stlouisfed.org/graph/fredgraph.csv?id=';
  try{
    const results=await Promise.all(
      SERIES.map(([id])=>
        fetch(BASE+id).then(r=>r.text()).then(txt=>{
          const lines=txt.trim().split('\n').filter(Boolean);
          const last=lines[lines.length-1].split(',');
          return {date:last[0], value:parseFloat(last[1])};
        })
      )
    );
    const data={asOf:results[0].date, source:'FRED H.4.1 (live)'};
    SERIES.forEach(([,key,divisor],i)=>{data[key]=results[i].value/divisor;});
    dispatch({type:'APPLY_BALANCE_SHEET', data});
    return data;
  }catch(err){console.error('fetchBalanceSheet error:',err);return null;}
}

// fetchFinancialStability() -- Batch-fetches 3 FRED financial stability series
// Series: NFCI (Chicago Fed), SWPT (swap lines), BAMLH0A0HYM2 (HY OAS)
async function fetchFinancialStability(dispatch){
  const SERIES=[
    ['NFCI',         'nfci',      1],
    ['SWPT',         'swapLines', 1000],
    ['BAMLH0A0HYM2', 'hyOAS',    1],
  ];
  const BASE='https://fred.stlouisfed.org/graph/fredgraph.csv?id=';
  try{
    const results=await Promise.all(
      SERIES.map(([id])=>
        fetch(BASE+id).then(r=>r.text()).then(txt=>{
          const lines=txt.trim().split('\n').filter(Boolean);
          const last=lines[lines.length-1].split(',');
          return {date:last[0], value:parseFloat(last[1])};
        })
      )
    );
    const data={asOf:results[0].date, source:'FRED (live)'};
    SERIES.forEach(([,key,divisor],i)=>{
      let v=results[i].value;
      if(key==='hyOAS'&&v<20) v=v*100;
      data[key]=v/(key==='hyOAS'?1:divisor);
    });
    dispatch({type:'APPLY_FIN_STAB', data});
    return data;
  }catch(err){console.error('fetchFinancialStability error:',err);return null;}
}

function panel4Svg(meetings,states,lb,fwD,kalshiD,compareSeries){
  const W=680,H=120,mt=20,mb=24,ml=34,mr=10;
  const months=fwD.map(d=>d.lb);
  const cmeRates=[];
  let si=0;
  months.forEach((lb2,i)=>{
    if(fwD[i].mtg&&si<states.length-1){si++;}
    const s=states[Math.min(si,states.length-1)];
    const ek=Object.entries(s).reduce((sum,[k,p])=>sum+parseInt(k)*p,0);
    cmeRates.push(lb+ek*.25);
  });
  const kalRates=months.map(lb2=>kalshiD.kalshiRate[lb2]||null);
  const dots=kalshiD.fedDots.map(d=>({i:months.indexOf(d.lb),rate:d.rate})).filter(d=>d.i>=0);
  const allV=[...cmeRates,...kalRates.filter(v=>v!==null),...dots.map(d=>d.rate)];
  const cSeries4=compareSeries;
  let cmpRates4=null;
  if(cSeries4){
    let si2=0;const cr=[];
    months.forEach((_,i)=>{
      if(fwD[i].mtg&&si2<cSeries4.states.length-1){si2++;}
      const s=cSeries4.states[Math.min(si2,cSeries4.states.length-1)];
      const ek=Object.entries(s).reduce((sum,[k,p])=>sum+parseInt(k)*p,0);
      cr.push(lb+ek*.25);
    });
    cmpRates4=cr;
    allV.push(...cr);
  }
  const minR=Math.min(...allV)-0.1,maxR=Math.max(...allV)+0.1;
  const xs=i=>ml+(i/(months.length-1||1))*(W-ml-mr);
  const ys=v=>mt+H*(1-(v-minR)/(maxR-minR));
  let svg='<svg viewBox="0 0 '+W+' '+(H+mt+mb)+'" style="width:100%;display:block;overflow:visible">';
  const step=0.25,ymin=Math.floor(minR/step)*step,ymax=Math.ceil(maxR/step)*step;
  for(let y2=ymin;y2<=ymax;y2+=step){
    svg+='<line x1="'+ml+'" y1="'+ys(y2).toFixed(1)+'" x2="'+(W-mr)+'" y2="'+ys(y2).toFixed(1)+'" stroke="var(--color-border-tertiary)" stroke-width=".5"/>';
    svg+='<text x="'+(ml-3).toFixed(1)+'" y="'+ys(y2).toFixed(1)+'" text-anchor="end" dominant-baseline="middle" font-size="8" fill="var(--color-text-tertiary)" font-family="var(--font-mono)">'+y2.toFixed(2)+'</text>';
  }
  if(cmpRates4){
    const oPts=cmpRates4.map((r,i)=>xs(i).toFixed(1)+','+ys(r).toFixed(1)).join(' ');
    svg+='<polyline points="'+oPts+'" fill="none" stroke="var(--c-overlay)" stroke-width="2" stroke-dasharray="6,3" opacity=".8"/>';
    cmpRates4.forEach((r,i)=>{svg+='<circle cx="'+xs(i).toFixed(1)+'" cy="'+ys(r).toFixed(1)+'" r="2.5" fill="var(--c-overlay)" opacity=".75"/>';});
  }
  const cPts=cmeRates.map((r,i)=>xs(i).toFixed(1)+','+ys(r).toFixed(1)).join(' ');
  svg+='<polyline points="'+cPts+'" fill="none" stroke="var(--c-cme)" stroke-width="2" opacity=".85"/>';
  cmeRates.forEach((r,i)=>{svg+='<circle cx="'+xs(i).toFixed(1)+'" cy="'+ys(r).toFixed(1)+'" r="3" fill="var(--c-cme)" opacity=".7"/>';});
  let kPrev=null;
  months.forEach((lb2,i)=>{
    const r=kalRates[i];if(r===null)return;
    if(kPrev!==null)svg+='<line x1="'+xs(kPrev.i).toFixed(1)+'" y1="'+ys(kPrev.r).toFixed(1)+'" x2="'+xs(i).toFixed(1)+'" y2="'+ys(r).toFixed(1)+'" stroke="var(--c-kal)" stroke-width="1.5" stroke-dasharray="5,3" opacity=".8"/>';
    svg+='<circle cx="'+xs(i).toFixed(1)+'" cy="'+ys(r).toFixed(1)+'" r="4" fill="var(--c-kal)" opacity=".8"/>';
    kPrev={i,r};
  });
  dots.forEach(d=>{
    svg+='<circle cx="'+xs(d.i).toFixed(1)+'" cy="'+ys(d.rate).toFixed(1)+'" r="5" fill="var(--c-dots)" opacity=".85"/>';
    svg+='<text x="'+xs(d.i).toFixed(1)+'" y="'+(ys(d.rate)-8).toFixed(1)+'" text-anchor="middle" font-size="8" fill="var(--c-dots)" font-family="var(--font-mono)">'+d.rate.toFixed(2)+'</text>';

    const y=ys(v);
    svg+='<line x1="'+ml+'" y1="'+y.toFixed(1)+'" x2="'+(W-mr)+'" y2="'+y.toFixed(1)+'" stroke="var(--color-border-tertiary)" stroke-width=".4" stroke-dasharray="3,3"/>';
    svg+='<text x="'+(ml-3)+'" y="'+(y+3).toFixed(1)+'" text-anchor="end" font-size="7.5" fill="var(--color-text-tertiary)" font-family="var(--font-mono)">'+v.toFixed(0)+'</text>';
  });
  bases.forEach((b,i)=>{
    const x=xs(i)-bW/2;
    const h=Math.max(2,Math.abs(b/maxB)*H);
    const y=b>=0?ys(b):baseline;
    const col=b>=0?'var(--c-sofr)':'var(--color-text-danger)';
    const opacity=0.55+0.3*(1-i/Math.max(bases.length-1,1));
    svg+='<rect x="'+x.toFixed(1)+'" y="'+y.toFixed(1)+'" width="'+bW+'" height="'+h.toFixed(1)+'" rx="2" fill="'+col+'" opacity="'+opacity.toFixed(2)+'"/>';
    // bp value label above bar
    svg+='<text x="'+xs(i).toFixed(1)+'" y="'+(y-4).toFixed(1)+'" text-anchor="middle" font-size="9" font-weight="500" fill="'+col+'" font-family="var(--font-mono)">'+(b>0?'+':'')+b.toFixed(1)+'</text>';
    // quarter label below
    svg+='<text x="'+xs(i).toFixed(1)+'" y="'+(baseline+mt-6).toFixed(1)+'" text-anchor="middle" font-size="8" fill="var(--color-text-tertiary)" font-family="var(--font-sans)">'+quarters[i]+'</text>';
  });
  svg+='</svg>';
  return svg;
}

function taylorChartSvg(meetings, states, lb, effrStart, taylorPaths, taylor, jrPath, fnPath) {
  const W=720, H=180, mt=28, mb=32, ml=38, mr=14;
  const n=meetings.length;
  if(n===0) return '<div style="color:var(--color-text-tertiary);font-size:13px">No meetings detected.</div>';
  const xs=i=>ml+(i/(n-1||1))*(W-ml-mr);

  // CME expected rate path
  const cmeRates=[];
  let si=0;
  const allMonths=meetings.map(m=>m.lb);
  for(let i=0;i<n;i++){
    const s=states[i+1]||states[states.length-1];
    const ek=Object.entries(s).reduce((sum,[k,p])=>sum+parseInt(k)*p,0);
    cmeRates.push(lb+ek*.25);
  }

  const {classic, balanced, inertialC, inertialB}=taylorPaths;
  const jrV=jrPath||[];
  const fnV=fnPath||[];
  const allV=[effrStart,...cmeRates,...classic,...balanced,...inertialC,...inertialB,...jrV,...fnV];
  const minR=Math.min(...allV)-0.15, maxR=Math.max(...allV)+0.15;
  const ys=v=>mt+H*(1-(v-minR)/(maxR-minR));

  let svg='<svg viewBox="0 0 '+W+' '+(H+mt+mb)+'" style="width:100%;display:block;overflow:visible">';

  // Grid
  const step=0.25;
  for(let y=Math.ceil(minR/step)*step;y<=maxR;y+=step){
    svg+='<line x1="'+ml+'" y1="'+ys(y).toFixed(1)+'" x2="'+(W-mr)+'" y2="'+ys(y).toFixed(1)+'" stroke="var(--color-border-tertiary)" stroke-width=".5"/>';
    svg+='<text x="'+(ml-4).toFixed(1)+'" y="'+ys(y).toFixed(1)+'" text-anchor="end" dominant-baseline="middle" font-size="8" fill="var(--color-text-tertiary)" font-family="var(--font-mono)">'+y.toFixed(2)+'%</text>';
  }

  // Neutral rate band
  const rNeutral=taylor.rStar+taylor.piStar;
  if(rNeutral>=minR&&rNeutral<=maxR){
    svg+='<line x1="'+ml+'" y1="'+ys(rNeutral).toFixed(1)+'" x2="'+(W-mr)+'" y2="'+ys(rNeutral).toFixed(1)+'" stroke="var(--color-text-tertiary)" stroke-width="1" stroke-dasharray="8,4" opacity=".5"/>';
    svg+='<text x="'+(W-mr-2).toFixed(1)+'" y="'+(ys(rNeutral)-5).toFixed(1)+'" text-anchor="end" font-size="7.5" fill="var(--color-text-tertiary)" font-family="var(--font-sans)">r* neutral '+rNeutral.toFixed(2)+'%</text>';
  }

  // Classic Taylor (thinner rose — JR takes the heavy line)
  const cPts=classic.map((r,i)=>xs(i).toFixed(1)+','+ys(r).toFixed(1)).join(' ');
  svg+='<polyline points="'+cPts+'" fill="none" stroke="var(--c-taylor)" stroke-width="1.5" stroke-dasharray="10,4" opacity=".65"/>';
  classic.forEach((r,i)=>{svg+='<circle cx="'+xs(i).toFixed(1)+'" cy="'+ys(r).toFixed(1)+'" r="2.5" fill="var(--c-taylor)" opacity=".65"/>';svg+='<rect class="mse-hover" x="'+(xs(i)-8).toFixed(1)+'" y="'+(ys(r)-8).toFixed(1)+'" width="16" height="16" fill="transparent" data-label="Classic Taylor · '+allMonths[i]+'" data-val="'+r.toFixed(2)+'%" data-sub="Original Taylor (1993) rule"/>';});

  // Balanced approach (dashed rose lighter)
  const bPts=balanced.map((r,i)=>xs(i).toFixed(1)+','+ys(r).toFixed(1)).join(' ');
  svg+='<polyline points="'+bPts+'" fill="none" stroke="var(--c-taylor-mod)" stroke-width="2" stroke-dasharray="7,4" opacity=".85"/>';
  balanced.forEach((r,i)=>{svg+='<circle cx="'+xs(i).toFixed(1)+'" cy="'+ys(r).toFixed(1)+'" r="3" fill="var(--c-taylor-mod)" opacity=".8"/>';svg+='<rect class="mse-hover" x="'+(xs(i)-8).toFixed(1)+'" y="'+(ys(r)-8).toFixed(1)+'" width="16" height="16" fill="transparent" data-label="Balanced · '+allMonths[i]+'" data-val="'+r.toFixed(2)+'%" data-sub="Yellen balanced-approach rule"/>';});

  // Inertial classic (thin dotted)
  const icPts=inertialC.map((r,i)=>xs(i).toFixed(1)+','+ys(r).toFixed(1)).join(' ');
  svg+='<polyline points="'+icPts+'" fill="none" stroke="var(--c-taylor)" stroke-width="1.5" stroke-dasharray="3,3" opacity=".6"/>';

  // Judd-Rudebusch path (rose solid, heavy — signal source)
  if(jrV.length){
    const jrPts=jrV.map((r,i)=>xs(i).toFixed(1)+','+ys(r).toFixed(1)).join(' ');
    svg+='<polyline points="'+jrPts+'" fill="none" stroke="var(--c-taylor)" stroke-width="2.5" opacity=".95"/>';
    jrV.forEach((r,i)=>{svg+='<circle cx="'+xs(i).toFixed(1)+'" cy="'+ys(r).toFixed(1)+'" r="4" fill="var(--c-taylor)" stroke="var(--color-background-primary)" stroke-width="1" opacity=".95"/>';svg+='<rect class="mse-hover" x="'+(xs(i)-8).toFixed(1)+'" y="'+(ys(r)-8).toFixed(1)+'" width="16" height="16" fill="transparent" data-label="Judd-Rudebusch · '+allMonths[i]+'" data-val="'+r.toFixed(2)+'%" data-sub="ECM error-correction path"/>';});
  }

  // Finance-neutral path (teal dashed)
  if(fnV.length){
    const fnPts=fnV.map((r,i)=>xs(i).toFixed(1)+','+ys(r).toFixed(1)).join(' ');
    svg+='<polyline points="'+fnPts+'" fill="none" stroke="var(--c-fin-neutral)" stroke-width="2" stroke-dasharray="8,4" opacity=".85"/>';
    fnV.forEach((r,i)=>{svg+='<circle cx="'+xs(i).toFixed(1)+'" cy="'+ys(r).toFixed(1)+'" r="3" fill="var(--c-fin-neutral)" opacity=".85"/>';svg+='<rect class="mse-hover" x="'+(xs(i)-8).toFixed(1)+'" y="'+(ys(r)-8).toFixed(1)+'" width="16" height="16" fill="transparent" data-label="Fin-neutral · '+allMonths[i]+'" data-val="'+r.toFixed(2)+'%" data-sub="Finance-neutral Taylor variant"/>';});
  }

  // CME implied path (blue)
  const cmePts=cmeRates.map((r,i)=>xs(i).toFixed(1)+','+ys(r).toFixed(1)).join(' ');
  svg+='<polyline points="'+cmePts+'" fill="none" stroke="var(--c-cme)" stroke-width="2.5" opacity=".85"/>';
  cmeRates.forEach((r,i)=>{svg+='<circle cx="'+xs(i).toFixed(1)+'" cy="'+ys(r).toFixed(1)+'" r="3.5" fill="var(--c-cme)" opacity=".85"/>';svg+='<rect class="mse-hover" x="'+(xs(i)-8).toFixed(1)+'" y="'+(ys(r)-8).toFixed(1)+'" width="16" height="16" fill="transparent" data-label="CME implied · '+allMonths[i]+'" data-val="'+r.toFixed(2)+'%" data-sub="Market-implied EFFR path"/>';});

  // Current EFFR marker
  svg+='<circle cx="'+ml+'" cy="'+ys(effrStart).toFixed(1)+'" r="5" fill="var(--color-text-primary)" opacity=".6"/>';
  svg+='<text x="'+(ml+8).toFixed(1)+'" y="'+(ys(effrStart)-6).toFixed(1)+'" font-size="8" fill="var(--color-text-secondary)" font-family="var(--font-mono)">EFFR '+effrStart.toFixed(2)+'%</text>';

  // X-axis labels
  meetings.forEach((m,i)=>{
    const shortLbl=m.label.replace(/\d{4}/,'').trim()||m.lb.replace(/ 20\d\d/,'');
    if(i%2===0||i===n-1) svg+='<text x="'+xs(i).toFixed(1)+'" y="'+(mt+H+16).toFixed(1)+'" text-anchor="middle" font-size="8" fill="var(--color-text-tertiary)" font-family="var(--font-sans)">'+shortLbl+'</text>';
  });

  // Legend
  svg+='<text x="'+ml+'" y="14" font-size="8.5" fill="var(--c-taylor)" font-family="var(--font-sans)" font-weight="600">● JR ECM (signal)</text>';
  svg+='<text x="'+(ml+115)+'" y="14" font-size="8" fill="var(--c-taylor)" font-family="var(--font-sans)" opacity=".65">- - Classic</text>';
  svg+='<text x="'+(ml+175)+'" y="14" font-size="8" fill="var(--c-taylor-mod)" font-family="var(--font-sans)">- - Balanced</text>';
  svg+='<text x="'+(ml+255)+'" y="14" font-size="8" fill="var(--c-taylor)" font-family="var(--font-sans)" opacity=".5">... CGG</text>';
  svg+='<text x="'+(ml+305)+'" y="14" font-size="8" fill="var(--c-fin-neutral)" font-family="var(--font-sans)">- - Fin-neutral</text>';
  svg+='<text x="'+(ml+390)+'" y="14" font-size="8.5" fill="var(--c-cme)" font-family="var(--font-sans)" font-weight="500">● CME implied</text>';

  svg+='</svg>';
  return svg;
}

function taylorGapSvg(meetings, cmeRates, classic, balanced) {
  const W=720, H=80, mt=20, mb=28, ml=38, mr=14;
  const n=meetings.length;
  if(n===0) return '';
  const xs=i=>ml+(i/(n-1||1))*(W-ml-mr);
  const gapsC=classic.map((r,i)=>r-cmeRates[i]);
  const gapsB=balanced.map((r,i)=>r-cmeRates[i]);
  const maxG=Math.max(...gapsC.map(Math.abs),...gapsB.map(Math.abs),0.15);
  const yMid=mt+H/2;
  const ys=v=>yMid-(v/maxG)*(H/2);

  let svg='<svg viewBox="0 0 '+W+' '+(H+mt+mb)+'" style="width:100%;display:block;overflow:visible">';
  svg+='<line x1="'+ml+'" y1="'+yMid.toFixed(1)+'" x2="'+(W-mr)+'" y2="'+yMid.toFixed(1)+'" stroke="var(--color-border-secondary)" stroke-width="1"/>';
  svg+='<text x="'+(ml-4).toFixed(1)+'" y="'+yMid.toFixed(1)+'" text-anchor="end" dominant-baseline="middle" font-size="7.5" fill="var(--color-text-tertiary)" font-family="var(--font-mono)">0</text>';
  [maxG/2, maxG].forEach(v=>{
    [v,-v].forEach(g=>{
      svg+='<line x1="'+ml+'" y1="'+ys(g).toFixed(1)+'" x2="'+(W-mr)+'" y2="'+ys(g).toFixed(1)+'" stroke="var(--color-border-tertiary)" stroke-width=".5"/>';
    });
    svg+='<text x="'+(ml-4).toFixed(1)+'" y="'+ys(v).toFixed(1)+'" text-anchor="end" dominant-baseline="middle" font-size="7.5" fill="var(--color-text-tertiary)" font-family="var(--font-mono)">'+(v>0?'+':'')+v.toFixed(2)+'</text>';
    svg+='<text x="'+(ml-4).toFixed(1)+'" y="'+ys(-v).toFixed(1)+'" text-anchor="end" dominant-baseline="middle" font-size="7.5" fill="var(--color-text-tertiary)" font-family="var(--font-mono)">'+(-v).toFixed(2)+'</text>';
  });

  // Classic gap area fill
  let areaAbove='M '+xs(0).toFixed(1)+' '+yMid.toFixed(1);
  let areaBelow='M '+xs(0).toFixed(1)+' '+yMid.toFixed(1);
  gapsC.forEach((g,i)=>{
    const x=xs(i), y=ys(g);
    if(g>=0) areaAbove+=' L '+x.toFixed(1)+' '+y.toFixed(1);
    else areaBelow+=' L '+x.toFixed(1)+' '+y.toFixed(1);
  });

  // Classic gap line
  const cPts=gapsC.map((g,i)=>xs(i).toFixed(1)+','+ys(g).toFixed(1)).join(' ');
  svg+='<polyline points="'+cPts+'" fill="none" stroke="var(--c-taylor)" stroke-width="2" opacity=".85"/>';
  gapsC.forEach((g,i)=>{
    const col=g>0.05?'var(--color-text-danger)':g<-0.05?'var(--color-text-info)':'var(--color-text-tertiary)';
    svg+='<circle cx="'+xs(i).toFixed(1)+'" cy="'+ys(g).toFixed(1)+'" r="3" fill="'+col+'" opacity=".8"/>';
    svg+='<rect class="mse-hover" x="'+(xs(i)-8).toFixed(1)+'" y="'+(ys(g)-8).toFixed(1)+'" width="16" height="16" fill="transparent" data-label="Taylor−CME gap · '+meetings[i].lb+'" data-val="Classic: '+(g>0?'+':'')+g.toFixed(2)+'% / Balanced: '+(gapsB[i]>0?'+':'')+gapsB[i].toFixed(2)+'%" data-sub="Positive = rule prescribes more tightening than market"/>';
    if(i%2===0||i===n-1) svg+='<text x="'+xs(i).toFixed(1)+'" y="'+(ys(g)+(g>=0?-7:11)).toFixed(1)+'" text-anchor="middle" font-size="7.5" fill="'+col+'" font-family="var(--font-mono)">'+(g>0?'+':'')+g.toFixed(2)+'</text>';
  });

  // Balanced gap line
  const bPts=gapsB.map((g,i)=>xs(i).toFixed(1)+','+ys(g).toFixed(1)).join(' ');
  svg+='<polyline points="'+bPts+'" fill="none" stroke="var(--c-taylor-mod)" stroke-width="1.5" stroke-dasharray="6,3" opacity=".7"/>';

  // X labels
  meetings.forEach((m,i)=>{
    const shortLbl=m.label.replace(/\d{4}/,'').trim()||m.lb.replace(/ 20\d\d/,'');
    if(i%2===0||i===n-1) svg+='<text x="'+xs(i).toFixed(1)+'" y="'+(mt+H+16).toFixed(1)+'" text-anchor="middle" font-size="8" fill="var(--color-text-tertiary)" font-family="var(--font-sans)">'+shortLbl+'</text>';
  });

  svg+='<text x="'+ml+'" y="12" font-size="8" fill="var(--color-text-secondary)" font-family="var(--font-sans)">Taylor minus CME (pp) --- positive = Taylor says tighter</text>';
  svg+='</svg>';
  return svg;
}

function SvgPanel({html}) {
  const ref = React.useRef(null);
  React.useEffect(() => {
    if (ref.current) initTooltips(ref.current);
  });
  return React.createElement('div', {ref: ref, dangerouslySetInnerHTML: {__html: html}});
}

function TreeTab({state, finance}) {
  const {meetings, states, final, compareSeries} = finance;
  const lb = state.fwLb;
  if(!meetings.length) return <div style={{color:'var(--color-text-tertiary)',fontSize:'13px'}}>No meetings detected.</div>;
  const cuts=Object.entries(final).map(([k,p])=>({k:parseInt(k),p:p})).sort((a,b)=>a.k-b.k);
  const cSeries=compareSeries;
  const allRateKeys=[...new Set([...cuts.map(d=>d.k),...(cSeries?Object.keys(cSeries.final).map(Number):[])])].sort((a,b)=>a-b);
  const pC1=cuts.filter(d=>d.k<=-1).reduce((s,d)=>s+d.p,0),pC2=cuts.filter(d=>d.k<=-2).reduce((s,d)=>s+d.p,0),pC3=cuts.filter(d=>d.k<=-3).reduce((s,d)=>s+d.p,0);
  const expC=cuts.reduce((s,d)=>s+(-d.k)*d.p,0),expR=lb-expC*0.25;
  let cards='<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:8px;margin-bottom:1rem">';
  cards+='<div class="fw-stat"><div class="fw-stat-l">P(≥1 cut)</div><div class="fw-stat-v" style="color:var(--color-text-info)">'+(pC1*100).toFixed(1)+'%</div></div>';
  cards+='<div class="fw-stat"><div class="fw-stat-l">P(≥2 cuts)</div><div class="fw-stat-v" style="color:var(--color-text-info)">'+(pC2*100).toFixed(1)+'%</div></div>';
  cards+='<div class="fw-stat"><div class="fw-stat-l">P(≥3 cuts)</div><div class="fw-stat-v" style="color:var(--color-text-info)">'+(pC3*100).toFixed(1)+'%</div></div>';
  cards+='<div class="fw-stat"><div class="fw-stat-l">Expected cuts</div><div class="fw-stat-v">'+expC.toFixed(2)+'</div><div class="fw-stat-s">of 25bp each</div></div>';
  cards+='<div class="fw-stat"><div class="fw-stat-l">Implied rate</div><div class="fw-stat-v">'+expR.toFixed(2)+'%</div><div class="fw-stat-s">exp. lower bound</div></div>';
  cards+='</div>';
  const W=760,NR=18,nCols=states.length,colW=(W-50)/(nCols-1||1);
  const allK=[];states.forEach(s=>Object.keys(s).forEach(k=>{const ki=parseInt(k);if(!allK.includes(ki))allK.push(ki);}));allK.sort((a,b)=>a-b);
  const minK=allK[0],maxK=allK[allK.length-1],nRows=maxK-minK+1,rowH=Math.max(36,Math.min(56,280/Math.max(nRows,1))),svgH=nRows*rowH+60;
  const gx=li=>30+li*colW,gyf=k=>30+(-k)*rowH+rowH/2;
  let svg='';
  for(let li=0;li<states.length-1;li++){
    const m=meetings[li],x1=gx(li)+NR,x2=gx(li+1)-NR;
    Object.entries(states[li]).forEach(([k,p])=>{
      if(p<0.005)return;const ki=parseInt(k),y1=gyf(ki),k0=ki+m.b0,y0=gyf(k0);
      svg+='<line x1="'+x1.toFixed(1)+'" y1="'+y1.toFixed(1)+'" x2="'+x2.toFixed(1)+'" y2="'+y0.toFixed(1)+'" stroke="var(--color-border-secondary)" stroke-width="'+Math.max(.6,p*m.p0*6).toFixed(1)+'" opacity=".85"/>';
      if(m.p1>0.005){const k1=ki+m.b1,y1b=gyf(k1);svg+='<line x1="'+x1.toFixed(1)+'" y1="'+y1.toFixed(1)+'" x2="'+x2.toFixed(1)+'" y2="'+y1b.toFixed(1)+'" stroke="var(--color-border-info)" stroke-width="'+Math.max(.4,p*m.p1*6).toFixed(1)+'" stroke-dasharray="4,2" opacity=".75"/>';}
    });
  }
  states.forEach((st,li)=>{
    const x=gx(li);
    const colLabel=li===0?'Now':(meetings[li-1]&&meetings[li-1].label?meetings[li-1].label.split('–')[0]:'');
    svg+='<text x="'+x.toFixed(1)+'" y="13" text-anchor="middle" font-size="8" fill="var(--color-text-tertiary)" font-family="var(--font-sans)">'+colLabel+'</text>';
    Object.entries(st).forEach(([k,p])=>{
      if(p<0.005)return;
      const ki=parseInt(k),y=gyf(ki),rate=(lb+ki*.25).toFixed(2),fo=Math.min(.92,.12+p*.85);
      svg+='<circle cx="'+x.toFixed(1)+'" cy="'+y.toFixed(1)+'" r="'+NR+'" fill="var(--color-background-info)" fill-opacity="'+fo.toFixed(2)+'" stroke="var(--color-border-info)" stroke-width=".8"/>';
      svg+='<text x="'+x.toFixed(1)+'" y="'+(y-4).toFixed(1)+'" text-anchor="middle" dominant-baseline="middle" font-size="8.5" font-weight="500" fill="var(--color-text-primary)" font-family="var(--font-mono)">'+(p*100).toFixed(0)+'%</text>';

      // Dynamic hover rect

      const confDesc=p>0.50?'Dominant path':p>0.20?'Likely':p>0.05?'Possible':'Tail';

      svg+='<rect class="mse-hover"'

  for(let k=0;k>=minK;k--){const y=gyf(k);svg+='<text x="0" y="'+y.toFixed(1)+'" dominant-baseline="middle" font-size="7.5" fill="var(--color-text-tertiary)" font-family="var(--font-mono)">'+(lb+k*.25).toFixed(2)+'%</text>';}
  const maxP=Math.max(...cuts.map(d=>d.p),...(cSeries?Object.values(cSeries.final):[0]));
  const bW=Math.min(60,520/Math.max(allRateKeys.length,1));
  let dSvg='';
  if(cSeries){
    const cCutsMap=Object.fromEntries(Object.entries(cSeries.final).map(([k,p])=>[parseInt(k),p]));
    allRateKeys.slice().reverse().forEach((k,i)=>{
      const p=cCutsMap[k];if(!p||p<0.002)return;
      const x=20+i*(bW+5),h=Math.max(2,(p/maxP)*52),y=60-h;
      dSvg+='<rect x="'+(x-2).toFixed(1)+'" y="'+y.toFixed(1)+'" width="'+(bW+4).toFixed(1)+'" height="'+Math.max(1,h).toFixed(1)+'" rx="2" fill="var(--c-overlay-a)" stroke="var(--c-overlay)" stroke-width="1.5"/>';
      if(p>.03)dSvg+='<text x="'+(x+bW/2).toFixed(1)+'" y="'+(y-4).toFixed(1)+'" text-anchor="middle" font-size="7.5" fill="var(--c-overlay)" font-family="var(--font-sans)">'+(p*100).toFixed(1)+'%</text>';
    });
  }
  const cutsMap=Object.fromEntries(cuts.map(d=>[d.k,d.p]));
  allRateKeys.slice().reverse().forEach((k,i)=>{
    const p=cutsMap[k];if(!p||p<0.002)return;
    const x=20+i*(bW+5),h=Math.max(2,(p/maxP)*52),y=60-h,fo=.2+p*.75;
    dSvg+='<rect x="'+x+'" y="'+y+'" width="'+bW+'" height="'+Math.max(1,h).toFixed(1)+'" rx="2" fill="var(--color-background-info)" fill-opacity="'+fo.toFixed(2)+'" stroke="var(--color-border-info)" stroke-width=".5"/>';
    if(p>.02)dSvg+='<text x="'+(x+bW/2)+'" y="'+(y-3)+'" text-anchor="middle" font-size="8.5" fill="var(--color-text-secondary)" font-family="var(--font-sans)">'+(p*100).toFixed(1)+'%</text>';
    dSvg+='<text x="'+(x+bW/2)+'" y="73" text-anchor="middle" font-size="7.5" fill="var(--color-text-tertiary)" font-family="var(--font-mono)">'+(lb+k*.25).toFixed(2)+'%</text>';
  });
  const mainLabel=state.fwActiveScenario&&SCENARIOS[state.fwActiveScenario]?SCENARIOS[state.fwActiveScenario].shortLabel:'Baseline';
  const cmpLabel=cSeries?' vs <span style="color:var(--c-overlay)">'+cSeries.label+' ('+cSeries.totalBp+')</span>':'';
  const h=cards
    +'<div style="font-size:10px;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px">Unconditional probability lattice — '+meetings.length+' meetings</div>'
    +'<div style="overflow-x:auto"><svg viewBox="0 0 '+W+' '+svgH+'" style="min-width:500px;width:100%;display:block;height:'+svgH+'px">'+svg+'</svg></div>'
    +'<div style="margin-top:1.25rem">'
    +'<div style="font-size:10px;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px">Final rate distribution — <span style="color:var(--c-cme)">'+mainLabel+'</span>'+cmpLabel+'</div>'
    +'<div style="overflow-x:auto"><svg viewBox="0 0 '+Math.max(560,20+allRateKeys.length*(bW+5)+20)+' 80" style="min-width:400px;width:100%;display:block;height:80px">'+dSvg+'</svg></div>'
    +'</div>'
    +'<div style="display:flex;gap:1.5rem;margin-top:.75rem;font-size:11px;color:var(--color-text-tertiary);flex-wrap:wrap">'
    +'<span>Opacity ∝ probability</span><span>Solid = hold/base · Dashed = extra 25bp cut</span><span>Width ∝ weight</span>'
    +(cSeries?'<span style="color:var(--c-overlay)">■ Amber = compare scenario</span>':'')
    +'</div>';
  return <SvgPanel html={h}/>;
}

function KalshiTab({state, dispatch, finance, fetching, setFetching, refreshStatus, setRefreshStatus, apiKey}) {

  html+='<span class="k-seed-note">'+(refreshStatus.kal||kD.source)+'</span>';
  html+='<button class="refresh-btn" id="poly-btn"'+(fetching.poly?' disabled':'')+' onclick="window.__polyFetch()" style="margin-left:4px"><span'+(fetching.poly?' class="spin"':'')+'>&#x27f3;</span> Fetch Polymarket</button>';

  html+='<span style="display:flex;gap:4px"><span class="k-contract">kxratecutcount-26dec31</span><span class="k-contract">polymarket how-many-cuts</span></span></div>';
  html+=panel2Svg(cmeCC,kD.cutCount,pD.cutCount);

  const kalExpCC=Object.entries(kD.cutCount).reduce((s,[k,p])=>s+(k==='4'?4:parseInt(k))*p,0);

  html+='Poly−CME <span class="k-pill '+(parseFloat(bPC2)>0.05?'k-up':parseFloat(bPC2)<-0.05?'k-dn':'k-neu')+'">'+(bPC2>0?'+':'')+bPC2+'</span> &nbsp;';

  // Panel 4: Dot plot
  html+='<div class="k-grid" style="margin-bottom:12px"><div class="k-panel k-full">';
  html+='<div class="k-hdr"><span class="k-title">④ Market-implied dot plot — CME chain vs Kalshi rate expectations vs Fed SEP</span><span class="k-contract">kxfed-26xxx · Dec 2025 SEP</span></div>';

  html+='</div></div>';

  // Panels 5 + 6
  html+='<div class="k-grid">';
  const cmeHike=getCmeHikeProb(meetings);
  html+='<div class="k-panel"><div class="k-hdr"><span class="k-title">⑤ Hike risk monitor</span>';
  html+='<span style="display:flex;gap:4px"><span class="k-contract">kxfedhike</span><span class="k-contract">polymarket fed-rate-hike-in-2026</span></span></div>';
  html+=panel5Svg(cmeHike,kD.hikeAny,kD.largeCutAny,pD.hikeAny);
  html+='<div class="k-note">Semicircular gauge: CME max single-meeting hike probability (blue), Kalshi "any hike" (orange), Polymarket "hike in 2026" (cyan). Also shown: Kalshi jumbo-cut probability.</div></div>';

  // Panel 6
  html+='<div class="k-panel"><div class="k-hdr"><span class="k-title">⑥ First cut timing — cumulative P(cut has happened)</span>';
  html+='<span style="display:flex;gap:4px"><span class="k-contract">kxratecut-26dec31</span><span class="k-contract">polymarket fed-rate-cut-by</span></span></div>';
  html+=panel6Svg(meetings,states,lb,kD,pD);
  html+='<div class="k-note">CME step curve (blue): cumulative P(≥1 cut) by meeting. Kalshi binary markers (orange ●): cut-by-end-2026 = <b>'+(kD.cutBinary['end-2026']*100).toFixed(0)+'%</b>, cut-by-end-2027 = <b>'+(kD.cutBinary['end-2027']*100).toFixed(0)+'%</b>. Polymarket per-meeting markers (cyan ◆).</div></div></div>';

  // Panel 7
  html+='<div class="k-grid" style="margin-bottom:12px"><div class="k-panel k-full">';
  html+='<div class="k-hdr"><span class="k-title">⑦ Terminal rate distribution end-2026 — CME tree vs Polymarket</span>';
  html+='<span class="k-contract">polymarket what-will-the-fed-rate-be-at-the-end-of-2026</span></div>';
  html+=panel7Svg(final,lb,pD);
  const cmeTerm=Object.entries(final).reduce((s,[k,p])=>s+(lb+parseInt(k)*.25)*p,0);
  const polyTermExp=Object.entries(pD.terminalRate).reduce((s,[r,p])=>s+parseFloat(r)*p,0);
  html+='<div class="k-note">CME expected terminal rate: <b>'+cmeTerm.toFixed(2)+'%</b> · Polymarket expected: <b>'+polyTermExp.toFixed(2)+'%</b>. Polymarket resolves on upper bound — subtract 0.25% when comparing to CME lower-bound figures.</div></div></div>';

  // Panels 8a + 8b
  html+='<div class="k-grid">';
  html+='<div class="k-panel"><div class="k-hdr"><span class="k-title">⑧ Fed Chair nomination — regime risk</span>';
  html+='<span class="k-contract">polymarket who-will-trump-nominate-as-fed-chair · $230M vol</span></div>';
  html+=panel8aHtml(pD);
  html+='<div class="k-note">Polymarket\'s most liquid Fed markets ($230M volume). The nominee probabilities are a proxy for <i>policy regime risk</i>.</div></div>';

  html+='<div class="k-panel"><div class="k-hdr"><span class="k-title">⑨ Emergency cut gauge — unscheduled FOMC action</span>';
  html+='<span class="k-contract">polymarket fed-emergency-rate-cut-before-2027</span></div>';
  html+=panel8bSvg(pD.emergencyCut,pD.hikeAny);
  html+='<div class="k-note">Polymarket-unique contract: P(FOMC holds an unscheduled emergency meeting and cuts before end-2026). Historical context: Jan 2001, Sep 2001, Oct 2008, Mar 2020.</div></div></div>';

  // Wire fetch buttons via window globals (inline onclick in generated HTML)
  useEffect(()=>{
    window.__kalFetch=()=>fetchKalshi(state,dispatch,apiKey,setFetching,setRefreshStatus);
    window.__polyFetch=()=>fetchPolymarket(state,dispatch,apiKey,setFetching,setRefreshStatus);

function SofrTab({state, dispatch, finance, fetching, setFetching, refreshStatus, setRefreshStatus, apiKey}) {
  const {meetings, chain, zqAvgs, instFwd} = finance;
  const lb = state.fwLb;
  const srd = state.srD;
  const fwd = state.fwD;

  window.__srDispatch = (i,v) => dispatch({
    type:'UPDATE_SR_PRICE', i, value:parseFloat(v)||state.srD[i].price
  });

  useEffect(()=>{
    window.__sofrFetch=()=>fetchSOFR(state,dispatch,apiKey,setFetching,setRefreshStatus);

  });

  html+='<span class="k-seed-note">'+(refreshStatus.sofr||'Seed data — click to fetch live SR3 prices')+'</span>';

  html+='<span class="k-dot" style="background:var(--c-sofr-fwd);border:1px dashed var(--c-sofr)"></span> 3M inst. forward &nbsp;';
  html+='<span class="k-dot" style="background:var(--c-dots)"></span> Fed SEP dots';
  html+='</span></div>';

  // -- Panel A: contract table --
  html+='<div class="k-panel" style="margin-bottom:12px">';
  html+='<div class="k-hdr"><span class="k-title">SR3 contract strip — 3-month SOFR futures (CME)</span><span class="k-contract">SR3M6 → SR3Z7</span></div>';
  html+='<div style="overflow-x:auto"><table class="fwt">';
  html+='<thead><tr><th>Contract</th><th>Quarter</th><th>SR3 price</th>';
  html+='<th>Impl. SOFR</th><th>ZQ avg EFFR</th><th>Basis (bp)</th><th>3M inst. fwd</th>';
  html+='</tr></thead><tbody>';
  srd.forEach((s,i)=>{
    const sofrRate=(100-s.price).toFixed(4);
    const zqAvg=zqAvgs[i];
