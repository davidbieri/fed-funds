        </div>

        <div className="k-panel k-full" style={{marginBottom:'12px'}}>
          <div className="k-hdr"><span className="k-title">② Monthly Runoff: Pace vs. Cap</span></div>
          <div dangerouslySetInnerHTML={{__html:svg2}}/>
        </div>

        <div className="k-panel k-full" style={{marginBottom:'12px'}}>
          <div className="k-hdr"><span className="k-title">③ Corridor Mechanics: Stein (2012) SVR &amp; DSS Liquidity Premium</span></div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(180px,1fr))',gap:'8px',margin:'8px 0'}}>
            <div className="fw-stat"><div className="fw-stat-l">IORB</div><div className="fw-stat-v" style={{fontSize:'16px'}}>{iorb.toFixed(2)}%</div><div className="fw-stat-s">Interest on reserve balances</div></div>
            <div className="fw-stat"><div className="fw-stat-l">EFFR</div><div className="fw-stat-v" style={{fontSize:'16px'}}>{effr.toFixed(2)}%</div><div className="fw-stat-s">Effective fed funds rate</div></div>
            <div className="fw-stat"><div className="fw-stat-l" style={{color:svrColor}}>Stein SVR</div><div className="fw-stat-v" style={{fontSize:'16px',color:svrColor}}>{svrBp>=0?'+':''}{svrBp.toFixed(1)} bp</div><div className="fw-stat-s">EFFR − IORB.{svrNote}</div></div>
            <div className="fw-stat"><div className="fw-stat-l" style={{color:lpColor}}>DSS Liquidity Prem.</div><div className="fw-stat-v" style={{fontSize:'16px',color:lpColor}}>{(lp*100).toFixed(1)} bp</div><div className="fw-stat-s">3M T-bill − IORB.{lpNote}</div></div>
            <div className="fw-stat"><div className="fw-stat-l">RRP Outstanding</div><div className="fw-stat-v" style={{fontSize:'16px'}}>${(bsD.rrpUsage||400).toFixed(0)}bn</div><div className="fw-stat-s">RRP draining to zero signals reserve transition</div></div>
          </div>
          <div className="k-note">SVR framework: Stein (2012, QJE). Liquidity premium channel: Drechsler, Savov &amp; Schnabl (2018, JoF). Near-money proxy: Nagel (2016, QJE).</div>
        </div>

        <div className="k-panel k-full">
          <div className="k-hdr">
            <span className="k-title">④ Two-Instrument Policy Space</span>
            <span style={{fontSize:'10px',color:'var(--c-combined)'}}>Combined stance: {combinedStance.toFixed(2)}%</span>
          </div>
          <div dangerouslySetInnerHTML={{__html:svg4}}/>
          <div className="k-note">Combined stance = EFFR + KVJ (2011) shadow rate equivalent. Violet dot = current position. Historical episodes approximate. Neutral floor = Afonso et al. (2022). Framework: Stein (2012, QJE) two-instrument monetary policy.</div>
        </div>
      </div>
    </div>
  );
}

// ============================================================================
// TAB 11 --- Financial Stability (Borio-Mehrling)
// ============================================================================

function FinStabTab({state, dispatch, finance}) {
  const {fsD, bsD, trD} = state;
  const {finNeutralRate:fnRate, leaningPremium:leanPrem, gradualismGap:gradGap, ssPutSignal, dss} = finance;

  function setFsd(key, val){ dispatch({type:'SET_FSD', key, value:parseFloat(val)||0}); }

  const nfci=fsD.nfci||0;
  const nfciRegime=nfci<-0.5?'loose':nfci>0.5?'tight':'neutral';
  const nfciColor=nfciRegime==='loose'?'var(--c-stress-lo)':nfciRegime==='tight'?'var(--c-stress-hi)':'var(--color-text-tertiary)';

  // --- Panel 1: NFCI gauge ---
  const W1=600, H1=80, barY=30, barH=20;
  const xMin=-3, xMax1=3;
  const xSc=v=>40+((v-xMin)/(xMax1-xMin))*520;
  const needleX=Math.max(40,Math.min(560,xSc(nfci)));

  let svg1='<svg viewBox="0 0 '+W1+' '+H1+'" style="width:100%;display:block;overflow:visible">';
  // background zones
  svg1+='<rect x="40" y="'+barY+'" width="'+(xSc(-0.5)-40)+'" height="'+barH+'" fill="var(--c-stress-lo)" opacity=".2"/>';
  svg1+='<rect x="'+xSc(-0.5)+'" y="'+barY+'" width="'+(xSc(0.5)-xSc(-0.5))+'" height="'+barH+'" fill="var(--c-neutral-floor)" opacity=".15"/>';
  svg1+='<rect x="'+xSc(0.5)+'" y="'+barY+'" width="'+(560-xSc(0.5))+'" height="'+barH+'" fill="var(--c-stress-hi)" opacity=".2"/>';
  // zone labels
  svg1+='<text x="'+xSc(-1.75)+'" y="'+(barY+barH+16)+'" text-anchor="middle" font-size="9" fill="var(--c-stress-lo)">LOOSE</text>';
  svg1+='<text x="'+xSc(0)+'" y="'+(barY+barH+16)+'" text-anchor="middle" font-size="9" fill="var(--color-text-tertiary)">NEUTRAL</text>';
  svg1+='<text x="'+xSc(1.75)+'" y="'+(barY+barH+16)+'" text-anchor="middle" font-size="9" fill="var(--c-stress-hi)">TIGHT</text>';
  // threshold lines
  svg1+='<line x1="'+xSc(-0.5)+'" y1="'+(barY-4)+'" x2="'+xSc(-0.5)+'" y2="'+(barY+barH+4)+'" stroke="var(--color-text-tertiary)" stroke-width="1"/>';
  svg1+='<line x1="'+xSc(0.5)+'" y1="'+(barY-4)+'" x2="'+xSc(0.5)+'" y2="'+(barY+barH+4)+'" stroke="var(--color-text-tertiary)" stroke-width="1"/>';
  // axis ticks
  [-2,-1,0,1,2].forEach(v=>{
    svg1+='<line x1="'+xSc(v)+'" y1="'+(barY+barH)+'" x2="'+xSc(v)+'" y2="'+(barY+barH+5)+'" stroke="var(--color-text-tertiary)" stroke-width=".8"/>';
    svg1+='<text x="'+xSc(v)+'" y="'+(barY+barH+14)+'" text-anchor="middle" font-size="8" fill="var(--color-text-tertiary)" font-family="var(--font-mono)">'+v+'</text>';
  });
  // needle
  svg1+='<rect x="'+(needleX-2)+'" y="'+(barY-6)+'" width="4" height="'+(barH+12)+'" fill="'+nfciColor+'" rx="2"/>';
  svg1+='<rect class="mse-hover" x="'+(needleX-12)+'" y="'+(barY-10)+'" width="24" height="'+(barH+20)+'" fill="transparent" data-label="NFCI · Chicago Fed" data-val="'+(nfci>=0?'+':'')+nfci.toFixed(2)+' σ" data-sub="Regime: '+nfciRegime.toUpperCase()+'"/>';
  svg1+='<text x="'+needleX+'" y="'+(barY-9)+'" text-anchor="middle" font-size="11" font-weight="bold" fill="'+nfciColor+'">'+(nfci>=0?'+':'')+nfci.toFixed(2)+'</text>';
  svg1+='</svg>';

  // --- Panel 2: Finance-neutral Taylor Rule gap ---
  const effrNow=finance.effrStart||3.64;
  const jrRate=finance.taylorJRRate||3.5;
  const fnRateVal=fnRate||jrRate;
  const termRate=finance.terminalRate||3.0;
  const sepDot=state.trD?.sepLongRunDot||2.875;
  const leanBp=leanPrem||0;
  const leanColor=leanBp>0?'var(--c-leaning)':leanBp<-25?'var(--c-stress-lo)':'var(--color-text-secondary)';

  // Horizontal rate comparison chart
  const W2=660, H2=170;
  const P2={t:24,r:30,b:30,l:50};
  const cw2=W2-P2.l-P2.r, ch2=H2-P2.t-P2.b;
  const rates=[effrNow, jrRate, fnRateVal, termRate, sepDot];
  const rMin=Math.floor(Math.min(...rates)*2)/2-0.5;
  const rMax=Math.ceil(Math.max(...rates)*2)/2+0.5;
  const xSc2=v=>P2.l+((v-rMin)/(rMax-rMin))*cw2;
  const rowH=ch2/5;

  const rateRows=[
    {lb:'EFFR (current)',       val:effrNow,   col:'var(--c-cme)'},
    {lb:'JR ECM prescribed',    val:jrRate,    col:'var(--c-taylor)'},
    {lb:'Finance-neutral (Borio)', val:fnRateVal, col:'var(--c-fin-neutral)'},
    {lb:'ZQ terminal (12M)',    val:termRate,  col:'var(--c-dots)'},
    {lb:'SEP long-run dot',     val:sepDot,    col:'var(--color-text-tertiary)'},
  ];

  let svg2='<svg viewBox="0 0 '+W2+' '+H2+'" style="width:100%;display:block;overflow:visible">';
  // x-axis grid
  for(let r=Math.ceil(rMin*2)/2;r<=rMax;r+=0.5){
    const x=xSc2(r);
    svg2+='<line x1="'+x+'" y1="'+P2.t+'" x2="'+x+'" y2="'+(P2.t+ch2)+'" stroke="var(--color-border-tertiary)" stroke-width=".5"/>';
    svg2+='<text x="'+x+'" y="'+(H2-8)+'" text-anchor="middle" font-size="8" fill="var(--color-text-tertiary)" font-family="var(--font-mono)">'+r.toFixed(1)+'%</text>';
  }
  // leaning premium shaded region between fnRate and termRate
  const leanX1=Math.min(xSc2(fnRateVal),xSc2(termRate));
  const leanX2=Math.max(xSc2(fnRateVal),xSc2(termRate));
  svg2+='<rect x="'+leanX1+'" y="'+P2.t+'" width="'+(leanX2-leanX1)+'" height="'+ch2+'" fill="var(--c-leaning)" opacity=".08"/>';
  // rate rows
  rateRows.forEach((r,i)=>{
    const y=P2.t+i*rowH+rowH/2;
    const x=xSc2(r.val);
    svg2+='<line x1="'+P2.l+'" y1="'+y+'" x2="'+(P2.l+cw2)+'" y2="'+y+'" stroke="var(--color-border-tertiary)" stroke-width=".3"/>';
    svg2+='<circle cx="'+x+'" cy="'+y+'" r="5" fill="'+r.col+'"/>';
    svg2+='<rect class="mse-hover" x="'+(x-10)+'" y="'+(y-10)+'" width="20" height="20" fill="transparent" data-label="'+r.lb+'" data-val="'+r.val.toFixed(3)+'%" data-sub="Finance-neutral Taylor Rule decomposition"/>';
    svg2+='<text x="'+(x+8)+'" y="'+(y+3)+'" font-size="9" fill="'+r.col+'" font-family="var(--font-mono)">'+r.val.toFixed(2)+'%</text>';
    svg2+='<text x="'+(P2.l-4)+'" y="'+(y+3)+'" text-anchor="end" font-size="9" fill="var(--color-text-secondary)">'+r.lb+'</text>';
  });
  // leaning premium annotation
  const leanMidX=(xSc2(fnRateVal)+xSc2(termRate))/2;
  svg2+='<text x="'+leanMidX+'" y="'+(P2.t+ch2+18)+'" text-anchor="middle" font-size="9" font-weight="500" fill="var(--c-leaning)">Leaning premium: '+(leanBp>=0?'+':'')+leanBp.toFixed(0)+' bp</text>';
  svg2+='</svg>';

  // --- Panel 2b: Gap decomposition stacked bar ---
  const jrGapBp=(jrRate-termRate)*100;
  const rstarDiffBp=((finance.rstarAdj||0.5)-(state.trD?.naturalRate||0.5))*100;
  const W3=640, H3=155;
  const cx3=W3/2, barY3=42;
  const pxBp=Math.min(2.0, (cx3-60)/Math.max(Math.abs(jrGapBp)+Math.abs(rstarDiffBp),1));
  const jrDir=jrGapBp>=0?1:-1;
  const jrW3=Math.abs(jrGapBp)*pxBp;
  const rsW3=Math.abs(rstarDiffBp)*pxBp;

  let svg3='<svg viewBox="0 0 '+W3+' '+H3+'" style="width:100%;display:block;overflow:visible">';
  svg3+='<defs><marker id="arr-lean" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="var(--c-leaning)"/></marker></defs>';
  // zero line
  svg3+='<line x1="'+cx3+'" y1="16" x2="'+cx3+'" y2="'+(H3-28)+'" stroke="var(--color-text-primary)" stroke-width="1.2"/>';
  svg3+='<text x="'+cx3+'" y="12" text-anchor="middle" font-size="9" fill="var(--color-text-secondary)">Market-implied terminal</text>';
  // JR gap bar
  const jrX3=jrDir>0?cx3:cx3-jrW3;
  svg3+='<rect x="'+jrX3+'" y="'+barY3+'" width="'+Math.max(1,jrW3)+'" height="26" fill="var(--c-taylor)" opacity=".7" rx="2"/>';
  const jrLblX3=jrDir>0?cx3+jrW3+5:cx3-jrW3-5;
  svg3+='<text x="'+jrLblX3+'" y="'+(barY3+17)+'" text-anchor="'+(jrDir>0?'start':'end')+'" font-size="10" fill="var(--c-taylor)">JR ECM: '+(jrGapBp>=0?'+':'')+jrGapBp.toFixed(0)+' bp</text>';
  // r* correction bar (stacked)
  const rsX3=jrDir>0?cx3+jrW3:cx3-jrW3-rsW3;
  svg3+='<rect x="'+rsX3+'" y="'+barY3+'" width="'+Math.max(1,rsW3)+'" height="26" fill="var(--c-fin-neutral)" opacity=".7" rx="2"/>';
  const rsLblX3=jrDir>0?rsX3+rsW3+5:rsX3-5;
  svg3+='<text x="'+rsLblX3+'" y="'+(barY3+17)+'" text-anchor="'+(jrDir>0?'start':'end')+'" font-size="10" fill="var(--c-fin-neutral)">r* corr: '+(rstarDiffBp>=0?'+':'')+rstarDiffBp.toFixed(0)+' bp</text>';
  // total leaning premium arrow
  const arrEnd=cx3+Math.min(Math.max(leanBp*pxBp,-250),250);
  svg3+='<line x1="'+cx3+'" y1="'+(barY3+44)+'" x2="'+arrEnd+'" y2="'+(barY3+44)+'" stroke="var(--c-leaning)" stroke-width="2.5" marker-end="url(#arr-lean)"/>';
  svg3+='<text x="'+(arrEnd+(leanBp>=0?6:-6))+'" y="'+(barY3+48)+'" text-anchor="'+(leanBp>=0?'start':'end')+'" font-size="10" font-weight="500" fill="var(--c-leaning)">Total leaning: '+(leanBp>=0?'+':'')+leanBp.toFixed(0)+' bp</text>';
  // axis labels
  svg3+='<text x="20" y="'+(H3-6)+'" font-size="9" fill="var(--color-text-tertiary)">Too accommodative (leaning with wind)</text>';
  svg3+='<text x="'+(W3-20)+'" y="'+(H3-6)+'" text-anchor="end" font-size="9" fill="var(--color-text-tertiary)">Too restrictive (leaning against wind)</text>';
  svg3+='</svg>';

  // --- Panel 3: McCauley (2019) dollar safe asset gauge ---
  const reserves=bsD.reserves||3200, gdp=bsD.gdpNominal||28500;
  const reservesPctGdp=reserves/gdp*100;
  const swapLn=fsD.swapLines||0, xccyBp=fsD.xccyBasis||-8;
  // Layer thresholds
  const resThreshLo=8, resThreshHi=14; // % of GDP
  const swapThresh=fsD.swapLinesP75||10; // $bn
  const xccyThresh=fsD.xccyBasisP75||-20; // bp

  const resColor=reservesPctGdp>=resThreshHi?'var(--c-stress-lo)':reservesPctGdp>=resThreshLo?'var(--c-leaning)':'var(--c-stress-hi)';
  const swapColor=swapLn<1?'var(--c-stress-lo)':swapLn<swapThresh?'var(--c-leaning)':'var(--c-stress-hi)';
  const xccyColor=xccyBp>-5?'var(--c-stress-lo)':xccyBp>xccyThresh?'var(--c-leaning)':'var(--c-stress-hi)';

  // Horizontal gauge for each layer
  const W4=580, H4=130;
  const gY=[22,58,94], gH=18;
  const gL=100, gR=W4-20, gW=gR-gL;
  function gaugeBar(yi, val, min, max, col, label, unit){
    const clamped=Math.max(min,Math.min(max,val));
    const x=gL+((clamped-min)/(max-min))*gW;
    let s='';
    s+='<text x="'+(gL-4)+'" y="'+(gY[yi]+gH/2+4)+'" text-anchor="end" font-size="9" fill="var(--color-text-secondary)">'+label+'</text>';
    s+='<rect x="'+gL+'" y="'+gY[yi]+'" width="'+gW+'" height="'+gH+'" fill="var(--color-background-secondary)" rx="3"/>';
    s+='<rect x="'+gL+'" y="'+gY[yi]+'" width="'+(x-gL)+'" height="'+gH+'" fill="'+col+'" opacity=".6" rx="3"/>';
    s+='<rect x="'+(x-2)+'" y="'+(gY[yi]-3)+'" width="4" height="'+(gH+6)+'" fill="'+col+'" rx="2"/>';
    s+='<text x="'+(x+6)+'" y="'+(gY[yi]+gH/2+4)+'" font-size="10" font-weight="500" fill="'+col+'" font-family="var(--font-mono)">'+val.toFixed(1)+unit+'</text>';
    // min/max labels
    s+='<text x="'+gL+'" y="'+(gY[yi]+gH+12)+'" font-size="7.5" fill="var(--color-text-tertiary)">'+min+unit+'</text>';
    s+='<text x="'+gR+'" y="'+(gY[yi]+gH+12)+'" text-anchor="end" font-size="7.5" fill="var(--color-text-tertiary)">'+max+unit+'</text>';
    return s;
  }
  let svg4='<svg viewBox="0 0 '+W4+' '+H4+'" style="width:100%;display:block;overflow:visible">';
  svg4+=gaugeBar(0, reservesPctGdp, 0, 20, resColor, 'Reserves/GDP', '%');
  svg4+=gaugeBar(1, swapLn, 0, 50, swapColor, 'Swap lines', 'bn');
  svg4+=gaugeBar(2, xccyBp, -50, 10, xccyColor, 'Xccy basis', 'bp');
  svg4+='</svg>';

  // --- Panel 4: Doom loop scatter (term premium vs HY OAS, bubble = LP) ---
  const termPremBp=(finance.termPremium||0)*100;
  const hyOAS=fsD.hyOAS||325;
  const lpAbs=Math.abs(dss?dss.liquidityPremium:0)*100;
  const bubbleR=Math.max(5,Math.min(25,lpAbs*1.5));
  const ssSignal=ssPutSignal||0;

  const W5=500, H5=280;
  const P5={t:30,r:30,b:45,l:55};
  const cw5=W5-P5.l-P5.r, ch5=H5-P5.t-P5.b;
  const xMin5=-50, xMax5=150, yMin5=200, yMax5=700;
  const xSc5=v=>P5.l+((v-xMin5)/(xMax5-xMin5))*cw5;
  const ySc5=v=>P5.t+ch5-((v-yMin5)/(yMax5-yMin5))*ch5;

  let svg5='<svg viewBox="0 0 '+W5+' '+H5+'" style="width:100%;display:block;overflow:visible">';
  [-25,0,25,50,75,100,125].forEach(x=>{
    svg5+='<line x1="'+xSc5(x)+'" y1="'+P5.t+'" x2="'+xSc5(x)+'" y2="'+(P5.t+ch5)+'" stroke="var(--color-border-tertiary)" stroke-width=".5"/>';
    svg5+='<text x="'+xSc5(x)+'" y="'+(H5-18)+'" text-anchor="middle" font-size="8" fill="var(--color-text-tertiary)" font-family="var(--font-mono)">'+x+'</text>';
  });
  [250,350,450,550,650].forEach(y=>{
    svg5+='<line x1="'+P5.l+'" y1="'+ySc5(y)+'" x2="'+(P5.l+cw5)+'" y2="'+ySc5(y)+'" stroke="var(--color-border-tertiary)" stroke-width=".5"/>';
    svg5+='<text x="'+(P5.l-4)+'" y="'+(ySc5(y)+3)+'" text-anchor="end" font-size="8" fill="var(--color-text-tertiary)" font-family="var(--font-mono)">'+y+'</text>';
  });
  // zero term premium vertical
  svg5+='<line x1="'+xSc5(0)+'" y1="'+P5.t+'" x2="'+xSc5(0)+'" y2="'+(P5.t+ch5)+'" stroke="var(--color-text-tertiary)" stroke-width="1" stroke-dasharray="4,3"/>';
  // SS put threshold
  const ssThreshX=xSc5(60);
  svg5+='<line x1="'+ssThreshX+'" y1="'+P5.t+'" x2="'+ssThreshX+'" y2="'+(P5.t+ch5)+'" stroke="var(--c-leaning)" stroke-width="1" stroke-dasharray="6,4" opacity=".6"/>';
  svg5+='<text x="'+(ssThreshX+3)+'" y="'+(P5.t+10)+'" font-size="8" fill="var(--c-leaning)">SS put threshold</text>';
  // stress zone shading
  svg5+='<rect x="'+xSc5(60)+'" y="'+ySc5(yMax5)+'" width="'+(P5.l+cw5-xSc5(60))+'" height="'+(ySc5(450)-ySc5(yMax5))+'" fill="var(--c-stress-hi)" opacity=".04"/>';
  // current position bubble
  const cx5=xSc5(Math.max(xMin5,Math.min(xMax5,termPremBp)));
  const cy5=ySc5(Math.max(yMin5,Math.min(yMax5,hyOAS)));
  const bubbleCol=ssSignal>0?'var(--c-leaning)':ssSignal<0?'var(--c-stress-lo)':'var(--c-lp)';
  svg5+='<circle cx="'+cx5+'" cy="'+cy5+'" r="'+bubbleR+'" fill="'+bubbleCol+'" opacity=".35" stroke="'+bubbleCol+'" stroke-width="1.5"/>';
  svg5+='<circle cx="'+cx5+'" cy="'+cy5+'" r="3" fill="'+bubbleCol+'"/>';
  svg5+='<text x="'+(cx5+bubbleR+4)+'" y="'+(cy5+4)+'" font-size="10" font-weight="500" fill="'+bubbleCol+'">Now</text>';
  svg5+='<text x="'+(P5.l+cw5/2)+'" y="'+(H5-2)+'" text-anchor="middle" font-size="10" fill="var(--color-text-primary)">Term Premium (bp)</text>';
  svg5+='<text x="14" y="'+(P5.t+ch5/2)+'" text-anchor="middle" font-size="10" fill="var(--color-text-primary)" transform="rotate(-90 14 '+(P5.t+ch5/2)+')">HY OAS (bp)</text>';
  svg5+='</svg>';

  // --- Panel 4b: Policy feedback circuit (6-node directed graph) ---
  const W6=560, H6=300;
  const nds=[
    {id:'EFFR',  x:280,y:30,  col:'var(--c-cme)'},
    {id:'LP',    x:500,y:100, col:'var(--c-lp)'},
    {id:'HY',    x:500,y:210, col:'var(--c-stress-hi)'},
    {id:'NFCI',  x:280,y:275, col:'var(--c-fin-neutral)'},
    {id:'FN',    x:60, y:210, col:'var(--c-fin-neutral)'},
    {id:'TP',    x:60, y:100, col:'var(--c-leaning)'},
  ];
  const ndLabels={EFFR:'Policy rate',LP:'DSS Liquidity Prem.',HY:'HY OAS / Risk Premia',NFCI:'Fin. conditions',FN:'Finance-neutral rate',TP:'Term Prem. (SS put)'};
  const edgs=[
    {f:'EFFR',t:'LP',  lb:'DSS: rate → LP'},
    {f:'LP',  t:'HY',  lb:'ϕ×LP → risk premia'},
    {f:'HY',  t:'NFCI',lb:'spreads → NFCI'},
    {f:'NFCI',t:'FN',  lb:'λ·NFCI → fin-neutral'},
    {f:'FN',  t:'EFFR',lb:'prescription → rate'},
    {f:'TP',  t:'EFFR',lb:'SS put: TP↑ → cut'},
  ];
  let svg6='<svg viewBox="0 0 '+W6+' '+H6+'" style="width:100%;display:block;overflow:visible">';
  svg6+='<defs><marker id="arr-circ" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="var(--color-text-secondary)"/></marker></defs>';
  edgs.forEach(e=>{
    const fn=nds.find(n=>n.id===e.f), tn=nds.find(n=>n.id===e.t);
    // offset line endpoints to node edge (r=20)
    const dx=tn.x-fn.x, dy=tn.y-fn.y, d=Math.sqrt(dx*dx+dy*dy);
    const x1=fn.x+dx/d*22, y1=fn.y+dy/d*22, x2=tn.x-dx/d*22, y2=tn.y-dy/d*22;
    const mx=(x1+x2)/2, my=(y1+y2)/2;
    svg6+='<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="var(--color-text-tertiary)" stroke-width="1.2" marker-end="url(#arr-circ)" opacity=".6"/>';
    svg6+='<text x="'+mx+'" y="'+(my-6)+'" text-anchor="middle" font-size="7.5" fill="var(--color-text-tertiary)">'+e.lb+'</text>';
  });
  nds.forEach(n=>{
    svg6+='<circle cx="'+n.x+'" cy="'+n.y+'" r="20" fill="var(--color-background-secondary)" stroke="'+n.col+'" stroke-width="2"/>';
    svg6+='<text x="'+n.x+'" y="'+(n.y+4)+'" text-anchor="middle" font-size="8.5" font-weight="600" fill="'+n.col+'">'+n.id+'</text>';
    svg6+='<text x="'+n.x+'" y="'+(n.y+34)+'" text-anchor="middle" font-size="7.5" fill="var(--color-text-secondary)">'+ndLabels[n.id]+'</text>';
  });
  svg6+='</svg>';

  // --- Panel 5: Financial Cycle Phase Clock (6-axis radar) ---
  const tpBpClock=(finance.termPremium||0)*100;
  const lpAbsClock=Math.abs(dss?dss.liquidityPremium:0);
  // 6 axes normalized to 0-100 percentile
  const axes=[
    {lb:'NFCI',       val:Math.min(100,Math.max(0,(nfci/(fsD.nfciP75||0.5))*50+50)),      raw:(nfci>=0?'+':'')+nfci.toFixed(2)},
    {lb:'Swap lines', val:Math.min(100,(swapLn/(fsD.swapLinesP75||10))*100),                raw:'$'+swapLn.toFixed(1)+'bn'},
    {lb:'|Xccy basis|',val:Math.min(100,(Math.abs(xccyBp)/Math.abs(fsD.xccyBasisP75||-20))*100), raw:xccyBp.toFixed(0)+' bp'},
    {lb:'Term prem',  val:Math.min(100,Math.max(0,(tpBpClock/60)*100)),                     raw:tpBpClock.toFixed(0)+' bp'},
    {lb:'HY OAS',     val:Math.min(100,(hyOAS/(fsD.hyOASP75||500))*100),                    raw:hyOAS.toFixed(0)+' bp'},
    {lb:'|DSS LP|',   val:Math.min(100,(lpAbsClock/(fsD.lpP75||0.20))*100),                 raw:(lpAbsClock*100).toFixed(0)+' bp'},
  ];
  const nAxes=axes.length;
  const cx7=200, cy7=170, R7=120;
  const angleStep=2*Math.PI/nAxes;
  const ptOnAxis=(ai,r)=>{
    const a=-Math.PI/2+ai*angleStep;
    return {x:cx7+Math.cos(a)*r, y:cy7+Math.sin(a)*r};
  };

  let svg7='<svg viewBox="0 0 400 340" style="width:100%;display:block;">';
  // concentric rings at 25,50,75,100%
  [0.25,0.5,0.75,1.0].forEach(pct=>{
    const r=R7*pct;
    let ring='';
    for(let i=0;i<nAxes;i++){
      const p=ptOnAxis(i,r);
      ring+=(i===0?'M':'L')+p.x.toFixed(1)+','+p.y.toFixed(1);
    }
    ring+='Z';
    svg7+='<path d="'+ring+'" fill="none" stroke="var(--color-border-tertiary)" stroke-width=".5"/>';
    if(pct===1.0) svg7+='<path d="'+ring+'" fill="none" stroke="var(--color-border-secondary)" stroke-width="1"/>';
  });
  // axis lines + labels
  axes.forEach((a,i)=>{
    const outer=ptOnAxis(i,R7+8);
    const labelPt=ptOnAxis(i,R7+28);
    svg7+='<line x1="'+cx7+'" y1="'+cy7+'" x2="'+outer.x.toFixed(1)+'" y2="'+outer.y.toFixed(1)+'" stroke="var(--color-border-tertiary)" stroke-width=".5"/>';
    svg7+='<text x="'+labelPt.x.toFixed(1)+'" y="'+labelPt.y.toFixed(1)+'" text-anchor="middle" dominant-baseline="middle" font-size="9" fill="var(--color-text-secondary)">'+a.lb+'</text>';
    // raw value below label
    svg7+='<text x="'+labelPt.x.toFixed(1)+'" y="'+(labelPt.y+12).toFixed(1)+'" text-anchor="middle" font-size="8" fill="var(--color-text-tertiary)" font-family="var(--font-mono)">'+a.raw+'</text>';
  });
  // filled polygon
  let polyPath='';
  axes.forEach((a,i)=>{
    const r=R7*(a.val/100);
    const p=ptOnAxis(i,r);
    polyPath+=(i===0?'M':'L')+p.x.toFixed(1)+','+p.y.toFixed(1);
  });
  polyPath+='Z';
  svg7+='<path d="'+polyPath+'" fill="var(--c-fin-neutral)" opacity=".2" stroke="var(--c-fin-neutral)" stroke-width="2"/>';
  // vertex dots + hover targets
  axes.forEach((a,i)=>{
    const r=R7*(a.val/100);
    const p=ptOnAxis(i,r);
    const dotCol=a.val>75?'var(--c-stress-hi)':a.val>50?'var(--c-leaning)':'var(--c-stress-lo)';
    svg7+='<circle cx="'+p.x.toFixed(1)+'" cy="'+p.y.toFixed(1)+'" r="5" fill="'+dotCol+'" opacity=".9"/>';
    // Hover target around dot
    svg7+='<rect class="mse-hover" x="'+(p.x-12).toFixed(1)+'" y="'+(p.y-12).toFixed(1)+'" width="24" height="24" fill="transparent"'
      +' data-label="'+a.lb+'"'
      +' data-val="'+a.raw+' · '+a.val.toFixed(0)+'th pctile"'
      +' data-sub="'+(a.val>75?'⚠ Elevated stress':a.val>50?'Moderate':'Low stress')+'"/>';
  });
  // Phase clock index = polygon area / hexagon area * 100
  // Shoelace formula for polygon area
  let polyArea=0;
  axes.forEach((a,i)=>{
    const r1=R7*(a.val/100), r2=R7*(axes[(i+1)%nAxes].val/100);
    const p1=ptOnAxis(i,r1), p2=ptOnAxis((i+1)%nAxes,r2);
    polyArea+=p1.x*p2.y-p2.x*p1.y;
  });
  polyArea=Math.abs(polyArea)/2;
  const hexArea=nAxes*0.5*R7*R7*Math.sin(angleStep); // area of regular hexagon at r=R7
  const phaseIdx=Math.min(100,(polyArea/hexArea)*100);
  const phaseCol=phaseIdx>66?'var(--c-stress-hi)':phaseIdx>33?'var(--c-leaning)':'var(--c-stress-lo)';
  // center label
  svg7+='<text x="'+cx7+'" y="'+(cy7-4)+'" text-anchor="middle" font-size="22" font-weight="600" fill="'+phaseCol+'">'+phaseIdx.toFixed(0)+'</text>';
  svg7+='<text x="'+cx7+'" y="'+(cy7+12)+'" text-anchor="middle" font-size="9" fill="var(--color-text-tertiary)">Phase Clock Index</text>';
  svg7+='</svg>';

  return (
    <div>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:'8px',marginBottom:'10px'}}>
        <div>
          <h3 style={{fontSize:'15px',fontWeight:600,margin:0}}>Financial Stability</h3>
          <div style={{fontSize:'10px',color:'var(--color-text-tertiary)',marginTop:'2px'}}>
            <span className="data-badge">{fsD.fetched?'live':'seed'}</span>
            {' '}{fsD.source}{fsD.asOf?' · '+fsD.asOf:''}
          </div>
        </div>
        <button className="refresh-btn" onClick={()=>fetchFinancialStability(dispatch)}>&#x27f3; Fetch FRED</button>
      </div>

      <div style={{background:nfciRegime==='loose'?'rgba(22,163,74,0.07)':nfciRegime==='tight'?'rgba(220,38,38,0.07)':'transparent',borderLeft:'3px solid '+nfciColor,padding:'6px 12px',marginBottom:'12px',fontSize:'11px',color:nfciColor,borderRadius:'0 var(--border-radius-md) var(--border-radius-md) 0'}}>
        Financial conditions: <b>{nfciRegime.toUpperCase()}</b> regime (NFCI {nfci>=0?'+':''}{nfci.toFixed(2)}).
        {nfciRegime==='loose'&&' Policy is leaning WITH the financial cycle wind (Borio 2012).'}
        {nfciRegime==='tight'&&' Conditions tighter than average. Monitor stress indicators.'}
        {nfciRegime==='neutral'&&' Conditions near historical average.'}
      </div>

      <div className="k-grid">
        <div className="k-panel k-full" style={{marginBottom:'12px'}}>
          <div className="k-hdr">
            <span className="k-title">① Financial Conditions vs. Policy Stance</span>
            <span style={{fontSize:'10px',color:'var(--color-text-tertiary)'}}>Chicago Fed NFCI (weekly, FRED: NFCI)</span>
          </div>
          <div dangerouslySetInnerHTML={{__html:svg1}}/>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(140px,1fr))',gap:'8px',margin:'10px 0'}}>
            <div className="fw-stat"><div className="fw-stat-l" style={{color:nfciColor}}>NFCI</div><div className="fw-stat-v" style={{fontSize:'16px',color:nfciColor}}>{nfci>=0?'+':''}{nfci.toFixed(2)}</div><div className="fw-stat-s">{nfciRegime} regime</div></div>
            <div className="fw-stat"><div className="fw-stat-l">HY OAS</div><div className="fw-stat-v" style={{fontSize:'16px'}}>{(fsD.hyOAS||325).toFixed(0)} bp</div><div className="fw-stat-s">ICE BofA HY index</div></div>
            <div className="fw-stat"><div className="fw-stat-l">Xccy basis</div><div className="fw-stat-v" style={{fontSize:'16px'}}>{(fsD.xccyBasis||-8).toFixed(0)} bp</div><div className="fw-stat-s">EUR/USD 3M</div></div>
            <div className="fw-stat">
              <div className="fw-stat-l">λ_fc (NFCI weight)</div>
              <div><input className="fw-in" type="number" value={fsD.lambdaFC} style={{width:'55px'}} onChange={e=>setFsd('lambdaFC',e.target.value)} step="0.1" min="0" max="2"/></div>
              <div className="fw-stat-s">Borio (2012) finance-neutral</div>
            </div>
          </div>
          <div className="k-note">NFCI: Chicago Fed National Financial Conditions Index. Positive = tighter than average. Regime fills per Borio (2014, JBF): financial cycle affects optimal policy stance. λ_fc weights NFCI in finance-neutral Taylor Rule (Panel 2).</div>
        </div>

        <div className="k-panel k-full" style={{marginBottom:'12px'}}>
          <div className="k-hdr">
            <span className="k-title">② Finance-Neutral Taylor Rule Gap</span>
            <span style={{fontSize:'10px',color:leanColor}}>Leaning premium: {leanBp>=0?'+':''}{leanBp.toFixed(0)} bp</span>
          </div>
          <div dangerouslySetInnerHTML={{__html:svg2}}/>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(130px,1fr))',gap:'8px',margin:'10px 0'}}>
            <div className="fw-stat"><div className="fw-stat-l" style={{color:'var(--c-fin-neutral)'}}>Finance-neutral rate</div><div className="fw-stat-v" style={{fontSize:'16px',color:'var(--c-fin-neutral)'}}>{fnRateVal.toFixed(2)}%</div><div className="fw-stat-s">JR + λ·NFCI</div></div>
            <div className="fw-stat"><div className="fw-stat-l" style={{color:'var(--c-taylor)'}}>JR ECM prescribed</div><div className="fw-stat-v" style={{fontSize:'16px',color:'var(--c-taylor)'}}>{jrRate.toFixed(2)}%</div><div className="fw-stat-s">Inflation-neutral only</div></div>
            <div className="fw-stat"><div className="fw-stat-l" style={{color:'var(--c-leaning)'}}>Leaning premium</div><div className="fw-stat-v" style={{fontSize:'16px',color:leanColor}}>{leanBp>=0?'+':''}{leanBp.toFixed(0)} bp</div><div className="fw-stat-s">{leanBp>0?'Market below fin-neutral':'Market at/above fin-neutral'}</div></div>
            <div className="fw-stat"><div className="fw-stat-l">Gradualism gap</div><div className="fw-stat-v" style={{fontSize:'16px'}}>{gradGap>=0?'+':''}{gradGap.toFixed(0)} bp</div><div className="fw-stat-s">SEP dot − ZQ terminal (SS 2018)</div></div>
          </div>
          <div className="k-note">Finance-neutral rate: Borio (2012, 2014) JR ECM augmented with NFCI (λ_fc = {fsD.lambdaFC}). Leaning premium: gap between finance-neutral prescription and ZQ-implied terminal. Positive = market prices less tightening than financial stability warrants. Gradualism gap: Stein &amp; Sunderam (2018, JoF) SEP dot vs market terminal.</div>
        </div>

        <div className="k-panel k-full" style={{marginBottom:'12px'}}>
          <div className="k-hdr">
            <span className="k-title">②b Gap Decomposition: JR + r* Endogeneity</span>
            <span style={{fontSize:'10px',color:leanBp>50?'var(--c-stress-hi)':leanBp<-50?'var(--c-stress-lo)':'var(--c-leaning)'}}>
              Leaning premium: {leanBp>=0?'+':''}{leanBp.toFixed(0)} bp
            </span>
          </div>
          <div dangerouslySetInnerHTML={{__html:svg3}}/>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(130px,1fr))',gap:'8px',margin:'10px 0'}}>
            <div className="fw-stat"><div className="fw-stat-l">CME terminal</div><div className="fw-stat-v" style={{fontSize:'16px'}}>{termRate.toFixed(2)}%</div><div className="fw-stat-s">Market-implied 12M</div></div>
            <div className="fw-stat"><div className="fw-stat-l" style={{color:'var(--c-taylor)'}}>JR ECM prescribed</div><div className="fw-stat-v" style={{fontSize:'16px',color:'var(--c-taylor)'}}>{jrRate.toFixed(2)}%</div><div className="fw-stat-s">Gap: {jrGapBp>=0?'+':''}{jrGapBp.toFixed(0)} bp</div></div>
            <div className="fw-stat"><div className="fw-stat-l" style={{color:'var(--c-fin-neutral)'}}>Borio r* adj.</div><div className="fw-stat-v" style={{fontSize:'16px',color:'var(--c-fin-neutral)'}}>{(finance.rstarAdj||0.5).toFixed(3)}%</div><div className="fw-stat-s">Corr: {rstarDiffBp>=0?'+':''}{rstarDiffBp.toFixed(0)} bp vs LW</div></div>
            <div className="fw-stat"><div className="fw-stat-l" style={{color:'var(--c-fin-neutral)'}}>Finance-neutral</div><div className="fw-stat-v" style={{fontSize:'16px',color:'var(--c-fin-neutral)'}}>{fnRateVal.toFixed(2)}%</div><div className="fw-stat-s">JR + λ·NFCI + r* corr</div></div>
          </div>
          <div style={{display:'flex',gap:'12px',flexWrap:'wrap',fontSize:'11px',margin:'6px 0'}}>
            <label style={{color:'var(--color-text-secondary)'}}>Credit-GDP gap (σ):
              <input className="fw-in" type="number" value={fsD.creditGDPGap} style={{width:'60px',marginLeft:'4px'}}
                onChange={e=>setFsd('creditGDPGap',e.target.value)} step="0.1" min="-3" max="3"/>
            </label>
            <label style={{color:'var(--color-text-secondary)'}}>Productivity drag (pp/yr):
              <input className="fw-in" type="number" value={fsD.productivityDrag} style={{width:'60px',marginLeft:'4px'}}
                onChange={e=>setFsd('productivityDrag',e.target.value)} step="0.05" min="-2" max="0"/>
            </label>
          </div>
          <div className="k-note">Finance-neutral rule: JR ECM + λ_fc × NFCI (Borio 2012/2014). r* endogeneity correction: Borio (2016, Cato J, Pillar II) productivity drag ({fsD.productivityDrag} pp/yr × {fsD.cycleHorizonYrs} yr). Finance-neutral output gap: Borio, Disyatat &amp; Juselius (2013, BIS WP404).</div>
        </div>

        <div className="k-panel k-full" style={{marginBottom:'12px'}}>
          <div className="k-hdr">
            <span className="k-title">③ Dollar Safe Asset Gauge (McCauley 2019)</span>
            <span style={{fontSize:'10px',color:'var(--color-text-tertiary)'}}>3-layer assessment</span>
          </div>
          <div dangerouslySetInnerHTML={{__html:svg4}}/>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(150px,1fr))',gap:'8px',margin:'10px 0'}}>
            <div className="fw-stat"><div className="fw-stat-l" style={{color:resColor}}>Reserves / GDP</div><div className="fw-stat-v" style={{fontSize:'16px',color:resColor}}>{reservesPctGdp.toFixed(1)}%</div><div className="fw-stat-s">${reserves.toFixed(0)}bn / ${(gdp/1000).toFixed(1)}T</div></div>
            <div className="fw-stat"><div className="fw-stat-l" style={{color:swapColor}}>Swap line drawdowns</div><div className="fw-stat-v" style={{fontSize:'16px',color:swapColor}}>${swapLn.toFixed(1)}bn</div><div className="fw-stat-s">{swapLn<1?'No emergency demand':'CB dollar demand active'}</div></div>
            <div className="fw-stat">
              <div className="fw-stat-l" style={{color:xccyColor}}>EUR/USD xccy basis</div>
              <div className="fw-stat-v" style={{fontSize:'16px',color:xccyColor}}>{xccyBp.toFixed(0)} bp</div>
              <div className="fw-stat-s">
                <span className="data-badge" style={{background:'var(--color-background-info)',color:'var(--color-text-warning)',fontSize:'9px'}}>⚠ manual</span>
                {' '}<input className="fw-in" type="number" value={fsD.xccyBasis} style={{width:'55px'}} onChange={e=>setFsd('xccyBasis',e.target.value)} step="1"/>
              </div>
            </div>
          </div>
          <div className="k-note">McCauley (2019, BIS WP 782): the dollar functions as the global safe asset. Layer 1 (structural): Fed reserve balances relative to GDP measure the supply of ultimate dollar safe assets. Layer 2 (institutional): CB swap line drawdowns signal emergency offshore dollar demand. Layer 3 (market): EUR/USD cross-currency basis prices the marginal cost of dollar funding — deeply negative = acute scarcity. Xccy basis requires manual entry (no free public API).</div>
        </div>

        <div className="k-panel k-full" style={{marginBottom:'12px'}}>
          <div className="k-hdr">
            <span className="k-title">④ Doom Loop Scatter: Term Premium vs. HY OAS</span>
            <span style={{fontSize:'10px',color:bubbleCol}}>
              SS put: {ssSignal>0?'✅ active':ssSignal<0?'❌ compressed':'— normal'}
              {' · '}LP bubble: {lpAbs.toFixed(0)} bp
            </span>
          </div>
          <div dangerouslySetInnerHTML={{__html:svg5}}/>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(120px,1fr))',gap:'8px',margin:'10px 0'}}>
            <div className="fw-stat"><div className="fw-stat-l">Term premium</div><div className="fw-stat-v" style={{fontSize:'16px'}}>{termPremBp.toFixed(0)} bp</div><div className="fw-stat-s">β₀ − EFFR</div></div>
            <div className="fw-stat"><div className="fw-stat-l">HY OAS</div><div className="fw-stat-v" style={{fontSize:'16px'}}>{hyOAS.toFixed(0)} bp</div><div className="fw-stat-s">ICE BofA index</div></div>
            <div className="fw-stat"><div className="fw-stat-l" style={{color:'var(--c-lp)'}}>DSS LP</div><div className="fw-stat-v" style={{fontSize:'16px',color:'var(--c-lp)'}}>{(dss?dss.liquidityPremium*100:0).toFixed(0)} bp</div><div className="fw-stat-s">Bubble radius</div></div>
            <div className="fw-stat"><div className="fw-stat-l" style={{color:'var(--c-leaning)'}}>SS put signal</div><div className="fw-stat-v" style={{fontSize:'14px',color:bubbleCol}}>{ssSignal>0?'ACTIVE':ssSignal<0?'COMPRESSED':'NORMAL'}</div><div className="fw-stat-s">Stein-Sunderam 2018</div></div>
          </div>
          <div className="k-note">Mehrling doom loop: elevated term premium + wide HY spreads + negative LP = reinforcing tightening spiral. Bubble size = |DSS liquidity premium|. Orange = SS put active (TP &gt; 75th pctile). SS put threshold at 60bp (Kim-Wright/ACM historical calibration).</div>
        </div>

        <div className="k-panel k-full" style={{marginBottom:'12px'}}>
          <div className="k-hdr">
            <span className="k-title">④b Policy Feedback Circuit (BIS/Mehrling Framework)</span>
            <span style={{fontSize:'10px',color:'var(--color-text-tertiary)'}}>6-node directed graph</span>
          </div>
          <div dangerouslySetInnerHTML={{__html:svg6}}/>
          <div className="k-note">The Mehrling-BIS feedback circuit: EFFR → DSS liquidity premium → risk premia (HY OAS) → NFCI → finance-neutral rate → policy prescription → EFFR. The Stein-Sunderam (2018) term premium put provides an additional stabilizing channel: when TP rises above the 75th percentile, the Fed cuts to mitigate bond-market volatility. When the loop reinforces (all arrows tightening simultaneously), the Mehrling doom loop is active.</div>
        </div>

        <div className="k-panel k-full" style={{marginBottom:'12px'}}>
          <div className="k-hdr">
            <span className="k-title">⑤ Financial Cycle Phase Clock</span>
            <span style={{fontSize:'10px',color:phaseCol}}>Phase index: {phaseIdx.toFixed(0)}/100</span>
          </div>
          <div dangerouslySetInnerHTML={{__html:svg7}}/>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(90px,1fr))',gap:'8px',margin:'10px 0'}}>
            {axes.map(a=>{
              const col=a.val>75?'var(--c-stress-hi)':a.val>50?'var(--c-leaning)':'var(--c-stress-lo)';
              return <div key={a.lb} className="fw-stat"><div className="fw-stat-l">{a.lb}</div><div className="fw-stat-v" style={{fontSize:'14px',color:col}}>{a.val.toFixed(0)}%</div><div className="fw-stat-s">{a.raw}</div></div>;
            })}
          </div>
          <div className="k-note">6-axis radar normalized to historical 75th percentile thresholds. Phase clock index = polygon area / full hexagon area × 100. Green (&lt;33): benign. Amber (33–66): monitor. Red (&gt;66): stress regime. Axes: NFCI (Chicago Fed), swap lines (FRED: SWPT), |xccy basis| (manual), term premium (β₀−EFFR), HY OAS (FRED: BAMLH0A0HYM2), |DSS liquidity premium| (Nagel 2016 proxy). Framework synthesis: Borio (2012/2016), McCauley (2019), Stein-Sunderam (2018), DSS (2018).</div>
        </div>
      </div>
    </div>
  );
}

function App() {
  const [state, dispatch] = useReducer(reducer, INITIAL_STATE);
  const finance = useFinance(state);
  const [apiKey, setApiKey] = useState('');
  const [refreshStatus, setRefreshStatus] = useState({zq:'', kal:'', poly:'', sofr:'', yc:''});
  const [fetching, setFetching] = useState({zq:false, kal:false, poly:false, sofr:false, yc:false});

  useEffect(() => {
    try {
      const s = JSON.parse(localStorage.getItem('fwCfg') || '{}');
      if(s.lb || s.scenario || s.compare) dispatch({type:'LOAD_SETTINGS', settings:s});
    } catch(e) {}
  }, []);

  useEffect(() => {
    try { localStorage.setItem('fwCfg', JSON.stringify({lb:state.fwLb, scenario:state.fwActiveScenario, compare:state.fwCompareScenario})); }
    catch(e) {}
  }, [state.fwLb, state.fwActiveScenario, state.fwCompareScenario]);

  useEffect(() => {
    const timer = setTimeout(() => initTooltips(document.body), 50);
    return () => clearTimeout(timer);
  });

  const TABS = [
    {id:'inputs',     label:'Futures inputs',       tc:'tc-market'},
    {id:'chain',      label:'EFFR chain',            tc:'tc-market'},
    {id:'tree',       label:'Probability tree',      tc:'tc-market'},
    {id:'kalshi',     label:'⚖ Prediction markets', tc:'tc-market'},
    {id:'sofr',       label:'\ud83d\udcc8 SOFR strip',   tc:'tc-market'},
    {id:'dashboard',  label:'\ud83d\uddc2 Dashboard',     tc:'tc-analytics'},
    {id:'yieldcurve', label:'\ud83d\udcd0 Yield Curve',   tc:'tc-analytics'},
    {id:'taylor',     label:'\ud83c\udfaf Taylor Rule',   tc:'tc-analytics'},
    {id:'riding',     label:'\ud83d\udcca Riding',        tc:'tc-analytics'},
    {id:'bs',         label:'\ud83c\udfe6 Balance Sheet', tc:'tc-macro'},
    {id:'fs',         label:'\ud83d\udee1 Fin. Stability',tc:'tc-macro'},
  ];

  return (
    <div style={{padding:'1rem 0 .5rem'}}>
      <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',flexWrap:'wrap',gap:'8px',marginBottom:'6px'}}>
        <div>
          <h2 style={{fontSize:'18px',fontWeight:500,margin:'0 0 2px'}}>SPIA &middot; VT &ensp;|&ensp; MSE: A Multi-Market Framework for Federal Reserve Policy Analytics</h2>
          <div style={{fontSize:'12px',color:'var(--color-text-secondary)'}}>
            Target: <b style={{color:'var(--color-text-primary)'}}>{state.fwLb.toFixed(2)}&ndash;{(state.fwLb+0.25).toFixed(2)}%</b>
            &nbsp;&middot;&nbsp;EFFR: <b style={{color:'var(--color-text-primary)'}}>{finance.effrStart.toFixed(2)}%</b>
          </div>
        </div>
        <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:'4px'}}>
          <div style={{display:'flex',gap:'6px',alignItems:'center'}}>
            <input type="password" className="fw-in" placeholder="sk-ant-... (standalone only)"
              style={{width:'195px',fontSize:'11px'}} value={apiKey}
              onChange={e=>setApiKey(e.target.value)}/>
            <button className="refresh-btn" disabled={fetching.zq}
              onClick={()=>refreshData(state,dispatch,apiKey,setFetching,setRefreshStatus)}>
              <span className={fetching.zq?'spin':''}>&#x27f3;</span> Refresh ZQ
            </button>
          </div>
          <div style={{fontSize:'10px',color:'var(--color-text-tertiary)',textAlign:'right',maxWidth:'400px',minHeight:'14px'}}>{refreshStatus.zq}</div>
        </div>
      </div>

      <p style={{fontSize:'13px',color:'var(--color-text-secondary)',margin:'0 0 .5rem'}}>CME FedWatch methodology (ZQ futures chain) · Kalshi &amp; Polymarket prediction markets · SOFR strip · Dashboard · Nelson-Siegel yield curve · Taylor Rule suite (6 variants) · Bieri-Chincarini riding calculator · Fed balance sheet &amp; QT monitor · Financial stability (BIS/Mehrling). 12 months forward, 11 tabs.</p>
      <div className="api-note">
        <b>Running standalone?</b> Paste your Anthropic API key (<code>sk-ant-...</code>) above &mdash; get one at <code>console.anthropic.com</code>. Refreshes cost &lt;$0.01 each. Inside claude.ai the key is injected automatically.
      </div>

      <div style={{display:'flex',gap:'4px',background:'var(--color-background-secondary)',borderRadius:'var(--border-radius-md)',padding:'3px',margin:'1rem 0 1.25rem',width:'fit-content',flexWrap:'wrap'}}>
        {TABS.map(t=>
          <React.Fragment key={t.id}>
            {t.id==='dashboard' && <span className="tab-group-divider"/>}
            {t.id==='bs'        && <span className="tab-group-divider"/>}
            <div className={'fw-tab '+t.tc+(state.fwActive===t.id?' act':'')}
                onClick={()=>dispatch({type:'SET_TAB',tab:t.id})}>
                {t.label}
            </div>
          </React.Fragment>
        )}
      </div>

      {state.fwActive==='inputs' && <FuturesInputsTab state={state} dispatch={dispatch} finance={finance}/>}
      {state.fwActive==='chain'  && <ChainTab state={state} finance={finance}/>}
      {state.fwActive==='tree'   && <TreeTab state={state} finance={finance}/>}
      {state.fwActive==='kalshi' && <KalshiTab state={state} dispatch={dispatch} finance={finance}
        fetching={fetching} setFetching={setFetching}
        refreshStatus={refreshStatus} setRefreshStatus={setRefreshStatus} apiKey={apiKey}/>}
      {state.fwActive==='sofr' && <SofrTab state={state} dispatch={dispatch} finance={finance}
        fetching={fetching} setFetching={setFetching}
        refreshStatus={refreshStatus} setRefreshStatus={setRefreshStatus} apiKey={apiKey}/>}
      {state.fwActive==='dashboard' && <DashboardTab state={state} finance={finance}/>}
      {state.fwActive==='taylor' && <TaylorRuleTab state={state} dispatch={dispatch} finance={finance}/>}
      {state.fwActive==='yieldcurve' && <YieldCurveTab state={state} dispatch={dispatch} finance={finance}
        fetching={fetching} setFetching={setFetching}
        refreshStatus={refreshStatus} setRefreshStatus={setRefreshStatus} apiKey={apiKey}/>}
      {state.fwActive==='riding' && <RidingTab state={state} dispatch={dispatch} finance={finance}/>}
      {state.fwActive==='bs' && <BalanceSheetTab state={state} dispatch={dispatch} finance={finance}/>}
      {state.fwActive==='fs' && <FinStabTab state={state} dispatch={dispatch} finance={finance}/>}
      {!['inputs','chain','tree','kalshi','sofr','dashboard','taylor','yieldcurve','riding','bs','fs'].includes(state.fwActive) &&
        <div style={{color:'var(--color-text-tertiary)',fontSize:'13px'}}>Tab content coming in next steps</div>}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);

}

<script>
(function(){
  const KEY='mse-theme';
  const saved=localStorage.getItem(KEY)||'light';
  document.documentElement.setAttribute('data-theme',saved);
  window.mseToggleTheme=function(){
    const next=document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark';
    document.documentElement.setAttribute('data-theme',next);
    localStorage.setItem(KEY,next);
    const btn=document.getElementById('theme-toggle');
    if(btn)btn.textContent=next==='dark'?'○':'◐';
  };
  // Set initial button state after DOM ready
  document.addEventListener('DOMContentLoaded',function(){
    const btn=document.getElementById('theme-toggle');
    if(btn)btn.textContent=saved==='dark'?'○':'◐';
  });
})();
</script>
