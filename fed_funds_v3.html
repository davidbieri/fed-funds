<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fed Funds Probability Tree v3 — React</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
:root {
  --color-text-primary:#1a1a1a;--color-text-secondary:#555;--color-text-tertiary:#888;
  --color-text-info:#1d6fa4;--color-text-warning:#c97d00;--color-text-danger:#c0392b;--color-text-success:#166534;
  --color-background-primary:#ffffff;--color-background-secondary:#f4f4f5;
  --color-background-info:#dbeafe;--color-background-danger:#fee2e2;--color-background-success:#dcfce7;
  --color-border-secondary:#d1d5db;--color-border-tertiary:#e5e7eb;--color-border-info:#93c5fd;
  --border-radius-md:8px;
  --font-sans:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  --font-mono:"SF Mono","Fira Code","Roboto Mono",monospace;
  --c-cme:#3b82f6;--c-kal:#f97316;--c-poly:#06b6d4;--c-dots:#8b5cf6;--c-sofr:#10b981;--c-sofr-fwd:#34d399;
  --c-cme-a:rgba(59,130,246,0.15);--c-kal-a:rgba(249,115,22,0.15);--c-poly-a:rgba(6,182,212,0.15);
}
@media(prefers-color-scheme:dark){
  :root{
    --color-text-primary:#f0f0f0;--color-text-secondary:#aaa;--color-text-tertiary:#777;
    --color-text-info:#60a5fa;--color-text-warning:#fbbf24;--color-text-danger:#f87171;--color-text-success:#86efac;
    --color-background-primary:#18181b;--color-background-secondary:#27272a;
    --color-background-info:#1e3a5f;--color-background-danger:#450a0a;--color-background-success:#14532d;
    --color-border-secondary:#3f3f46;--color-border-tertiary:#3f3f46;--color-border-info:#2563eb;
    --c-cme:#60a5fa;--c-kal:#fb923c;--c-poly:#22d3ee;--c-dots:#a78bfa;--c-sofr:#34d399;--c-sofr-fwd:#6ee7b7;
    --c-cme-a:rgba(96,165,250,0.15);--c-kal-a:rgba(251,146,60,0.15);--c-poly-a:rgba(34,211,238,0.15);
  }
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);background:var(--color-background-primary);color:var(--color-text-primary);padding:1.5rem;max-width:900px;margin:0 auto}
.fw-tab{display:inline-block;padding:5px 14px;font-size:13px;cursor:pointer;border-radius:var(--border-radius-md);color:var(--color-text-secondary)}
.fw-tab.act{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);color:var(--color-text-primary);font-weight:500}
.fwt{width:100%;border-collapse:collapse}
.fwt th{text-align:left;padding:5px 8px;font-size:10px;font-weight:500;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:.05em;border-bottom:.5px solid var(--color-border-tertiary);white-space:nowrap}
.fwt td{padding:5px 8px;border-bottom:.5px solid var(--color-border-tertiary);font-size:12px;vertical-align:middle}
.fw-in{font-family:var(--font-mono);font-size:12px;padding:2px 5px;border:.5px solid var(--color-border-secondary);border-radius:4px;background:transparent;color:var(--color-text-primary)}
.fw-stat{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:8px 12px}
.fw-stat-l{font-size:10px;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:.04em;margin-bottom:3px}
.fw-stat-v{font-size:20px;font-weight:500}
.fw-stat-s{font-size:11px;color:var(--color-text-secondary);margin-top:1px}
.refresh-btn{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;font-size:12px;font-weight:500;background:var(--color-background-secondary);border:.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);cursor:pointer;color:var(--color-text-primary);transition:opacity .2s}
.refresh-btn:hover{opacity:.75}.refresh-btn:disabled{opacity:.4;cursor:not-allowed}
.spin{display:inline-block;animation:spin .8s linear infinite}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.data-badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;padding:2px 8px;border-radius:20px;background:var(--color-background-secondary);color:var(--color-text-tertiary)}
.data-badge.live{background:var(--color-background-success);color:var(--color-text-success)}
.dot{width:6px;height:6px;border-radius:50%;background:currentColor;display:inline-block}
.api-note{font-size:11px;color:var(--color-text-tertiary);background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:8px 12px;margin-top:6px;line-height:1.5}
.api-note code{font-family:var(--font-mono);font-size:10px;background:var(--color-background-primary);padding:1px 4px;border-radius:3px;border:.5px solid var(--color-border-tertiary)}
/* Kalshi panels */
.k-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(340px,1fr));gap:12px;margin-bottom:12px}
.k-full{grid-column:1/-1}
.k-panel{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:14px 16px;overflow:hidden}
.k-hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px;gap:6px;flex-wrap:wrap}
.k-title{font-size:12px;font-weight:500;color:var(--color-text-primary)}
.k-contract{font-size:9px;font-family:var(--font-mono);color:var(--color-text-tertiary);background:var(--color-background-primary);padding:1px 5px;border-radius:3px;border:.5px solid var(--color-border-tertiary)}
.k-note{font-size:10px;color:var(--color-text-tertiary);margin-top:6px;line-height:1.5;padding-top:6px;border-top:.5px solid var(--color-border-tertiary)}
.k-legend{display:flex;gap:12px;font-size:10px;color:var(--color-text-secondary);margin-bottom:8px;align-items:center;flex-wrap:wrap}
.k-dot{width:10px;height:10px;border-radius:2px;display:inline-block;margin-right:3px;vertical-align:middle}
.k-pill{font-size:9px;padding:1px 6px;border-radius:10px;font-weight:500;white-space:nowrap}
.k-up{background:var(--color-background-info);color:var(--color-text-info)}
.k-dn{background:var(--color-background-danger);color:var(--color-text-danger)}
.k-neu{background:var(--color-background-secondary);color:var(--color-text-tertiary)}
.k-fetch-bar{display:flex;align-items:center;gap:8px;padding:10px 0;border-bottom:.5px solid var(--color-border-tertiary);margin-bottom:14px;flex-wrap:wrap}
.k-seed-note{font-size:11px;color:var(--color-text-tertiary);background:var(--color-background-secondary);border-radius:4px;padding:4px 10px;border:.5px solid var(--color-border-tertiary)}
/* Compare/overlay scenario — amber */
:root{--c-overlay:#f59e0b;--c-overlay-a:rgba(245,158,11,.13);}
@media(prefers-color-scheme:dark){:root{--c-overlay:#fbbf24;--c-overlay-a:rgba(251,191,36,.13);}}
/* -- Mobile responsive -------------------------------------------------- */
@media(max-width:640px){
  body{padding:.75rem .75rem 1.5rem}
  .fw-tab{font-size:11px;padding:4px 9px}
  .k-grid{grid-template-columns:1fr !important}
  #api-key-input{max-width:240px !important}
  .fw-stat-v{font-size:17px !important}
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState, useReducer, useEffect, useMemo, useCallback} = React;

function App() {
  return <div>Loading...</div>;
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
