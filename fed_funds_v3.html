function fwChain(months){
  const n=months.length,c=months.map(m=>({avg:+(100-m.price).toFixed(6),start:null,end:null}));
  for(let i=0;i<n;i++){if(!months[i].mtg){c[i].start=c[i].avg;c[i].end=c[i].avg;if(i>0&&months[i-1].mtg)c[i-1].end=c[i].avg;if(i<n-1&&months[i+1].mtg)c[i+1].start=c[i].avg;}}
  for(let r=0;r<n;r++){for(let i=n-1;i>=0;i--){const m=months[i];if(m.mtg&&c[i].end!==null&&c[i].start===null&&m.N>0)c[i].start=(c[i].avg-(m.M/(m.N+m.M))*c[i].end)/(m.N/(m.N+m.M));if(m.mtg&&c[i].start!==null&&i>0&&months[i-1].mtg&&c[i-1].end===null)c[i-1].end=c[i].start;}}
  for(let r=0;r<n;r++){for(let i=0;i<n;i++){const m=months[i];if(m.mtg&&c[i].start!==null&&c[i].end===null&&m.M>0)c[i].end=(c[i].avg-(m.N/(m.N+m.M))*c[i].start)/(m.M/(m.N+m.M));if(m.mtg&&c[i].end!==null&&i<n-1&&months[i+1].mtg&&c[i+1].start===null)c[i+1].start=c[i].end;}}
  return c;
}

function fwMeetings(months,chain){
  const res=[];
  months.forEach((m,i)=>{
    if(!m.mtg||chain[i].start===null||chain[i].end===null)return;
    const chg=chain[i].end-chain[i].start,moves=chg/0.25,abs=Math.abs(moves),char=Math.floor(abs),mant=abs-char;
    const isCut=chg<-0.0001,isHike=chg>0.0001,p0=1-mant,p1=mant;
    const b0=isCut?-char:isHike?char:0,b1=isCut?-(char+1):isHike?(char+1):0;
    const l0=b0===0?'hold':(b0>0?`+${b0*25}bp`:`${b0*25}bp`);
    const l1=b1===0?'hold':(b1>0?`+${b1*25}bp`:`${b1*25}bp`);
    res.push({lb:m.lb,label:m.ml||m.lb,start:chain[i].start,end:chain[i].end,chg,moves,p0,p1,b0,b1,l0,l1,isCut,isHike});
  });
  return res;
}

function fwDist(meetings){
  let d={'0':1.0};const states=[{'0':1.0}];
  meetings.forEach(m=>{
    const nd={};
    for(const[k,p]of Object.entries(d)){const ki=parseInt(k);nd[ki+m.b0]=(nd[ki+m.b0]||0)+p*m.p0;if(m.p1>0.0005)nd[ki+m.b1]=(nd[ki+m.b1]||0)+p*m.p1;}
    d=nd;states.push({...d});
  });
  return{states,final:d};
}

function cmeCutCountDist(final,fwD){
  const chain2=fwChain(fwD);
  const m2026=fwMeetings(fwD.filter(d=>d.lb.includes('2026')&&d.mtg),chain2.filter((_,i)=>fwD[i].lb.includes('2026')));
  const {final:f26}=fwDist(m2026);
  const out={0:0,1:0,2:0,3:0,4:0};
  Object.entries(f26).forEach(([k,p])=>{const ki=Math.max(0,Math.min(4,-parseInt(k)));out[ki]=(out[ki]||0)+p;});
  return out;
}

function getMeetingComps(meetings,kalshiD,polyD){
  const comps=[];
  meetings.forEach(m=>{
    const cmeCut=(m.b0<0?m.p0:0)+(m.b1<0&&m.p1>0.001?m.p1:0);
    const kd=kalshiD.meetings[m.lb];
    const pd=polyD.meetings[m.lb];
    const kCut=kd?(kd.cut25||0)+(kd.cut50||0):null;
    const pCut=pd?(pd.cut25||0)+(pd.cut50||0):null;
    comps.push({lb:m.lb,label:m.label,cmeCut,kCut,pCut,
      basisKC:kCut!==null?kCut-cmeCut:null,
      basisPK:pCut!==null&&kCut!==null?pCut-kCut:null});
  });
  return comps;
}

function getCmeHikeProb(meetings){
  return meetings.reduce((mx,m)=>{
    const ph=(m.b0>0?m.p0:0)+(m.b1>0&&m.p1>0.001?m.p1:0);
    return Math.max(mx,ph);
  },0);
}

function enumeratePaths(meetings,depth){
  const paths=[];
  const mSlice=meetings.slice(0,depth);
  function dfs(idx,seq,prob){
    if(idx===mSlice.length){paths.push({key:seq.join('\u2192'),prob});return;}
    const m=mSlice[idx];
    dfs(idx+1,[...seq,m.l0],prob*m.p0);
    if(m.p1>0.005)dfs(idx+1,[...seq,m.l1],prob*m.p1);
  }
  dfs(0,[],1);
  return paths.sort((a,b)=>b.prob-a.prob).slice(0,8);
}

function zqQuarterlyAvg(fwD,srD){
  return srD.map(s=>{
    if(!s.zqMonths.length)return null;
    const vals=s.zqMonths.map(lb2=>{const row=fwD.find(d=>d.lb===lb2);return row?100-row.price:null;}).filter(v=>v!==null);
    return vals.length?vals.reduce((a,b)=>a+b,0)/vals.length:null;
  });
}

function srInstFwd(srD){
  const rates=srD.map(s=>100-s.price);
  return rates.map((r,i)=>i===0?null:2*rates[i]-rates[i-1]);
}

function ycSyncShortEnd(fwD,ycD){
  const result=ycD.map(d=>({...d}));
  const chain=fwChain(fwD);
  let se=3.64;
  for(let i=0;i<fwD.length;i++){if(fwD[i].mtg&&chain[i].start!==null){se=chain[i].start;break;}}
  result[0].rate=parseFloat((se).toFixed(4));
  const avg6=fwD.slice(0,6).reduce((s,d)=>s+(100-d.price),0)/6;
  const avg12=fwD.reduce((s,d)=>s+(100-d.price),0)/fwD.length;
  result[1].rate=parseFloat(avg6.toFixed(4));
  result[2].rate=parseFloat(avg12.toFixed(4));
  return result;
}

function getCompareSeries(fwCompareScenario,fwD,fwLb){
  if(!fwCompareScenario||!SCENARIOS[fwCompareScenario])return null;
  const sc=SCENARIOS[fwCompareScenario];
  const cD=fwD.map((m,i)=>({...m,price:sc.prices[i]}));
  const cChain=fwChain(cD),cMeetings=fwMeetings(cD,cChain);
  const{states:cStates,final:cFinal}=fwDist(cMeetings);
  return{label:sc.shortLabel,totalBp:sc.totalBp,endRate:sc.endRate,era:sc.era,
    color:'var(--c-overlay)',colorA:'var(--c-overlay-a)',
    chain:cChain,meetings:cMeetings,states:cStates,final:cFinal};
}

// ============================================================================
// TAYLOR RULE PURE FUNCTIONS
// ============================================================================

function taylorRate(pi, piStar, y, yStar, rStar, alpha, beta) {
  // r = rStar + piStar + alpha*(pi - piStar) + beta*(y - yStar)
  // Equivalently: r = rStar + pi + (alpha-1)*(pi - piStar) + beta*(y - yStar)
  return rStar + piStar + alpha * (pi - piStar) + beta * (y - yStar);
}

function taylorInertial(prescribed, prevRate, rho) {
  // Clarida-Gali-Gertler: r_t = rho * r_{t-1} + (1 - rho) * r_taylor
  return rho * prevRate + (1 - rho) * prescribed;
}

function taylorMeetingPath(taylor, meetings, effrStart, lb) {
  const {piStar, piNow, piEnd, yStar, yNow, yEnd, rStar,
         alphaClassic, betaClassic, alphaBalanced, betaBalanced, inertia} = taylor;
  const n = meetings.length;
  const classic = [], balanced = [], inertialC = [], inertialB = [];
  let prevC = effrStart, prevB = effrStart;
  for (let i = 0; i < n; i++) {
    const t = n > 1 ? i / (n - 1) : 0;
    const pi = piNow + t * (piEnd - piNow);
    const y = yNow + t * (yEnd - yNow);
    const rc = taylorRate(pi, piStar, y, yStar, rStar, alphaClassic, betaClassic);
    const rb = taylorRate(pi, piStar, y, yStar, rStar, alphaBalanced, betaBalanced);
    classic.push(rc);
    balanced.push(rb);
    const ic = taylorInertial(rc, prevC, inertia);
    const ib = taylorInertial(rb, prevB, inertia);
    inertialC.push(ic);
    inertialB.push(ib);
    prevC = ic;
    prevB = ib;
  }
  return {classic, balanced, inertialC, inertialB};
}

function taylorRateJR(trD, prevFFR, prevGap) {
  // Judd-Rudebusch ECM --- Equations 23-25 from Bieri-Chincarini (2005).
  // Target rate from ECM specification (Eq. 23):
  //   i*_t = r* + pi* + lambda1*(pi_t - pi*) + lambda2*gap_t + lambda3*gap_{t-1}
  // where gap = outputGap (% potential GDP) or -2*(u - u*) depending on gapMeasure
  const pi       = trD.inflationRate      ?? 2.8;
  const piStar   = trD.inflationTarget    ?? 2.0;
  const rStar    = trD.naturalRate        ?? 0.5;
  const gap      = trD.gapMeasure === 'unemployment'
    ? -2 * ((trD.unemploymentRate ?? 4.1) - (trD.unemploymentNatural ?? 4.1))
    : (trD.outputGap ?? -0.5);
  const lambda1  = trD.jrLambda1 ?? 1.5;
  const lambda2  = trD.jrLambda2 ?? 0.5;
  const lambda3  = trD.jrLambda3 ?? 0.3;
  const gamma    = trD.jrGamma   ?? 0.85;

  const iStar = rStar + piStar + lambda1 * (pi - piStar) + lambda2 * gap + lambda3 * prevGap;

  // Partial adjustment toward i*_t (Eq. 24):
  //   delta_i_t = gamma*(i*_t - i_{t-1})
  //   i_t = i_{t-1} + gamma*(i*_t - i_{t-1})
  const prescribed = prevFFR + gamma * (iStar - prevFFR);
  return Math.max(0, prescribed);
}

function taylorRateYellen(trD) {
  // Yellen Alt1 --- Atlanta Fed alternative using unemployment gap and FOMC SEP r*.
  // Same form as Taylor 1993 but:
  //   gap = -2*(u - u*)  (Okun's Law approximation of output gap)
  //   r*  = FOMC SEP median longer-run real FFR (trD.naturalRate)
  //   inflation weight fixed at 1.5, gap weight fixed at 1.0 (balanced approach)
  const pi     = trD.inflationRate       ?? 2.8;
  const piStar = trD.inflationTarget     ?? 2.0;
  const rStar  = trD.naturalRate         ?? 0.5;
  const u      = trD.unemploymentRate    ?? 4.1;
  const uStar  = trD.unemploymentNatural ?? 4.1;
  const gap    = -2 * (u - uStar);
  return rStar + piStar + 1.5 * (pi - piStar) + 1.0 * gap;
}

// ============================================================================
// NELSON-SIEGEL YIELD CURVE PURE FUNCTIONS
// ============================================================================

// nsYield(mat, params) -> rate (%)
// Nelson-Siegel spot rate for maturity mat (in years):
//   y(m) = b0 + b1*[(1-exp(-m/tau))/(m/tau)] + b2*[(1-exp(-m/tau))/(m/tau) - exp(-m/tau)]
// params = {beta0, beta1, beta2, tau}
// Returns rate in percent (e.g. 4.31, not 0.0431)
function nsYield(mat, params) {
  const {beta0, beta1, beta2, tau} = params;
  if(mat <= 0) return beta0 + beta1;
  const x = mat / tau;
  const f1 = (1 - Math.exp(-x)) / x;
  const f2 = f1 - Math.exp(-x);
  return beta0 + beta1 * f1 + beta2 * f2;
}

// nsForward(mat, params) -> rate (%)
// Instantaneous forward rate:
//   f(m) = b0 + b1*exp(-m/tau) + b2*(m/tau)*exp(-m/tau)
function nsForward(mat, params) {
  const {beta0, beta1, beta2, tau} = params;
  if(mat <= 0) return beta0 + beta1;
  const x = mat / tau;
  return beta0 + beta1 * Math.exp(-x) + beta2 * x * Math.exp(-x);
}

// nsFit(points) -> {beta0, beta1, beta2, tau, rmse}
// Nelder-Mead minimization over 4 parameters.
// points = [{mat, rate}] -- the ycD array (7 maturity points)
// Constraints enforced by penalty: beta0 > 0, beta0+beta1 > 0, tau > 0.1
// Returns best params + RMSE in basis points
function nsFit(points) {
  const ssr = (p) => {
    const [b0, b1, b2, tau] = p;
    if(tau <= 0.05 || b0 <= 0) return 1e9;
    return points.reduce((s, pt) => {
      const fit = nsYield(pt.mat, {beta0:b0, beta1:b1, beta2:b2, tau});
      return s + (fit - pt.rate) ** 2;
    }, 0);
  };
  // Nelder-Mead
  let simplex = [
    [4, -0.5, 0.5, 2],
    [5, -1.5, 1.0, 1.5],
    [3.5, -0.3, 1.5, 3],
    [4.5, -1.0, 0.5, 1],
    [4, -0.8, 2.0, 2.5],
  ].map(p => ({p, v: ssr(p)}));
  const N = 4;
  for(let iter = 0; iter < 2000; iter++) {
    simplex.sort((a, b) => a.v - b.v);
    if(simplex[0].v < 1e-10) break;
    const centroid = Array(N).fill(0).map((_, i) =>
      simplex.slice(0, N).reduce((s, pt) => s + pt.p[i], 0) / N);
    const worst = simplex[N];
    const reflected = centroid.map((c, i) => 2*c - worst.p[i]);
    const vr = ssr(reflected);
    if(vr < simplex[0].v) {
      const expanded = centroid.map((c, i) => 3*c - 2*worst.p[i]);
      simplex[N] = ssr(expanded) < vr ? {p:expanded, v:ssr(expanded)} : {p:reflected, v:vr};
    } else if(vr < simplex[N-1].v) {
      simplex[N] = {p:reflected, v:vr};
    } else {
      const contracted = centroid.map((c, i) => 0.5*(c + worst.p[i]));
      if(ssr(contracted) < worst.v) {
        simplex[N] = {p:contracted, v:ssr(contracted)};
      } else {
        const best = simplex[0].p;
        simplex = simplex.map(s => {
          const np = s.p.map((x, i) => 0.5*(x + best[i]));
          return {p:np, v:ssr(np)};
        });
      }
    }
  }
  simplex.sort((a, b) => a.v - b.v);
  const [b0, b1, b2, tau] = simplex[0].p;
  const rmse = Math.sqrt(simplex[0].v / points.length) * 100; // in bp
  return {beta0:b0, beta1:b1, beta2:b2, tau, rmse};
}

// nsShockCurve(ycD, cumulativeDeltaFFR) -> ycD-shaped array with shocked rates
// Applies Bieri-Chincarini empirical factor model to project yield curve
// impact of cumulative funds rate change (in bp):
//   dy_3mo  ~ +1.00 * dFFR/100  (short end moves 1:1)
//   dy_6mo  ~ +0.85 * dFFR/100
//   dy_1yr  ~ +0.70 * dFFR/100
//   dy_2yr  ~ +0.50 * dFFR/100
//   dy_5yr  ~ +0.30 * dFFR/100
//   dy_10yr ~ +0.10 * dFFR/100  (Exhibit 5: 100bp hike -> ~25bp flattening 10-2yr)
//   dy_30yr ~ +0.05 * dFFR/100
// cumulativeDeltaFFR is in basis points (negative = cuts)
function nsShockCurve(ycD, cumulativeDeltaFFR) {
  const loadings = [1.00, 0.85, 0.70, 0.50, 0.30, 0.10, 0.05];
  const deltaFrac = cumulativeDeltaFFR / 100;
  return ycD.map((pt, i) => ({
    ...pt,
    rate: pt.rate + loadings[i] * deltaFrac
  }));
}

function reducer(state, action){
  switch(action.type){
    case 'SET_TAB':
      return {...state, fwActive: action.tab};
    case 'SET_LB':
      return {...state, fwLb: action.lb};
    case 'SET_SCENARIO':{
      const sc=SCENARIOS[action.key];
      if(!sc) return state;
      return {...state, fwActiveScenario: action.key,
        fwD: state.fwD.map((r,i)=>({...r, price: sc.prices[i]}))};
    }
    case 'DEACTIVATE':
      return {...state, fwActiveScenario: '',
        fwD: state.fwD.map((r,i)=>({...r, price: FW_SEED_PRICES[i]}))};
    case 'SET_COMPARE':
      return {...state, fwCompareScenario: action.key};
    case 'CLEAR_COMPARE':
      return {...state, fwCompareScenario: ''};
    case 'UPDATE_ZQ_PRICE':
      return {...state, fwActiveScenario: '',
        fwD: state.fwD.map((r,i)=>i===action.i?{...r, price: action.value}:r)};
    case 'UPDATE_ZQ_MTG':
      return {...state, fwActiveScenario: '',
        fwD: state.fwD.map((r,i)=>i===action.i?{...r, mtg: action.value}:r)};
    case 'UPDATE_ZQ_N':
      return {...state, fwActiveScenario: '',
        fwD: state.fwD.map((r,i)=>i===action.i?{...r, N: action.value}:r)};
    case 'UPDATE_ZQ_M':
      return {...state, fwActiveScenario: '',
        fwD: state.fwD.map((r,i)=>i===action.i?{...r, M: action.value}:r)};
    case 'UPDATE_SR_PRICE':
      return {...state,
        srD: state.srD.map((r,i)=>i===action.i?{...r, price: action.value}:r)};
    case 'UPDATE_YC_RATE':
      return {...state,
        ycD: state.ycD.map((r,i)=>i===action.i?{...r, rate: action.value, src:'manual'}:r)};
    case 'APPLY_LIVE_ZQ':{
      const d=action.data;
      return {...state, fwActiveScenario: '',
        fwD: state.fwD.map(r=>{
          const nr={...r};
          if(d.prices&&d.prices[r.lb]!==undefined){const v=parseFloat(d.prices[r.lb]);if(v>90&&v<100)nr.price=v;}
          if(d.meetings&&d.meetings[r.lb]){const mt=d.meetings[r.lb];nr.mtg=!!mt.hasMeeting;if(mt.label)nr.ml=mt.label;if(mt.hasMeeting&&mt.N>0){nr.N=mt.N;nr.M=mt.M;}if(!mt.hasMeeting){nr.N=0;nr.M=0;}}
          return nr;
        })};
    }
    case 'APPLY_LIVE_KALSHI':
      return {...state, kalshiD: {...state.kalshiD, ...action.data, fetched:true}};
    case 'APPLY_LIVE_POLY':
      return {...state, polyD: {...state.polyD, ...action.data, fetched:true}};
    case 'APPLY_LIVE_SOFR':{
      const prices=action.prices;
      return {...state,
        srD: state.srD.map(r=>{
          if(prices[r.lb]!==undefined){const v=parseFloat(prices[r.lb]);if(v>90&&v<100)return{...r, price:v};}
          return r;
        })};
    }
    case 'APPLY_LIVE_YC':{
      const rates=action.rates;
      const keyMap={'3mo':0,'6mo':1,'1yr':2,'2yr':3,'5yr':4,'10yr':5,'30yr':6};
      const next=state.ycD.map(r=>({...r}));
      Object.entries(rates).forEach(([k,v])=>{
        const idx=keyMap[k];
        if(idx!==undefined&&v!==null&&v>0&&v<20){next[idx].rate=parseFloat(v.toFixed(4));next[idx].src='live';}
      });
      return {...state, ycD: next};
    }
    case 'LOAD_SETTINGS':{
      const s=action.settings;
      let next={...state};
      if(s.lb!==undefined&&s.lb>=0&&s.lb<=8) next.fwLb=parseFloat(s.lb);
      if(s.scenario&&SCENARIOS[s.scenario]){
        next.fwActiveScenario=s.scenario;
        next.fwD=next.fwD.map((r,i)=>({...r, price: SCENARIOS[s.scenario].prices[i]}));
      }
      if(s.compare&&SCENARIOS[s.compare]&&s.compare!==next.fwActiveScenario) next.fwCompareScenario=s.compare;
      return next;
    }
    case 'UPDATE_TAYLOR':
      return {...state, taylor: {...state.taylor, [action.key]: action.value}};
    case 'UPDATE_TR':
      return {...state, trD: {...state.trD, [action.key]: action.value}};
    case 'APPLY_LIVE_TAYLOR':
      return {...state, trD: {...state.trD, ...action.data, fetched:true, asOf:action.data.asOf, source:action.data.source}};
    default:
      return state;
  }
}

function useFinance(state) {
  return useMemo(() => {
    const syncedYcD = ycSyncShortEnd(state.fwD, state.ycD);
    const chain = fwChain(state.fwD);
    const meetings = fwMeetings(state.fwD, chain);
    const {states, final} = fwDist(meetings);
    const zqAvgs = zqQuarterlyAvg(state.fwD, state.srD);
    const instFwd = srInstFwd(state.srD);
    const compareSeries = getCompareSeries(state.fwCompareScenario, state.fwD, state.fwLb);
    let effrStart = 3.64;
    for(let i=0;i<state.fwD.length;i++){
      if(state.fwD[i].mtg && chain[i].start !== null){effrStart=chain[i].start; break;}
    }
    // Taylor rule prescriptions (all 4 variants)
    const t = state.trD ?? {};
    const prevGap = t.outputGap ?? -0.5;
    const gap = t.gapMeasure === 'unemployment'
      ? -2 * ((t.unemploymentRate ?? 4.1) - (t.unemploymentNatural ?? 4.1))
      : (t.outputGap ?? -0.5);
    const trRates = {
      taylor93:      (t.naturalRate??0.5) + (t.inflationTarget??2.0) + 1.5*((t.inflationRate??2.8)-(t.inflationTarget??2.0)) + 0.5*gap,
      balanced:      (t.naturalRate??0.5) + (t.inflationTarget??2.0) + 1.5*((t.inflationRate??2.8)-(t.inflationTarget??2.0)) + 1.0*gap,
      yellen:        taylorRateYellen(t),
      juddRudebusch: taylorRateJR(t, state.fwLb, prevGap),
    };
    // CGG inertial (backward-compatible with existing chart)
    trRates.cgg = state.fwLb + (1 - (t.rhoSmoothing ?? 0.85)) * (trRates.taylor93 - state.fwLb);

    // Taylor signal: JR is the primary signal (Bieri-Chincarini Exhibit 7)
    const jrPrescribed = trRates.juddRudebusch;
    const taylorSignalVal = Math.abs(jrPrescribed - effrStart) < 0.125 ? 0
      : jrPrescribed < effrStart ? -1 : 1;
    const taylorJRRate = jrPrescribed;

    // JR implied path: apply taylorRateJR meeting-by-meeting, carrying forward prevFFR
    const jrImpliedPath = (() => {
      let prev = state.fwLb;
      const pg = t.outputGap ?? -0.5;
      return meetings.map(row => {
        const rate = taylorRateJR(t, prev, pg);
        prev = rate;
        return rate;
      });
    })();

    return {chain, meetings, states, final, zqAvgs, instFwd, compareSeries, effrStart, syncedYcD, trRates, taylorSignalVal, taylorJRRate, jrImpliedPath};
  }, [state.fwD, state.srD, state.ycD, state.fwCompareScenario, state.fwLb, state.trD]);
}

function panel4Svg(meetings,states,lb,fwD,kalshiD,compareSeries){
  const W=680,H=120,mt=20,mb=24,ml=34,mr=10;
  const months=fwD.map(d=>d.lb);
  const cmeRates=[];
  let si=0;
  months.forEach((lb2,i)=>{
    if(fwD[i].mtg&&si<states.length-1){si++;}
    const s=states[Math.min(si,states.length-1)];
    const ek=Object.entries(s).reduce((sum,[k,p])=>sum+parseInt(k)*p,0);
    cmeRates.push(lb+ek*.25);
  });
  const kalRates=months.map(lb2=>kalshiD.kalshiRate[lb2]||null);
  const dots=kalshiD.fedDots.map(d=>({i:months.indexOf(d.lb),rate:d.rate})).filter(d=>d.i>=0);
  const allV=[...cmeRates,...kalRates.filter(v=>v!==null),...dots.map(d=>d.rate)];
  const cSeries4=compareSeries;
  let cmpRates4=null;
  if(cSeries4){
    let si2=0;const cr=[];
    months.forEach((_,i)=>{
      if(fwD[i].mtg&&si2<cSeries4.states.length-1){si2++;}
      const s=cSeries4.states[Math.min(si2,cSeries4.states.length-1)];
      const ek=Object.entries(s).reduce((sum,[k,p])=>sum+parseInt(k)*p,0);
      cr.push(lb+ek*.25);
    });
    cmpRates4=cr;
    allV.push(...cr);
  }
  const minR=Math.min(...allV)-0.1,maxR=Math.max(...allV)+0.1;
  const xs=i=>ml+(i/(months.length-1||1))*(W-ml-mr);
  const ys=v=>mt+H*(1-(v-minR)/(maxR-minR));
  let svg='<svg viewBox="0 0 '+W+' '+(H+mt+mb)+'" style="width:100%;display:block;overflow:visible">';

}

function dashUnifiedSvg(chain,meetings,states,lb,compareSeries,zqAvgs,fwD,kalshiD,srD){
  const W=760,H=150,mt=24,mb=28,ml=38,mr=12;
  const months=fwD.map(d=>d.lb);

  const cmeRates=months.map((_,i)=>{
    if(fwD[i].mtg&&si<states.length-1)si++;

    return lb+Object.entries(s).reduce((sum,[k,p])=>sum+parseInt(k)*p,0)*.25;
  });
  const kalRates=months.map(lb2=>kalshiD.kalshiRate[lb2]||null);
  const sofrPts=srD.map(s=>{const idx=months.indexOf(s.lb);return idx>=0?{i:idx,r:100-s.price}:null;}).filter(Boolean);
  let cmpRates=null;
  if(compareSeries){
    let si2=0;
    cmpRates=months.map((_,i)=>{
      if(fwD[i].mtg&&si2<compareSeries.states.length-1)si2++;

      return lb+Object.entries(s).reduce((sum,[k,p])=>sum+parseInt(k)*p,0)*.25;

  const fedDots=kalshiD.fedDots.map(d=>({i:months.indexOf(d.lb),rate:d.rate})).filter(d=>d.i>=0);
  const allV=[...cmeRates,...kalRates.filter(Boolean),...sofrPts.map(d=>d.r),...fedDots.map(d=>d.rate),...(cmpRates||[])];
  const minR=Math.min(...allV)-0.12,maxR=Math.max(...allV)+0.12;
  const xs=i=>ml+(i/(months.length-1||1))*(W-ml-mr);

    svg+='<text x="'+(ml-4).toFixed(1)+'" y="'+ys(y).toFixed(1)+'" text-anchor="end" dominant-baseline="middle" font-size="8" fill="var(--color-text-tertiary)" font-family="var(--font-mono)">'+y.toFixed(2)+'</text>';

  if(cmpRates){

  }
  if(sofrPts.length>1){
    for(let k=0;k<sofrPts.length-1;k++){const a=sofrPts[k],b=sofrPts[k+1];svg+='<line x1="'+xs(a.i).toFixed(1)+'" y1="'+ys(a.r).toFixed(1)+'" x2="'+xs(b.i).toFixed(1)+'" y2="'+ys(b.r).toFixed(1)+'" stroke="var(--c-sofr)" stroke-width="2.5" opacity=".85"/>';}
    sofrPts.forEach(d=>{svg+='<circle cx="'+xs(d.i).toFixed(1)+'" cy="'+ys(d.r).toFixed(1)+'" r="5" fill="var(--c-sofr)" opacity=".9"/>';svg+='<text x="'+xs(d.i).toFixed(1)+'" y="'+(ys(d.r)-9).toFixed(1)+'" text-anchor="middle" font-size="7.5" fill="var(--c-sofr)" font-family="var(--font-mono)">'+d.r.toFixed(2)+'</text>';});
  }
  const cPts=cmeRates.map((r,i)=>xs(i).toFixed(1)+','+ys(r).toFixed(1)).join(' ');
  svg+='<polyline points="'+cPts+'" fill="none" stroke="var(--c-cme)" stroke-width="2.5" opacity=".9"/>';
  cmeRates.forEach((r,i)=>{svg+='<circle cx="'+xs(i).toFixed(1)+'" cy="'+ys(r).toFixed(1)+'" r="3" fill="var(--c-cme)" opacity=".8"/>';});
  let kPrev=null;
  months.forEach((lb2,i)=>{
    const r=kalRates[i];if(r===null)return;
    if(kPrev)svg+='<line x1="'+xs(kPrev.i).toFixed(1)+'" y1="'+ys(kPrev.r).toFixed(1)+'" x2="'+xs(i).toFixed(1)+'" y2="'+ys(r).toFixed(1)+'" stroke="var(--c-kal)" stroke-width="1.5" stroke-dasharray="4,3" opacity=".75"/>';
    svg+='<circle cx="'+xs(i).toFixed(1)+'" cy="'+ys(r).toFixed(1)+'" r="4" fill="var(--c-kal)" opacity=".85"/>';
    kPrev={i:i,r:r};
  });
  fedDots.forEach(d=>{
    svg+='<circle cx="'+xs(d.i).toFixed(1)+'" cy="'+ys(d.rate).toFixed(1)+'" r="6" fill="var(--c-dots)" opacity=".85"/>';
    svg+='<text x="'+xs(d.i).toFixed(1)+'" y="'+(ys(d.rate)+14).toFixed(1)+'" text-anchor="middle" font-size="7.5" fill="var(--c-dots)" font-family="var(--font-sans)">SEP</text>';
  });
  months.forEach((lb2,i)=>{if(i%2===0||i===months.length-1)svg+='<text x="'+xs(i).toFixed(1)+'" y="'+(mt+H+16).toFixed(1)+'" text-anchor="middle" font-size="8" fill="var(--color-text-tertiary)" font-family="var(--font-sans)">'+lb2.replace(/ 20\d\d/,'')+'</text>';});
  svg+='</svg>';
  return svg;
}

function taylorChartSvg(meetings, states, lb, effrStart, taylorPaths, taylor, jrPath) {
  const W=720, H=180, mt=28, mb=32, ml=38, mr=14;
  const n=meetings.length;
  if(n===0) return '<div style="color:var(--color-text-tertiary);font-size:13px">No meetings detected.</div>';
  const xs=i=>ml+(i/(n-1||1))*(W-ml-mr);

  // CME expected rate path
  const cmeRates=[];
  let si=0;
  const allMonths=meetings.map(m=>m.lb);
  for(let i=0;i<n;i++){
    const s=states[i+1]||states[states.length-1];
    const ek=Object.entries(s).reduce((sum,[k,p])=>sum+parseInt(k)*p,0);
    cmeRates.push(lb+ek*.25);
  }

  const {classic, balanced, inertialC, inertialB}=taylorPaths;
  const jrV=jrPath||[];
  const allV=[effrStart,...cmeRates,...classic,...balanced,...inertialC,...inertialB,...jrV];
  const minR=Math.min(...allV)-0.15, maxR=Math.max(...allV)+0.15;
  const ys=v=>mt+H*(1-(v-minR)/(maxR-minR));

  let svg='<svg viewBox="0 0 '+W+' '+(H+mt+mb)+'" style="width:100%;display:block;overflow:visible">';

  // Grid
  const step=0.25;
  for(let y=Math.ceil(minR/step)*step;y<=maxR;y+=step){
    svg+='<line x1="'+ml+'" y1="'+ys(y).toFixed(1)+'" x2="'+(W-mr)+'" y2="'+ys(y).toFixed(1)+'" stroke="var(--color-border-tertiary)" stroke-width=".5"/>';
    svg+='<text x="'+(ml-4).toFixed(1)+'" y="'+ys(y).toFixed(1)+'" text-anchor="end" dominant-baseline="middle" font-size="8" fill="var(--color-text-tertiary)" font-family="var(--font-mono)">'+y.toFixed(2)+'%</text>';
  }

  // Neutral rate band
  const rNeutral=taylor.rStar+taylor.piStar;
  if(rNeutral>=minR&&rNeutral<=maxR){
    svg+='<line x1="'+ml+'" y1="'+ys(rNeutral).toFixed(1)+'" x2="'+(W-mr)+'" y2="'+ys(rNeutral).toFixed(1)+'" stroke="var(--color-text-tertiary)" stroke-width="1" stroke-dasharray="8,4" opacity=".5"/>';
    svg+='<text x="'+(W-mr-2).toFixed(1)+'" y="'+(ys(rNeutral)-5).toFixed(1)+'" text-anchor="end" font-size="7.5" fill="var(--color-text-tertiary)" font-family="var(--font-sans)">r* neutral '+rNeutral.toFixed(2)+'%</text>';
  }

  // Classic Taylor (thinner rose — JR takes the heavy line)
  const cPts=classic.map((r,i)=>xs(i).toFixed(1)+','+ys(r).toFixed(1)).join(' ');
  svg+='<polyline points="'+cPts+'" fill="none" stroke="var(--c-taylor)" stroke-width="1.5" stroke-dasharray="10,4" opacity=".65"/>';
  classic.forEach((r,i)=>{svg+='<circle cx="'+xs(i).toFixed(1)+'" cy="'+ys(r).toFixed(1)+'" r="2.5" fill="var(--c-taylor)" opacity=".65"/>';});

  // Balanced approach (dashed rose lighter)
  const bPts=balanced.map((r,i)=>xs(i).toFixed(1)+','+ys(r).toFixed(1)).join(' ');
  svg+='<polyline points="'+bPts+'" fill="none" stroke="var(--c-taylor-mod)" stroke-width="2" stroke-dasharray="7,4" opacity=".85"/>';
  balanced.forEach((r,i)=>{svg+='<circle cx="'+xs(i).toFixed(1)+'" cy="'+ys(r).toFixed(1)+'" r="3" fill="var(--c-taylor-mod)" opacity=".8"/>';});

  // Inertial classic (thin dotted)
  const icPts=inertialC.map((r,i)=>xs(i).toFixed(1)+','+ys(r).toFixed(1)).join(' ');
  svg+='<polyline points="'+icPts+'" fill="none" stroke="var(--c-taylor)" stroke-width="1.5" stroke-dasharray="3,3" opacity=".6"/>';

  // Judd-Rudebusch path (rose solid, heavy — signal source)
  if(jrV.length){
    const jrPts=jrV.map((r,i)=>xs(i).toFixed(1)+','+ys(r).toFixed(1)).join(' ');
    svg+='<polyline points="'+jrPts+'" fill="none" stroke="var(--c-taylor)" stroke-width="2.5" opacity=".95"/>';
    jrV.forEach((r,i)=>{svg+='<circle cx="'+xs(i).toFixed(1)+'" cy="'+ys(r).toFixed(1)+'" r="4" fill="var(--c-taylor)" stroke="var(--color-background-primary)" stroke-width="1" opacity=".95"/>';});
  }

  // CME implied path (blue)
  const cmePts=cmeRates.map((r,i)=>xs(i).toFixed(1)+','+ys(r).toFixed(1)).join(' ');
  svg+='<polyline points="'+cmePts+'" fill="none" stroke="var(--c-cme)" stroke-width="2.5" opacity=".85"/>';
  cmeRates.forEach((r,i)=>{svg+='<circle cx="'+xs(i).toFixed(1)+'" cy="'+ys(r).toFixed(1)+'" r="3.5" fill="var(--c-cme)" opacity=".85"/>';});

  // Current EFFR marker
  svg+='<circle cx="'+ml+'" cy="'+ys(effrStart).toFixed(1)+'" r="5" fill="var(--color-text-primary)" opacity=".6"/>';
  svg+='<text x="'+(ml+8).toFixed(1)+'" y="'+(ys(effrStart)-6).toFixed(1)+'" font-size="8" fill="var(--color-text-secondary)" font-family="var(--font-mono)">EFFR '+effrStart.toFixed(2)+'%</text>';

  // X-axis labels
  meetings.forEach((m,i)=>{
    const shortLbl=m.label.replace(/\d{4}/,'').trim()||m.lb.replace(/ 20\d\d/,'');
    if(i%2===0||i===n-1) svg+='<text x="'+xs(i).toFixed(1)+'" y="'+(mt+H+16).toFixed(1)+'" text-anchor="middle" font-size="8" fill="var(--color-text-tertiary)" font-family="var(--font-sans)">'+shortLbl+'</text>';
  });

  // Legend
  svg+='<text x="'+ml+'" y="14" font-size="8.5" fill="var(--c-taylor)" font-family="var(--font-sans)" font-weight="600">\u25cf JR ECM (signal)</text>';
  svg+='<text x="'+(ml+115)+'" y="14" font-size="8" fill="var(--c-taylor)" font-family="var(--font-sans)" opacity=".65">- - Classic</text>';
  svg+='<text x="'+(ml+175)+'" y="14" font-size="8" fill="var(--c-taylor-mod)" font-family="var(--font-sans)">- - Balanced</text>';
  svg+='<text x="'+(ml+255)+'" y="14" font-size="8" fill="var(--c-taylor)" font-family="var(--font-sans)" opacity=".5">... CGG</text>';
  svg+='<text x="'+(ml+305)+'" y="14" font-size="8.5" fill="var(--c-cme)" font-family="var(--font-sans)" font-weight="500">\u25cf CME implied</text>';

  svg+='</svg>';
  return svg;
}

function taylorGapSvg(meetings, cmeRates, classic, balanced) {
  const W=720, H=80, mt=20, mb=28, ml=38, mr=14;
  const n=meetings.length;
  if(n===0) return '';
  const xs=i=>ml+(i/(n-1||1))*(W-ml-mr);
  const gapsC=classic.map((r,i)=>r-cmeRates[i]);
  const gapsB=balanced.map((r,i)=>r-cmeRates[i]);
  const maxG=Math.max(...gapsC.map(Math.abs),...gapsB.map(Math.abs),0.15);
  const yMid=mt+H/2;
  const ys=v=>yMid-(v/maxG)*(H/2);

  let svg='<svg viewBox="0 0 '+W+' '+(H+mt+mb)+'" style="width:100%;display:block;overflow:visible">';
  svg+='<line x1="'+ml+'" y1="'+yMid.toFixed(1)+'" x2="'+(W-mr)+'" y2="'+yMid.toFixed(1)+'" stroke="var(--color-border-secondary)" stroke-width="1"/>';
  svg+='<text x="'+(ml-4).toFixed(1)+'" y="'+yMid.toFixed(1)+'" text-anchor="end" dominant-baseline="middle" font-size="7.5" fill="var(--color-text-tertiary)" font-family="var(--font-mono)">0</text>';
  [maxG/2, maxG].forEach(v=>{
    [v,-v].forEach(g=>{
      svg+='<line x1="'+ml+'" y1="'+ys(g).toFixed(1)+'" x2="'+(W-mr)+'" y2="'+ys(g).toFixed(1)+'" stroke="var(--color-border-tertiary)" stroke-width=".5"/>';
    });
    svg+='<text x="'+(ml-4).toFixed(1)+'" y="'+ys(v).toFixed(1)+'" text-anchor="end" dominant-baseline="middle" font-size="7.5" fill="var(--color-text-tertiary)" font-family="var(--font-mono)">'+(v>0?'+':'')+v.toFixed(2)+'</text>';
    svg+='<text x="'+(ml-4).toFixed(1)+'" y="'+ys(-v).toFixed(1)+'" text-anchor="end" dominant-baseline="middle" font-size="7.5" fill="var(--color-text-tertiary)" font-family="var(--font-mono)">'+(-v).toFixed(2)+'</text>';
  });

  // Classic gap area fill
  let areaAbove='M '+xs(0).toFixed(1)+' '+yMid.toFixed(1);
  let areaBelow='M '+xs(0).toFixed(1)+' '+yMid.toFixed(1);
  gapsC.forEach((g,i)=>{
    const x=xs(i), y=ys(g);
    if(g>=0) areaAbove+=' L '+x.toFixed(1)+' '+y.toFixed(1);
    else areaBelow+=' L '+x.toFixed(1)+' '+y.toFixed(1);
  });

  // Classic gap line
  const cPts=gapsC.map((g,i)=>xs(i).toFixed(1)+','+ys(g).toFixed(1)).join(' ');
  svg+='<polyline points="'+cPts+'" fill="none" stroke="var(--c-taylor)" stroke-width="2" opacity=".85"/>';
  gapsC.forEach((g,i)=>{
    const col=g>0.05?'var(--color-text-danger)':g<-0.05?'var(--color-text-info)':'var(--color-text-tertiary)';
    svg+='<circle cx="'+xs(i).toFixed(1)+'" cy="'+ys(g).toFixed(1)+'" r="3" fill="'+col+'" opacity=".8"/>';
    if(i%2===0||i===n-1) svg+='<text x="'+xs(i).toFixed(1)+'" y="'+(ys(g)+(g>=0?-7:11)).toFixed(1)+'" text-anchor="middle" font-size="7.5" fill="'+col+'" font-family="var(--font-mono)">'+(g>0?'+':'')+g.toFixed(2)+'</text>';
  });

  // Balanced gap line
  const bPts=gapsB.map((g,i)=>xs(i).toFixed(1)+','+ys(g).toFixed(1)).join(' ');
  svg+='<polyline points="'+bPts+'" fill="none" stroke="var(--c-taylor-mod)" stroke-width="1.5" stroke-dasharray="6,3" opacity=".7"/>';

  // X labels
  meetings.forEach((m,i)=>{
    const shortLbl=m.label.replace(/\d{4}/,'').trim()||m.lb.replace(/ 20\d\d/,'');
    if(i%2===0||i===n-1) svg+='<text x="'+xs(i).toFixed(1)+'" y="'+(mt+H+16).toFixed(1)+'" text-anchor="middle" font-size="8" fill="var(--color-text-tertiary)" font-family="var(--font-sans)">'+shortLbl+'</text>';
  });

  svg+='<text x="'+ml+'" y="12" font-size="8" fill="var(--color-text-secondary)" font-family="var(--font-sans)">Taylor minus CME (pp) --- positive = Taylor says tighter</text>';
  svg+='</svg>';
  return svg;
}

function TreeTab({state, finance}) {
  const {meetings, states, final, compareSeries} = finance;
  const lb = state.fwLb;
  if(!meetings.length) return <div style={{color:'var(--color-text-tertiary)',fontSize:'13px'}}>No meetings detected.</div>;
  const cuts=Object.entries(final).map(([k,p])=>({k:parseInt(k),p:p})).sort((a,b)=>a.k-b.k);
  const cSeries=compareSeries;
  const allRateKeys=[...new Set([...cuts.map(d=>d.k),...(cSeries?Object.keys(cSeries.final).map(Number):[])])].sort((a,b)=>a-b);
  const pC1=cuts.filter(d=>d.k<=-1).reduce((s,d)=>s+d.p,0),pC2=cuts.filter(d=>d.k<=-2).reduce((s,d)=>s+d.p,0),pC3=cuts.filter(d=>d.k<=-3).reduce((s,d)=>s+d.p,0);
  const expC=cuts.reduce((s,d)=>s+(-d.k)*d.p,0),expR=lb-expC*0.25;
  let cards='<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:8px;margin-bottom:1rem">';
  cards+='<div class="fw-stat"><div class="fw-stat-l">P(\u22651 cut)</div><div class="fw-stat-v" style="color:var(--color-text-info)">'+(pC1*100).toFixed(1)+'%</div></div>';
  cards+='<div class="fw-stat"><div class="fw-stat-l">P(\u22652 cuts)</div><div class="fw-stat-v" style="color:var(--color-text-info)">'+(pC2*100).toFixed(1)+'%</div></div>';
  cards+='<div class="fw-stat"><div class="fw-stat-l">P(\u22653 cuts)</div><div class="fw-stat-v" style="color:var(--color-text-info)">'+(pC3*100).toFixed(1)+'%</div></div>';
  cards+='<div class="fw-stat"><div class="fw-stat-l">Expected cuts</div><div class="fw-stat-v">'+expC.toFixed(2)+'</div><div class="fw-stat-s">of 25bp each</div></div>';
  cards+='<div class="fw-stat"><div class="fw-stat-l">Implied rate</div><div class="fw-stat-v">'+expR.toFixed(2)+'%</div><div class="fw-stat-s">exp. lower bound</div></div>';
  cards+='</div>';
  const W=760,NR=18,nCols=states.length,colW=(W-50)/(nCols-1||1);
  const allK=[];states.forEach(s=>Object.keys(s).forEach(k=>{const ki=parseInt(k);if(!allK.includes(ki))allK.push(ki);}));allK.sort((a,b)=>a-b);
  const minK=allK[0],maxK=allK[allK.length-1],nRows=maxK-minK+1,rowH=Math.max(36,Math.min(56,280/Math.max(nRows,1))),svgH=nRows*rowH+60;
  const gx=li=>30+li*colW,gyf=k=>30+(-k)*rowH+rowH/2;
  let svg='';
  for(let li=0;li<states.length-1;li++){
    const m=meetings[li],x1=gx(li)+NR,x2=gx(li+1)-NR;
    Object.entries(states[li]).forEach(([k,p])=>{
      if(p<0.005)return;const ki=parseInt(k),y1=gyf(ki),k0=ki+m.b0,y0=gyf(k0);
      svg+='<line x1="'+x1.toFixed(1)+'" y1="'+y1.toFixed(1)+'" x2="'+x2.toFixed(1)+'" y2="'+y0.toFixed(1)+'" stroke="var(--color-border-secondary)" stroke-width="'+Math.max(.6,p*m.p0*6).toFixed(1)+'" opacity=".85"/>';
      if(m.p1>0.005){const k1=ki+m.b1,y1b=gyf(k1);svg+='<line x1="'+x1.toFixed(1)+'" y1="'+y1.toFixed(1)+'" x2="'+x2.toFixed(1)+'" y2="'+y1b.toFixed(1)+'" stroke="var(--color-border-info)" stroke-width="'+Math.max(.4,p*m.p1*6).toFixed(1)+'" stroke-dasharray="4,2" opacity=".75"/>';}
    });
  }
  states.forEach((st,li)=>{
    const x=gx(li),lbl=li===0?'Now':meetings[li-1]&&meetings[li-1].label?meetings[li-1].label.split('\u2013')[0]:'';
    svg+='<text x="'+x.toFixed(1)+'" y="13" text-anchor="middle" font-size="8" fill="var(--color-text-tertiary)" font-family="var(--font-sans)">'+lbl+'</text>';
    Object.entries(st).forEach(([k,p])=>{
      if(p<0.005)return;const ki=parseInt(k),y=gyf(ki),rate=(lb+ki*.25).toFixed(2),fo=Math.min(.92,.12+p*.85);
      svg+='<circle cx="'+x.toFixed(1)+'" cy="'+y.toFixed(1)+'" r="'+NR+'" fill="var(--color-background-info)" fill-opacity="'+fo.toFixed(2)+'" stroke="var(--color-border-info)" stroke-width=".8"/>';
      svg+='<text x="'+x.toFixed(1)+'" y="'+(y-4).toFixed(1)+'" text-anchor="middle" dominant-baseline="middle" font-size="8.5" font-weight="500" fill="var(--color-text-primary)" font-family="var(--font-mono)">'+(p*100).toFixed(0)+'%</text>';
      svg+='<text x="'+x.toFixed(1)+'" y="'+(y+6).toFixed(1)+'" text-anchor="middle" dominant-baseline="middle" font-size="7.5" fill="var(--color-text-secondary)" font-family="var(--font-mono)">'+rate+'%</text>';
    });
  });
  for(let k=0;k>=minK;k--){const y=gyf(k);svg+='<text x="0" y="'+y.toFixed(1)+'" dominant-baseline="middle" font-size="7.5" fill="var(--color-text-tertiary)" font-family="var(--font-mono)">'+(lb+k*.25).toFixed(2)+'%</text>';}
  const maxP=Math.max(...cuts.map(d=>d.p),...(cSeries?Object.values(cSeries.final):[0]));
  const bW=Math.min(60,520/Math.max(allRateKeys.length,1));
  let dSvg='';
  if(cSeries){
    const cCutsMap=Object.fromEntries(Object.entries(cSeries.final).map(([k,p])=>[parseInt(k),p]));
    allRateKeys.slice().reverse().forEach((k,i)=>{
      const p=cCutsMap[k];if(!p||p<0.002)return;

      dSvg+='<rect x="'+(x-2).toFixed(1)+'" y="'+y.toFixed(1)+'" width="'+(bW+4).toFixed(1)+'" height="'+Math.max(1,h).toFixed(1)+'" rx="2" fill="var(--c-overlay-a)" stroke="var(--c-overlay)" stroke-width="1.5"/>';
      if(p>.03)dSvg+='<text x="'+(x+bW/2).toFixed(1)+'" y="'+(y-4).toFixed(1)+'" text-anchor="middle" font-size="7.5" fill="var(--c-overlay)" font-family="var(--font-sans)">'+(p*100).toFixed(1)+'%</text>';
    });
  }
  const cutsMap=Object.fromEntries(cuts.map(d=>[d.k,d.p]));
  allRateKeys.slice().reverse().forEach((k,i)=>{
    const p=cutsMap[k];if(!p||p<0.002)return;
    const x=20+i*(bW+5),h=Math.max(2,(p/maxP)*52),y=60-h,fo=.2+p*.75;
    dSvg+='<rect x="'+x+'" y="'+y+'" width="'+bW+'" height="'+Math.max(1,h).toFixed(1)+'" rx="2" fill="var(--color-background-info)" fill-opacity="'+fo.toFixed(2)+'" stroke="var(--color-border-info)" stroke-width=".5"/>';
    if(p>.02)dSvg+='<text x="'+(x+bW/2)+'" y="'+(y-3)+'" text-anchor="middle" font-size="8.5" fill="var(--color-text-secondary)" font-family="var(--font-sans)">'+(p*100).toFixed(1)+'%</text>';
    dSvg+='<text x="'+(x+bW/2)+'" y="73" text-anchor="middle" font-size="7.5" fill="var(--color-text-tertiary)" font-family="var(--font-mono)">'+(lb+k*.25).toFixed(2)+'%</text>';
  });
  const mainLabel=state.fwActiveScenario&&SCENARIOS[state.fwActiveScenario]?SCENARIOS[state.fwActiveScenario].shortLabel:'Baseline';
  const cmpLabel=cSeries?' vs <span style="color:var(--c-overlay)">'+cSeries.label+' ('+cSeries.totalBp+')</span>':'';

    +'<div style="overflow-x:auto"><svg viewBox="0 0 '+W+' '+svgH+'" style="min-width:500px;width:100%;display:block;height:'+svgH+'px">'+svg+'</svg></div>'
    +'<div style="margin-top:1.25rem">'
    +'<div style="font-size:10px;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px">Final rate distribution \u2014 <span style="color:var(--c-cme)">'+mainLabel+'</span>'+cmpLabel+'</div>'
    +'<div style="overflow-x:auto"><svg viewBox="0 0 '+Math.max(560,20+allRateKeys.length*(bW+5)+20)+' 80" style="min-width:400px;width:100%;display:block;height:80px">'+dSvg+'</svg></div>'
    +'</div>'
    +'<div style="display:flex;gap:1.5rem;margin-top:.75rem;font-size:11px;color:var(--color-text-tertiary);flex-wrap:wrap">'
    +'<span>Opacity \u221d probability</span><span>Solid = hold/base \u00b7 Dashed = extra 25bp cut</span><span>Width \u221d weight</span>'
    +(cSeries?'<span style="color:var(--c-overlay)">\u25a0 Amber = compare scenario</span>':'')
    +'</div>';
  return <SvgPanel html={h}/>;

  // Panel 3: Combo paths

  html+='<div class="k-panel"><div class="k-hdr"><span class="k-title">\u2462 Combo path decomposer \u2014 top paths (first 3 meetings)</span><span class="k-contract">kxfedcombo-26xxx</span></div>';
  html+='<div style="overflow-x:auto"><table class="fwt"><thead><tr><th>Path</th><th>CME prob</th><th>Kalshi</th><th>Basis</th></tr></thead><tbody>';

    html+='<tr><td style="font-family:var(--font-mono);font-size:11px">'+p.key+'</td>';
    html+='<td style="font-family:var(--font-mono)">'+(p.prob*100).toFixed(1)+'%</td>';
    html+='<td style="font-family:var(--font-mono);color:var(--color-text-tertiary)">'+(kp==='\u2014'?kp:Math.round(kp*100)+'%')+'</td>';
    html+='<td><span class="k-pill '+bClass+'">'+basis+'</span></td></tr>';
  });
  html+='</tbody></table></div>';
  html+='<div class="k-note">CME tree path probabilities for the first three meeting months. Large positive basis = Kalshi prices this path more richly than CME.</div></div></div>';

  // Panel 4: Dot plot
  html+='<div class="k-grid" style="margin-bottom:12px"><div class="k-panel k-full">';
  html+='<div class="k-hdr"><span class="k-title">\u2463 Market-implied dot plot \u2014 CME chain vs Kalshi rate expectations vs Fed SEP</span><span class="k-contract">kxfed-26xxx \u00b7 Dec 2025 SEP</span></div>';
  html+=panel4Svg(meetings,states,lb,fwD,kD,compareSeries);
  html+='<div class="k-note">Three implied rate paths. CME (blue): expected EFFR from ZQ chain. Kalshi (orange): implied rate from decision markets. Fed dots (purple): Dec 2025 SEP medians.</div>';

  // Panels 5 + 6
  html+='<div class="k-grid">';

  html+=panel5Svg(cmeHike,kD.hikeAny,kD.largeCutAny,pD.hikeAny);

  // Panel 6
  html+='<div class="k-panel"><div class="k-hdr"><span class="k-title">\u2465 First cut timing \u2014 cumulative P(cut has happened)</span>';
  html+='<span style="display:flex;gap:4px"><span class="k-contract">kxratecut-26dec31</span><span class="k-contract">polymarket fed-rate-cut-by</span></span></div>';
  html+=panel6Svg(meetings,states,lb,kD,pD);
  html+='<div class="k-note">CME step curve (blue): cumulative P(\u22651 cut) by meeting. Kalshi binary markers (orange \u25cf): cut-by-end-2026 = <b>'+(kD.cutBinary['end-2026']*100).toFixed(0)+'%</b>, cut-by-end-2027 = <b>'+(kD.cutBinary['end-2027']*100).toFixed(0)+'%</b>. Polymarket per-meeting markers (cyan \u25c6).</div></div></div>';

  // Panel 7
  html+='<div class="k-grid" style="margin-bottom:12px"><div class="k-panel k-full">';
  html+='<div class="k-hdr"><span class="k-title">\u2466 Terminal rate distribution end-2026 \u2014 CME tree vs Polymarket</span>';
  html+='<span class="k-contract">polymarket what-will-the-fed-rate-be-at-the-end-of-2026</span></div>';
  html+=panel7Svg(final,lb,pD);
  const cmeTerm=Object.entries(final).reduce((s,[k,p])=>s+(lb+parseInt(k)*.25)*p,0);
  const polyTermExp=Object.entries(pD.terminalRate).reduce((s,[r,p])=>s+parseFloat(r)*p,0);
  html+='<div class="k-note">CME expected terminal rate: <b>'+cmeTerm.toFixed(2)+'%</b> \u00b7 Polymarket expected: <b>'+polyTermExp.toFixed(2)+'%</b>. Polymarket resolves on upper bound \u2014 subtract 0.25% when comparing to CME lower-bound figures.</div></div></div>';

  // Panels 8a + 8b
  html+='<div class="k-grid">';
  html+='<div class="k-panel"><div class="k-hdr"><span class="k-title">\u2467 Fed Chair nomination \u2014 regime risk</span>';
  html+='<span class="k-contract">polymarket who-will-trump-nominate-as-fed-chair \u00b7 $230M vol</span></div>';
  html+=panel8aHtml(pD);
  html+='<div class="k-note">Polymarket\'s most liquid Fed markets ($230M volume). The nominee probabilities are a proxy for <i>policy regime risk</i>.</div></div>';

  html+='<div class="k-panel"><div class="k-hdr"><span class="k-title">\u2468 Emergency cut gauge \u2014 unscheduled FOMC action</span>';
  html+='<span class="k-contract">polymarket fed-emergency-rate-cut-before-2027</span></div>';
  html+=panel8bSvg(pD.emergencyCut,pD.hikeAny);
  html+='<div class="k-note">Polymarket-unique contract: P(FOMC holds an unscheduled emergency meeting and cuts before end-2026). Historical context: Jan 2001, Sep 2001, Oct 2008, Mar 2020.</div></div></div>';

  // Wire fetch buttons via window globals (inline onclick in generated HTML)
  useEffect(()=>{
    window.__kalFetch=()=>fetchKalshi(state,dispatch,apiKey,setFetching,setRefreshStatus);
    window.__polyFetch=()=>fetchPolymarket(state,dispatch,apiKey,setFetching,setRefreshStatus);

}

function buildRuleComparisonTable(trRates, effrStart, fwLb) {
  const rules = [
    {key:'taylor93',      label:'Taylor 1993',        note:'Original \u2014 r*=2%, \u03b2=0.5, GDP gap'},
    {key:'yellen',        label:'Yellen Alt1',         note:'Unemployment gap, FOMC SEP r*, \u03b2=1.0'},
    {key:'balanced',      label:'Balanced approach',   note:'\u03b2=1.0 (Yellen 2012/2017 speeches)'},
    {key:'cgg',           label:'CGG Inertial',        note:'\u03c1=0.85 smoothing around Taylor 1993'},
    {key:'juddRudebusch', label:'Judd-Rudebusch ECM',  note:'Dynamic ECM \u2014 highest R\u00b2 for \u0394FFTR prediction'},
  ];
  const threshold = 0.125;
  var h = '<table class="fwt"><thead><tr><th>Rule</th><th>Prescribed</th><th>Gap vs EFFR (bp)</th><th>Signal</th><th>Notes</th></tr></thead><tbody>';
  rules.forEach(function(r) {
    var rate = trRates[r.key];
    if(rate === undefined) return;
    var gap = (rate - effrStart) * 100;
    var signal = Math.abs(gap) < threshold*100 ? 0 : gap > 0 ? 1 : -1;
    var sigLabel = signal === 0 ? '= Neutral' : signal === 1 ? '\u2191 Hike' : '\u2193 Cut';
    var sigCol = signal === 0 ? 'var(--color-text-tertiary)' : signal === 1 ? 'var(--color-text-danger)' : 'var(--color-text-info)';
    var isJR = r.key === 'juddRudebusch';
    h += '<tr style="'+(isJR?'background:var(--color-background-info)':'')+'">';
    h += '<td style="font-weight:'+(isJR?600:400)+';white-space:nowrap">'+r.label;
    if(isJR) h += ' <span style="font-size:9px;color:var(--c-taylor);background:rgba(225,29,72,.1);padding:1px 5px;border-radius:8px;margin-left:4px">signal source</span>';
    h += '</td>';
    h += '<td style="font-family:var(--font-mono);color:var(--c-taylor)">'+rate.toFixed(2)+'%</td>';
    h += '<td style="font-family:var(--font-mono);color:'+(gap>0?'var(--color-text-danger)':'var(--color-text-info)')+'">'+(gap>0?'+':'')+gap.toFixed(0)+'</td>';
    h += '<td style="font-weight:600;color:'+sigCol+'">'+sigLabel+'</td>';
    h += '<td style="font-size:10px;color:var(--color-text-tertiary)">'+r.note+'</td>';
    h += '</tr>';
  });
  h += '</tbody></table>';
  return h;
}

function TaylorRuleTab({state, dispatch, finance}) {
  const {meetings, states, effrStart, trRates, jrImpliedPath} = finance;
  const lb = state.fwLb;
  const t = state.taylor;
  const tr = state.trD;

  const taylorPaths = useMemo(() =>
    taylorMeetingPath(t, meetings, effrStart, lb),
    [t, meetings, effrStart, lb]
  );

  // CME expected rates at each meeting
  const cmeRates = useMemo(() => {
    return meetings.map((m, i) => {
      const s = states[i + 1] || states[states.length - 1];
      const ek = Object.entries(s).reduce((sum, [k, p]) => sum + parseInt(k) * p, 0);
      return lb + ek * 0.25;
    });
  }, [meetings, states, lb]);

  const classicNow = taylorPaths.classic[0];
  const balancedNow = taylorPaths.balanced[0];
  const inertialNow = taylorPaths.inertialC[0];
  const jrNow = trRates.juddRudebusch;
  const yellenNow = trRates.yellen;
  const gapNow = jrNow !== undefined ? jrNow - effrStart : 0;
  const rNeutral = t.rStar + t.piStar;

  const ruleVariant = tr.ruleVariant || 'taylor93';

  const paramField = (label, key, min, max, step, unit) => {
    return '<tr><td style="font-size:11px;white-space:nowrap;padding:4px 8px">'+label+'</td>'
      +'<td style="padding:4px 8px"><input type="number" class="fw-in" style="width:65px" '
      +'value="'+t[key]+'" min="'+min+'" max="'+max+'" step="'+step+'" '
      +'data-taylor-key="'+key+'"/></td>'
      +'<td style="font-size:10px;color:var(--color-text-tertiary);padding:4px 8px">'+unit+'</td></tr>';
  };

  const trField = (label, key, min, max, step, unit) => {
    return '<tr><td style="font-size:11px;white-space:nowrap;padding:4px 8px">'+label+'</td>'
      +'<td style="padding:4px 8px"><input type="number" class="fw-in" style="width:65px" '
      +'value="'+tr[key]+'" min="'+min+'" max="'+max+'" step="'+step+'" '
      +'data-tr-key="'+key+'"/></td>'
      +'<td style="font-size:10px;color:var(--color-text-tertiary);padding:4px 8px">'+unit+'</td></tr>';
  };

  let html = '';

  // --- Rule variant chips ---
  const variants = [
    {key:'taylor93', label:'Taylor 1993'},
    {key:'balanced', label:'Balanced'},
    {key:'cgg',      label:'CGG Inertial'},
    {key:'yellen',   label:'Yellen Alt1'},
    {key:'juddRudebusch', label:'Judd-Rudebusch'},
  ];
  html += '<div style="display:flex;gap:4px;background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:3px;margin-bottom:6px;width:fit-content;flex-wrap:wrap">';
  variants.forEach(v => {
    const isAct = ruleVariant === v.key;
    html += '<div class="fw-tab'+(isAct?' act':'')+'" data-rule-variant="'+v.key+'" style="cursor:pointer'+(v.key==='juddRudebusch'&&isAct?';border-color:var(--c-taylor)':'')+'">';
    html += v.label;
    if(v.key==='juddRudebusch') html += ' <span style="font-size:8px;color:var(--c-taylor);margin-left:2px">\u2605</span>';
    html += '</div>';
  });
  html += '</div>';
  html += '<div style="font-size:10px;color:var(--color-text-tertiary);margin-bottom:1rem;line-height:1.5">Signal source: Judd-Rudebusch ECM (highest predictive R\u00b2 for FFTR changes, Bieri-Chincarini 2005 Exhibit 7)</div>';

  // Summary cards
  html += '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:8px;margin-bottom:1rem">';
  html += '<div class="fw-stat"><div class="fw-stat-l">JR ECM</div><div class="fw-stat-v" style="color:var(--c-taylor)">'+(jrNow!==undefined?jrNow.toFixed(2):'--')+'%</div><div class="fw-stat-s">signal source</div></div>';
  html += '<div class="fw-stat"><div class="fw-stat-l">Classic Taylor</div><div class="fw-stat-v" style="color:var(--c-taylor);opacity:.7">'+(classicNow!==undefined?classicNow.toFixed(2):'--')+'%</div><div class="fw-stat-s">Taylor \'93</div></div>';
  html += '<div class="fw-stat"><div class="fw-stat-l">Yellen Alt1</div><div class="fw-stat-v" style="color:var(--c-taylor-mod)">'+(yellenNow!==undefined?yellenNow.toFixed(2):'--')+'%</div><div class="fw-stat-s">unemployment gap</div></div>';
  html += '<div class="fw-stat"><div class="fw-stat-l">Current EFFR</div><div class="fw-stat-v" style="color:var(--c-cme)">'+effrStart.toFixed(2)+'%</div><div class="fw-stat-s">from ZQ chain</div></div>';
  html += '<div class="fw-stat"><div class="fw-stat-l">JR gap</div><div class="fw-stat-v" style="color:'+(gapNow>0.05?'var(--color-text-danger)':gapNow<-0.05?'var(--color-text-info)':'var(--color-text-secondary)')+'">'+(gapNow>0?'+':'')+gapNow.toFixed(2)+'</div><div class="fw-stat-s">'+(gapNow>0.05?'policy too loose':gapNow<-0.05?'policy too tight':'near neutral')+'</div></div>';
  html += '<div class="fw-stat"><div class="fw-stat-l">r* neutral</div><div class="fw-stat-v">'+rNeutral.toFixed(2)+'%</div><div class="fw-stat-s">r*+\u03c0*</div></div>';
  html += '</div>';

  // Parameter tables side by side
  html += '<div class="k-grid" style="margin-bottom:14px">';

  // Macro inputs
  html += '<div class="k-panel"><div class="k-hdr"><span class="k-title">Macro inputs</span></div>';
  html += '<table class="fwt"><thead><tr><th>Parameter</th><th>Value</th><th></th></tr></thead><tbody>';
  html += paramField('Inflation target (\u03c0*)', 'piStar', 0, 10, 0.1, '%');
  html += paramField('Current PCE inflation', 'piNow', -2, 15, 0.1, '% yr/yr');
  html += paramField('End-horizon PCE forecast', 'piEnd', -2, 15, 0.1, '% yr/yr');
  html += paramField('Potential GDP growth (y*)', 'yStar', -2, 8, 0.1, '%');
  html += paramField('Current GDP growth', 'yNow', -5, 10, 0.1, '%');
  html += paramField('End-horizon GDP forecast', 'yEnd', -5, 10, 0.1, '%');
  html += paramField('Neutral real rate (r*)', 'rStar', -2, 5, 0.1, '%');
  html += '</tbody></table>';
  // Gap measure toggle
  html += '<div style="margin-top:8px;display:flex;gap:4px;align-items:center">';
  html += '<span style="font-size:10px;color:var(--color-text-tertiary);margin-right:4px">Gap measure:</span>';
  html += '<div data-gap-measure="output" class="fw-tab'+(tr.gapMeasure==='output'||!tr.gapMeasure?' act':'')+'" style="cursor:pointer;font-size:10px;padding:3px 8px">GDP output gap</div>';
  html += '<div data-gap-measure="unemployment" class="fw-tab'+(tr.gapMeasure==='unemployment'?' act':'')+'" style="cursor:pointer;font-size:10px;padding:3px 8px">Unemployment gap (2\u00d7)</div>';
  html += '</div>';
  // Unemployment fields (shown when unemployment gap selected)
  if(tr.gapMeasure==='unemployment'){
    html += '<table class="fwt" style="margin-top:6px"><tbody>';
    html += trField('Unemployment rate (u)', 'unemploymentRate', 0, 15, 0.1, '%');
    html += trField('Natural rate (u*)', 'unemploymentNatural', 0, 10, 0.1, 'NAIRU');
    html += '</tbody></table>';
  }
  html += '<div class="k-note">PCE = personal consumption expenditures price index. Inflation and output are linearly interpolated across meetings.</div>';
  html += '</div>';

  // Rule coefficients + JR parameters
  html += '<div class="k-panel"><div class="k-hdr"><span class="k-title">Rule coefficients</span></div>';
  html += '<table class="fwt"><thead><tr><th>Parameter</th><th>Value</th><th></th></tr></thead><tbody>';
  html += paramField('Classic \u03b1 (inflation)', 'alphaClassic', 0, 5, 0.1, 'Taylor \'93');
  html += paramField('Classic \u03b2 (output gap)', 'betaClassic', 0, 5, 0.1, 'Taylor \'93');
  html += paramField('Balanced \u03b1 (inflation)', 'alphaBalanced', 0, 5, 0.1, 'Yellen \'12');
  html += paramField('Balanced \u03b2 (output gap)', 'betaBalanced', 0, 5, 0.1, 'Yellen \'12');
  html += paramField('Inertia \u03c1 (smoothing)', 'inertia', 0, 0.99, 0.05, 'Clarida-Gali-Gertler');
  html += '</tbody></table>';
  // JR ECM parameters
  html += '<div style="margin-top:10px;padding-top:8px;border-top:.5px solid var(--color-border-tertiary)">';
  html += '<div style="font-size:10px;font-weight:500;color:var(--c-taylor);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px">Judd-Rudebusch ECM parameters</div>';
  html += '<table class="fwt"><tbody>';
  html += trField('\u03bb\u2081 (inflation weight)', 'jrLambda1', 0.5, 3.0, 0.25, 'Eq. 23');
  html += trField('\u03bb\u2082 (gap weight)', 'jrLambda2', 0.0, 2.0, 0.25, 'Eq. 23');
  html += trField('\u03bb\u2083 (lagged gap)', 'jrLambda3', 0.0, 1.0, 0.10, 'Eq. 23');
  html += trField('\u03b3 (adjustment speed)', 'jrGamma', 0.50, 0.99, 0.05, 'Eq. 24');
  html += '</tbody></table>';
  html += '</div>';
  html += '<div class="k-note"><b>Classic:</b> r = r* + \u03c0* + \u03b1(\u03c0 \u2212 \u03c0*) + \u03b2(y \u2212 y*). Taylor 1993: \u03b1=1.5, \u03b2=0.5.<br>';
  html += '<b>Balanced:</b> \u03b1=1.0, \u03b2=1.0 (Yellen 2012). <b>Inertial:</b> r<sub>t</sub> = \u03c1 r<sub>t-1</sub> + (1\u2212\u03c1) r<sub>Taylor</sub>.<br>';
  html += '<b>JR ECM:</b> i*<sub>t</sub> = r* + \u03c0* + \u03bb\u2081(\u03c0\u2212\u03c0*) + \u03bb\u2082\u00b7gap<sub>t</sub> + \u03bb\u2083\u00b7gap<sub>t-1</sub>; \u0394i<sub>t</sub> = \u03b3(i*<sub>t</sub> \u2212 i<sub>t-1</sub>).</div>';
  html += '</div></div>';

  // Main chart — now includes JR path
  html += '<div class="k-panel" style="margin-bottom:14px">';
  html += '<div class="k-hdr"><span class="k-title">Prescribed rate path vs CME market-implied path</span></div>';
  html += taylorChartSvg(meetings, states, lb, effrStart, taylorPaths, t, jrImpliedPath);
  html += '<div class="k-note">Heavy rose solid = Judd-Rudebusch ECM (signal source). Dashed rose = classic Taylor 1993. Light dashed = balanced approach (Yellen). Dotted = CGG inertial. Blue = CME futures-implied expected EFFR. Gray dashed = neutral rate r*+\u03c0*.</div>';
  html += '</div>';

  // Gap chart
  html += '<div class="k-panel" style="margin-bottom:14px">';
  html += '<div class="k-hdr"><span class="k-title">Taylor\u2212CME gap (prescriptive minus market)</span></div>';
  html += taylorGapSvg(meetings, cmeRates, taylorPaths.classic, taylorPaths.balanced);
  html += '<div class="k-note">Positive gap = Taylor says policy is too loose (rate should be higher). Negative = Taylor says policy is too tight. Solid = classic, dashed = balanced. Red/blue coloring at \u00b15bp threshold.</div>';
  html += '</div>';

  // Decomposition table — now includes JR column
  html += '<div class="k-panel" style="margin-bottom:14px">';
  html += '<div class="k-hdr"><span class="k-title">Meeting-by-meeting decomposition</span></div>';
  html += '<div style="overflow-x:auto"><table class="fwt"><thead><tr><th>Meeting</th><th>Interp. \u03c0</th><th>Interp. y</th><th>Classic</th><th>Balanced</th><th>JR ECM</th><th>CME</th><th>JR gap</th></tr></thead><tbody>';
  const n = meetings.length;
  for (let i = 0; i < n; i++) {
    const t2 = n > 1 ? i / (n - 1) : 0;
    const pi = t.piNow + t2 * (t.piEnd - t.piNow);
    const y = t.yNow + t2 * (t.yEnd - t.yNow);
    const jrRate = jrImpliedPath[i] !== undefined ? jrImpliedPath[i] : 0;
    const gap = jrRate - cmeRates[i];
    const gCol = gap > 0.05 ? 'var(--color-text-danger)' : gap < -0.05 ? 'var(--color-text-info)' : 'var(--color-text-secondary)';
    const shortLbl = meetings[i].label.split('\u2013')[0] || meetings[i].lb;
    html += '<tr>';
    html += '<td style="white-space:nowrap;font-size:11px">' + shortLbl + '</td>';
    html += '<td style="font-family:var(--font-mono)">' + pi.toFixed(2) + '%</td>';
    html += '<td style="font-family:var(--font-mono)">' + y.toFixed(2) + '%</td>';
    html += '<td style="font-family:var(--font-mono);color:var(--c-taylor);opacity:.7">' + taylorPaths.classic[i].toFixed(2) + '%</td>';
    html += '<td style="font-family:var(--font-mono);color:var(--c-taylor-mod)">' + taylorPaths.balanced[i].toFixed(2) + '%</td>';
    html += '<td style="font-family:var(--font-mono);font-weight:600;color:var(--c-taylor)">' + jrRate.toFixed(2) + '%</td>';
    html += '<td style="font-family:var(--font-mono);color:var(--c-cme)">' + cmeRates[i].toFixed(2) + '%</td>';
    html += '<td style="font-family:var(--font-mono);color:' + gCol + '">' + (gap > 0 ? '+' : '') + gap.toFixed(2) + '</td>';
    html += '</tr>';
  }
  html += '</tbody></table></div>';
  html += '<div class="k-note">Inflation and output gap are linearly interpolated from current to end-of-horizon values across meeting dates. Gap = JR ECM minus CME implied.</div>';
  html += '</div>';

  // Rule comparison matrix
  html += '<div class="k-panel" style="margin-top:12px">';
  html += '<div class="k-hdr"><span class="k-title">Rule comparison matrix \u2014 all variants at current inputs</span>';
  html += '<span class="k-contract">Bieri-Chincarini (2005) Exhibit 7 \u00b7 Atlanta Fed Taylor Rule Utility</span></div>';
  html += '<div style="overflow-x:auto">';
  html += buildRuleComparisonTable(trRates, effrStart, lb);
  html += '</div>';
  html += '<div class="k-note">Judd-Rudebusch ECM is the signal source for the riding calculator filter \u2014 it has the highest R\u00b2 for predicting actual FFTR changes (Exhibit 7: R\u00b2=7.68% vs 6.79% for static Taylor, both significant at 95%). The lagged gap term \u03bb\u2083 captures Fed momentum: when the output gap is persistent, the ECM prescribes continued adjustment in the same direction. Rule disagreement (different signals across variants) is itself informative \u2014 it indicates genuine policy uncertainty rather than mechanical rule-following.</div>';
  html += '</div>';

  // Wire onchange events for parameter inputs + variant chips + gap measure
  useEffect(() => {
    const taylorHandler = (e) => {
      const key = e.target.dataset.taylorKey;
      if (!key) return;
      const val = parseFloat(e.target.value);
      if (!isNaN(val)) dispatch({type: 'UPDATE_TAYLOR', key, value: val});
    };
    const trHandler = (e) => {
      const key = e.target.dataset.trKey;
      if (!key) return;
      const val = parseFloat(e.target.value);
      if (!isNaN(val)) dispatch({type: 'UPDATE_TR', key, value: val});
    };
    const variantHandler = (e) => {
      const v = e.currentTarget.dataset.ruleVariant;
      if (v) dispatch({type: 'UPDATE_TR', key: 'ruleVariant', value: v});
    };
    const gapHandler = (e) => {
      const v = e.currentTarget.dataset.gapMeasure;
      if (v) dispatch({type: 'UPDATE_TR', key: 'gapMeasure', value: v});
    };
    document.querySelectorAll('[data-taylor-key]').forEach(el => el.addEventListener('change', taylorHandler));
    document.querySelectorAll('[data-tr-key]').forEach(el => el.addEventListener('change', trHandler));
    document.querySelectorAll('[data-rule-variant]').forEach(el => el.addEventListener('click', variantHandler));
    document.querySelectorAll('[data-gap-measure]').forEach(el => el.addEventListener('click', gapHandler));
    return () => {
      document.querySelectorAll('[data-taylor-key]').forEach(el => el.removeEventListener('change', taylorHandler));
      document.querySelectorAll('[data-tr-key]').forEach(el => el.removeEventListener('change', trHandler));
      document.querySelectorAll('[data-rule-variant]').forEach(el => el.removeEventListener('click', variantHandler));
      document.querySelectorAll('[data-gap-measure]').forEach(el => el.removeEventListener('click', gapHandler));
    };
  });

  return <SvgPanel html={html}/>;
}

// ============================================================================
// REACT APP
// ============================================================================

function App() {
  const [state, dispatch] = useReducer(reducer, INITIAL_STATE);
  const finance = useFinance(state);
  const [apiKey, setApiKey] = useState('');
  const [refreshStatus, setRefreshStatus] = useState({zq:'', kal:'', poly:'', sofr:'', yc:''});
  const [fetching, setFetching] = useState({zq:false, kal:false, poly:false, sofr:false, yc:false});

  useEffect(() => {
    try {
      const s = JSON.parse(localStorage.getItem('fwCfg') || '{}');
      if(s.lb || s.scenario || s.compare) dispatch({type:'LOAD_SETTINGS', settings:s});
    } catch(e) {}
  }, []);

  useEffect(() => {
    try { localStorage.setItem('fwCfg', JSON.stringify({lb:state.fwLb, scenario:state.fwActiveScenario, compare:state.fwCompareScenario})); }
    catch(e) {}
  }, [state.fwLb, state.fwActiveScenario, state.fwCompareScenario]);

  const TABS = [
    {id:'inputs',     label:'Futures inputs'},
    {id:'chain',      label:'EFFR chain'},
    {id:'tree',       label:'Probability tree'},
    {id:'kalshi',     label:'\u2696 Prediction markets'},
    {id:'sofr',       label:'\ud83d\udcc8 SOFR strip'},
    {id:'dashboard',  label:'\ud83d\uddc2 Dashboard'},
    {id:'yieldcurve', label:'\ud83d\udcd0 Yield Curve'},
    {id:'taylor',     label:'\ud83c\udfaf Taylor Rule'},
  ];

  return (
    <div style={{padding:'1rem 0 .5rem'}}>
      <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',flexWrap:'wrap',gap:'8px',marginBottom:'6px'}}>
        <div>
          <h2 style={{fontSize:'18px',fontWeight:500,margin:'0 0 2px'}}>Fed Funds probability tree</h2>
          <div style={{fontSize:'12px',color:'var(--color-text-secondary)'}}>
            Target: <b style={{color:'var(--color-text-primary)'}}>{state.fwLb.toFixed(2)}&ndash;{(state.fwLb+0.25).toFixed(2)}%</b>
            &nbsp;&middot;&nbsp;EFFR: <b style={{color:'var(--color-text-primary)'}}>{finance.effrStart.toFixed(2)}%</b>
          </div>
        </div>
        <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:'4px'}}>
          <div style={{display:'flex',gap:'6px',alignItems:'center'}}>
            <input type="password" className="fw-in" placeholder="sk-ant-... (standalone only)"
              style={{width:'195px',fontSize:'11px'}} value={apiKey}
              onChange={e=>setApiKey(e.target.value)}/>
            <button className="refresh-btn" disabled={fetching.zq}
              onClick={()=>refreshData(state,dispatch,apiKey,setFetching,setRefreshStatus)}>
              <span className={fetching.zq?'spin':''}>&#x27f3;</span> Refresh ZQ
            </button>
          </div>
          <div style={{fontSize:'10px',color:'var(--color-text-tertiary)',textAlign:'right',maxWidth:'400px',minHeight:'14px'}}>{refreshStatus.zq}</div>
        </div>
      </div>

      <p style={{fontSize:'13px',color:'var(--color-text-secondary)',margin:'0 0 .5rem'}}>CME FedWatch methodology (30-day ZQ futures) with Kalshi + Polymarket prediction market overlay and SOFR strip. 12 months forward, 8 tabs.</p>
      <div className="api-note">
        <b>Running standalone?</b> Paste your Anthropic API key (<code>sk-ant-...</code>) above &mdash; get one at <code>console.anthropic.com</code>. Refreshes cost &lt;$0.01 each. Inside claude.ai the key is injected automatically.
      </div>

      <div style={{display:'flex',gap:'4px',background:'var(--color-background-secondary)',borderRadius:'var(--border-radius-md)',padding:'3px',margin:'1rem 0 1.25rem',width:'fit-content',flexWrap:'wrap'}}>
        {TABS.map(t=>(
          <div key={t.id} className={'fw-tab'+(state.fwActive===t.id?' act':'')}
            onClick={()=>dispatch({type:'SET_TAB',tab:t.id})}>
            {t.label}
          </div>
        ))}
      </div>

      {state.fwActive==='inputs' && <FuturesInputsTab state={state} dispatch={dispatch} finance={finance}/>}
      {state.fwActive==='chain'  && <ChainTab state={state} finance={finance}/>}
      {state.fwActive==='tree'   && <TreeTab state={state} finance={finance}/>}
      {state.fwActive==='kalshi' && <KalshiTab state={state} dispatch={dispatch} finance={finance}
        fetching={fetching} setFetching={setFetching}
        refreshStatus={refreshStatus} setRefreshStatus={setRefreshStatus} apiKey={apiKey}/>}
      {state.fwActive==='taylor' && <TaylorRuleTab state={state} dispatch={dispatch} finance={finance}/>}
      {!['inputs','chain','tree','kalshi','taylor'].includes(state.fwActive) &&
        <div style={{color:'var(--color-text-tertiary)',fontSize:'13px'}}>Tab content coming in next steps</div>}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
